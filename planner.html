<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			::-webkit-scrollbar { width: 6px; }
			::-webkit-scrollbar-track { background: rgba(10,8,5,0.5); }
			::-webkit-scrollbar-thumb { background: #4a3b2a; border-radius: 3px; }
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; box-sizing: border-box; }
			body { background: transparent; color: #e2c07d; font-family: "Crimson Text", serif; padding: 15px; overflow-x: hidden; text-transform: uppercase; margin: 0; }

			.header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4a3b2a; padding-bottom: 10px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
			.controls-group { display: flex; gap: 10px; align-items: center; }

			.char-name, .char-select {
			height: 34px;
			font-size: 13px;
			background: #1a1510;
			border: 1px solid #4a3b2a;
			color: #e2c07d;
			padding: 5px 10px;
			outline: none;
			font-family: "Crimson Text", serif;
			width: 200px;
			box-sizing: border-box;
			}
			.char-select { text-transform: uppercase; }

			.btn { background: rgba(20,15,10,0.9); border: 1px solid #4a3b2a; color: #e2c07d; height: 34px; padding: 0 15px; cursor: pointer; text-transform: uppercase; font-family: "Crimson Text", serif; transition: 0.2s; }
			.btn:hover { border-color: #f0dca5; color: #f0dca5; background: rgba(226, 192, 125, 0.1); }
			.btn-clear:hover { border-color: #ff4444 !important; color: #ff4444 !important; background: rgba(255, 68, 68, 0.1) !important; }

			.main-layout { display: flex; justify-content: space-between; gap: 15px; max-width: 680px; margin: 0 auto; transition: box-shadow 0.3s ease; }
			.equip-column { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 240px; }
			.equip-row { display: flex; gap: 12px; justify-content: center; width: 100%; min-height: 48px; transition: opacity 0.3s ease; }

			.item-slot { width: 48px; height: 48px; border: 2px solid #332a1e; background: rgba(0,0,0,0.5); flex-shrink: 0; position: relative; cursor: pointer; transition: 0.2s; }
			.item-slot img { width: 100%; height: 100%; object-fit: cover; }
			.item-slot:hover { border-color: #e2c07d; box-shadow: 0 0 10px rgba(226, 192, 125, 0.2); }
			.separator { height: 1px; background: rgba(74, 59, 42, 0.4); width: 100%; margin: 5px 0; }

			.right-column { display: flex; flex-direction: column; gap: 15px; width: 310px; }
			.attr-panel, .skills-panel, .build-panel { background: rgba(15,12,10,0.95); border: 1px solid #2a2015; padding: 10px; height: fit-content; box-sizing: border-box; }
			.attr-grid { display: grid; grid-template-columns: 1fr 1fr; row-gap: 8px; column-gap: 10px; }
			.attr-item { display: flex; align-items: center; gap: 6px; font-family: "Arial", sans-serif; font-size: 11px; color: #fff; }
			.attr-icon { width: 15px; height: 15px; object-fit: contain; cursor: help; }
			.attr-val { font-weight: bold; color: #ffffff; }

			.skill-row { display: flex; gap: 6px; align-items: center; min-height: 44px; }
			.skill-slot { width: 44px; height: 44px; border: 1px solid #332a1e; background: rgba(0,0,0,0.5); flex-shrink: 0; position: relative; cursor: pointer; transition: 0.2s; }
			.skill-slot:hover { border-color: #e2c07d; box-shadow: 0 0 10px rgba(226, 192, 125, 0.2); }
			.skill-slot img { width: 100%; height: 100%; object-fit: cover; }

			.swap-btn { width: 36px; height: 36px; cursor: pointer; border: 1px solid #4a3b2a; background: rgba(20,15,10,0.9); border-radius: 3px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
			.swap-btn:hover { border-color: #e2c07d; background: rgba(226, 192, 125, 0.15); }

			.rarity-Legendary { border-color: #4C139D !important; }

			#load-modal, #skill-modal, #clear-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1a1510; border:2px solid #4a3b2a; padding:20px; z-index:1000; box-shadow:0 0 20px rgba(0,0,0,0.8); width:350px; font-family:'Crimson Text', serif; max-height:85vh; overflow-y:auto; }
			.modal-input, .modal-select { width: 100%; background: #0a0805; color: #e2c07d; border: 1px solid #332a1e; padding: 8px; margin-bottom: 10px; outline: none; font-family: "Crimson Text", serif; font-size: 14px; cursor: pointer; }
			.modal-input { font-family: monospace; font-size: 12px; cursor: text; }
			.modal-select:hover { border-color: #e2c07d; }

			#config-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1a1510; border:2px solid #4a3b2a; padding:15px; z-index:1000; box-shadow:0 0 20px rgba(0,0,0,0.8); width:800px; max-width:95vw; height:550px; max-height:90vh; font-family:'Crimson Text', serif; flex-direction:row; gap:15px; }
			.cfg-left { width: 280px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid #4a3b2a; padding-right: 15px; overflow-y: auto; }
			.cfg-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

			.cfg-box { display: flex; align-items: center; gap: 10px; border: 1px solid #332a1e; background: rgba(0,0,0,0.5); padding: 8px 15px; cursor: pointer; transition: 0.2s; min-height: 52px; }
			.cfg-box:hover { border-color: #e2c07d; }
			.cfg-box.active { border-color: #f0dca5; background: rgba(226, 192, 125, 0.1); }
			.cfg-box-text { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
			.cfg-box-title { color: #f0dca5; font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
			.cfg-box-sub { color: #aaa; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

			.cfg-list-header { border-bottom: 1px solid #4a3b2a; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
			.cfg-search { background: #0a0805; border: 1px solid #332a1e; color: #e2c07d; padding: 4px 8px; font-family: "Crimson Text", serif; outline: none; width: 150px; }
			.cfg-scroll { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 5px; }

			.cfg-list-item { display: flex; gap: 10px; padding: 8px; border: 1px solid #332a1e; background: rgba(0,0,0,0.4); cursor: pointer; transition: 0.1s; }
			.cfg-list-item:hover { background: rgba(226, 192, 125, 0.1); border-color: #e2c07d; }
			.cfg-list-item.selected { background: rgba(26, 147, 6, 0.2); border-color: #1A9306; }
			.cfg-list-item img { width: 36px; height: 36px; border: 1px solid #1a1510; flex-shrink: 0; object-fit: contain; }
			.cfg-item-details { display: flex; flex-direction: column; flex: 1; justify-content: center; }
			.cfg-item-name { color: #e2c07d; font-size: 14px; font-weight: bold; }
			.cfg-item-stats { color: #00ff00; font-size: 11px; white-space: pre-wrap; font-family: sans-serif; line-height: 1.3; margin-top: 2px; text-transform: capitalize; }
			.cfg-item-desc { color: #62A4DA; font-size: 11px; white-space: pre-wrap; font-family: sans-serif; line-height: 1.3; margin-top: 2px; }

			.skill-grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; justify-items: center; }
			.skill-none-row { display: flex; justify-content: center; margin-bottom: 10px; border-bottom: 1px solid #332a1e; padding-bottom: 10px; }
			.skill-none-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid #332a1e; background: rgba(0,0,0,0.8); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
			.skill-none-btn:hover { border-color: #ff4444; background: rgba(255,68,68,0.2); transform: scale(1.05); }
			.skill-none-btn img { width: 24px; height: 24px; }

			/* Traits Grid UI */
			.build-panel { margin: 20px auto 0 auto; width: 100%; max-width: 680px; }
			.trait-line-container { display: flex; flex-direction: column; gap: 6px; }
			.trait-line { display: flex; align-items: center; justify-content: space-between; height: 150px; padding: 0 15px; border: 1px dashed rgba(226,192,125,0.4); background-size: cover; background-position: center; position: relative; }
			.trait-line.active { border: 1px solid #332a1e; }
			.trait-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0) 100%); z-index: 1; }
			.trait-content { display: flex; align-items: center; width: 100%; height: 100%; z-index: 2; position: relative; }

			.trait-spec-box { display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: rgba(0,0,0,0.8); cursor: pointer; transition: 0.2s; border: 1px dashed rgba(226, 192, 125, 0.5); }
			.trait-spec-box:hover { background: rgba(226,192,125,0.3); }
			.trait-spec-box.active { border: 1px solid #111; }
			.trait-spec-icon { width: 66px; height: 66px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); object-fit: cover; }

			.trait-minor-box { width: 34px; height: 34px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: rgba(0,0,0,0.6); margin: 0 20px; cursor: help; border: 1px solid rgba(226, 192, 125, 0.5); }
			.trait-minor-icon { width: 100%; height: 100%; object-fit: cover; }

			.trait-tier-col { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
			.trait-major-box { width: 34px; height: 34px; border: 1px dashed rgba(226, 192, 125, 0.5); background: rgba(0,0,0,0.6); cursor: pointer; transition: 0.2s; filter: grayscale(100%) brightness(0.5); }
			.trait-major-box:hover { filter: grayscale(0%) brightness(1); border-color: #e2c07d; z-index: 5; transform: scale(1.1); }
			.trait-major-box.active { filter: grayscale(0%) brightness(1); outline: 2px solid #e2c07d; outline-offset: 1px; border: 1px solid #111; }
			.trait-major-icon { width: 100%; height: 100%; object-fit: cover; }
		</style>
	</head>
	<body>
		<div id="planner-ui">
			<div class="header">
				<div class="controls-group">
					<input type="text" id="build-name" class="char-name" value="New Build" />
					<select id="class-select" class="char-select">
						<option value="Guardian">Guardian (Heavy)</option>
						<option value="Revenant">Revenant (Heavy)</option>
						<option value="Warrior">Warrior (Heavy)</option>
						<option value="Engineer">Engineer (Medium)</option>
						<option value="Ranger">Ranger (Medium)</option>
						<option value="Thief">Thief (Medium)</option>
						<option value="Elementalist">Elementalist (Light)</option>
						<option value="Mesmer">Mesmer (Light)</option>
						<option value="Necromancer">Necromancer (Light)</option>
					</select>
				</div>
				<div class="controls-group">
					<button class="btn btn-clear" id="btn-clear">Clear</button>
					<button class="btn" id="btn-save">Save</button>
					<button class="btn" id="btn-load">Load</button>
					<button class="btn" id="btn-copy">Copy Code</button>
				</div>
			</div>

			<div id="load-modal">
				<div style="color:#f0dca5; margin-bottom:10px; font-weight:bold; font-size:16px;">PASTE TEMPLATE CODE</div>
				<input type="text" id="template-paste" class="modal-input" placeholder="[&amp;Base64Code...]" />

				<div style="color:#f0dca5; margin:15px 0 10px; font-weight:bold; font-size:16px; border-top: 1px solid #332a1e; padding-top: 10px;">SELECT SAVED BUILD</div>
				<select id="saved-builds-list" size="5" class="modal-select"></select>

				<div style="display:flex; justify-content:space-between;">
					<div style="display:flex; gap:10px;">
						<button class="btn" id="btn-modal-cancel">Cancel</button>
						<button class="btn btn-clear" id="btn-modal-delete">Delete</button>
					</div>
					<button class="btn" id="btn-modal-load">Load</button>
				</div>
			</div>

			<div id="clear-modal">
				<div style="color:#f0dca5; margin-bottom:10px; font-weight:bold; font-size:16px;">CLEAR BUILD</div>
				<div style="color:#ccc; font-size:14px; margin-bottom:20px;">Are you sure you want to clear the current build? This cannot be undone.</div>
				<div style="display:flex; justify-content:space-between;">
					<button class="btn" id="btn-clear-cancel">Cancel</button>
					<button class="btn btn-clear" id="btn-clear-confirm">Clear</button>
				</div>
			</div>

			<div id="config-modal">
				<div class="cfg-left">
					<div id="cfg-header-name" style="color:#f0dca5; font-size:18px; font-weight:bold; text-transform:uppercase; margin-bottom:5px; border-bottom:1px solid #4a3b2a; padding-bottom:5px;">SLOT NAME</div>
					<div id="cfg-boxes-container" style="display:flex; flex-direction:column; gap:8px;"></div>

					<div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
						<button class="btn" id="cfg-apply">Accept</button>
						<button class="btn" id="btn-cfg-cancel" style="background:transparent;">Cancel</button>
					</div>
				</div>
				<div class="cfg-right">
					<div class="cfg-list-header">
						<span id="cfg-list-title" style="color:#e2c07d; font-weight:bold;">Select Option</span>
						<div style="display:flex; gap:10px; align-items:center;">
							<input type="text" id="cfg-search" class="cfg-search" placeholder="Search...">
								<label id="cfg-apply-all-container" style="display:none; cursor:pointer; color:#8a7a5f; font-size:13px; align-items:center; gap:5px;">
									<input type="checkbox" id="cfg-apply-all"> Apply to all compatible
                            </label>
							</div>
					</div>
					<div id="cfg-list-scroll" class="cfg-scroll"></div>
				</div>
			</div>

			<div id="skill-modal">
				<div id="skill-title" style="color:#f0dca5; margin-bottom:10px; font-weight:bold; font-size:16px; text-transform:uppercase;">SELECT SKILL</div>
				<div id="skill-content"></div>
				<div style="display:flex; justify-content:flex-end; margin-top:15px;">
					<button class="btn" id="btn-skill-close">Close</button>
				</div>
			</div>

			<div class="main-layout">
				<div class="equip-column">
					<div class="equip-row">
						<div class="item-slot" data-slot="Helm"></div>
						<div class="item-slot" data-slot="Shoulders"></div>
					</div>
					<div class="equip-row">
						<div class="item-slot" data-slot="Coat"></div>
						<div class="item-slot" data-slot="Gloves"></div>
					</div>
					<div class="equip-row">
						<div class="item-slot" data-slot="Leggings"></div>
						<div class="item-slot" data-slot="Boots"></div>
					</div>
					<div class="separator"></div>

					<div style="display:flex; align-items:center; gap:12px; width:100%; justify-content:center; transform: translateX(-24px);">
						<div class="swap-btn" id="btn-swap-land">
							<img src="https://wiki.guildwars2.com/images/c/ce/Weapon_Swap_Button.png" style="width:28px; height:28px;" />
						</div>
						<div style="display:flex; flex-direction:column; gap:12px;">
							<div class="equip-row" id="row-weapon1">
								<div class="item-slot" data-slot="WeaponA1"></div>
								<div class="item-slot" data-slot="WeaponA2"></div>
							</div>
							<div class="equip-row" id="row-weapon2">
								<div class="item-slot" data-slot="WeaponB1"></div>
								<div class="item-slot" data-slot="WeaponB2"></div>
							</div>
						</div>
					</div>

					<div class="separator"></div>
					<div style="display:flex; flex-direction:column; gap:12px; align-items:center;">
						<div style="display:flex; gap:12px;">
							<div class="item-slot" data-slot="Backpack"></div>
							<div class="item-slot" data-slot="Accessory1"></div>
							<div class="item-slot" data-slot="Accessory2"></div>
							<div class="item-slot" data-slot="Relic"></div>
						</div>
						<div style="display:flex; gap:12px;">
							<div class="item-slot" data-slot="Amulet"></div>
							<div class="item-slot" data-slot="Ring1"></div>
							<div class="item-slot" data-slot="Ring2"></div>
							<div class="item-slot" data-slot="JadeBot"></div>
						</div>
					</div>
					<div class="separator"></div>

					<div style="display:flex; align-items:center; gap:10px; width:100%; justify-content:center;">
						<div class="equip-row" style="width:auto; margin:0;">
							<div class="item-slot" data-slot="HelmAquatic"></div>
						</div>
						<div style="display:flex; flex-direction:column; gap:12px;">
							<div style="display:flex; align-items:center; gap:8px;">
								<div class="equip-row" id="row-aquaticA" style="width:auto; margin:0;">
									<div class="item-slot" data-slot="WeaponAquaticA"></div>
								</div>
								<div class="swap-btn" id="btn-swap-water">
									<img src="https://wiki.guildwars2.com/images/c/ce/Weapon_Swap_Button.png" style="width:28px; height:28px;" />
								</div>
								<div class="equip-row" id="row-aquaticB" style="width:auto; margin:0;">
									<div class="item-slot" data-slot="WeaponAquaticB"></div>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="right-column">
					<div class="attr-panel">
						<div style="font-size: 13px; color: #fff; margin-bottom: 10px; border-bottom: 1px solid #4a3b2a; padding-bottom: 3px;">Attributes</div>
						<div class="attr-grid" id="attr-display">
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_power.png" class="attr-icon" data-tt="Power" />
								<span class="attr-val" id="val-Power">1000</span>
							</div>
							<div class="attr-item"></div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_toughness.png" class="attr-icon" data-tt="Toughness" />
								<span class="attr-val" id="val-Toughness">1000</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_armor.png" class="attr-icon" data-tt="Armor" />
								<span class="attr-val" id="val-Armor">2000</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_vitality.png" class="attr-icon" data-tt="Vitality" />
								<span class="attr-val" id="val-Vitality">1000</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_health.png" class="attr-icon" data-tt="Health" />
								<span class="attr-val" id="val-Health">15,922</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_precision.png" class="attr-icon" data-tt="Precision" />
								<span class="attr-val" id="val-Precision">1000</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_critical_chance.png" class="attr-icon" data-tt="Critical Chance" />

							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_ferocity.png" class="attr-icon" data-tt="Ferocity" />
								<span class="attr-val" id="val-Ferocity">0</span>

								<span class="attr-val" id="val-CondiDmg">0</span>

							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_healing_power.png" class="attr-icon" data-tt="Healing Power" />
								<span class="attr-val" id="val-Healing">0</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_expertise.png" class="attr-icon" data-tt="Expertise" />
								<span class="attr-val" id="val-Expertise">0</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/condition_duration.png" class="attr-icon" data-tt="Condition Duration" />
								<span class="attr-val" id="val-CondiDur">0.00%</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_concentration.png" class="attr-icon" data-tt="Concentration" />
								<span class="attr-val" id="val-Concentration">0</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_boon_duration.png" class="attr-icon" data-tt="Boon Duration" />
								<span class="attr-val" id="val-BoonDur">0.00%</span>
							</div>
							<div class="attr-item">
								<img src="https://gw2ps.local/Assets/Icons/att_agony_resistance.png" class="attr-icon" data-tt="Agony Resistance" />
								<span class="attr-val" id="val-AR">0</span>
							</div>

			async init() {
				this.bindEvents();
                await this.loadDB();
                
                const last = localStorage.getItem('gw2_planner_last_state');
                if (last) {
                    try {
                        this.state = JSON.parse(last);
                        document.getElementById('class-select').value = this.state.profession;
                        document.getElementById('build-name').value = this.state.name;
                        
                        try {
                            const res = await fetch(`https://api.guildwars2.com/v2/professions/${this.state.profession}`);
                            this.cache.profData = await res.json();
                        } catch(e) {}
                        
                        await this.loadSavedSkills();
                        
                        this.renderEquipment();
                        this.renderTraits();
                        this.updateView();
                    } catch(e) { this.loadClass(document.getElementById('class-select').value); }
                } else {
                    await this.loadClass(document.getElementById('class-select').value);
                }
			},
            async loadSavedSkills() {
                let missing = [];
                const process = (env) => {
                    ['Heal', 'Utility1', 'Utility2', 'Utility3', 'Elite'].forEach(t => {
                        let id = this.state.skills[env][t];
                        if(id && !this.cache.skills[id]) missing.push(id);
                    });
                };
                if(this.state.skills) {
                    if(this.state.skills.land) process('land');
                    if(this.state.skills.water) process('water');
                }
                if(missing.length > 0) {
                    try {
                        const res = await fetch(`https://api.guildwars2.com/v2/skills?ids=${missing.join(',')}`);
                        const data = await res.json();
                        data.forEach(sk => { this.cache.skills[sk.id] = sk; });
                    } catch(e){}
                }
            },
            async loadDB() {
                try {
                    const res = await fetch('planner_db.json');
                    const db = await res.json();
                    
                    const uniqueRunes = []; const seenR = new Set();
                    if(db.runes) db.runes.forEach(r => { if(r.n.startsWith('Superior Rune') && !seenR.has(r.n)) { seenR.add(r.n); uniqueRunes.push(r); } });
                    
                    const uniqueSigils = []; const seenS = new Set();
                    if(db.sigils) db.sigils.forEach(s => { if(s.n.startsWith('Superior Sigil') && !seenS.has(s.n)) { seenS.add(s.n); uniqueSigils.push(s); } });

                    const uniqueStats = []; const seenSt = new Set();
                    if(db.stats) db.stats.forEach(s => {
                        let name = s.name;
                        if(!name) {
                            if(s.attributes && s.attributes.length >= 7) name = "Celestial";
                            else return; 
                        }
                        
                        if(!seenSt.has(name)) {
                            seenSt.add(name);
                            let maj = [], min = [];
                            let attrs = s.attributes || [];
                            if(!Array.isArray(attrs)) attrs = Object.entries(attrs).map(([k,v]) => ({attribute:k, multiplier:v}));
                            
                            let maxMult = 0;
                            attrs.forEach(a => { if(a.multiplier > maxMult) maxMult = a.multiplier; });

                            attrs.forEach(a => {
                                let k = a.attribute;
                                if(k==='CritDamage') k='Ferocity'; 
                                if(k==='ConditionDuration') k='Expertise'; 
                                if(k==='BoonDuration') k='Concentration';
                                if(k==='Healing') k='HealingPower';
                                
                                if(a.multiplier >= maxMult * 0.9) maj.push(k); else min.push(k);
                            });
                            uniqueStats.push({ id: name, maj, min, all: (maj.length+min.length)>=7 });
                        }
                    });
                    
                    uniqueStats.sort((a,b) => a.id.localeCompare(b.id));

                    if(db.jade_cores) {
                        const tierVitMap = {
                            "Tier 1": 23, "Tier 2": 47, "Tier 3": 70, "Tier 4": 94, "Tier 5": 118,
                            "Tier 6": 141, "Tier 7": 165, "Tier 8": 188, "Tier 9": 211, "Tier 10": 235
                        };
                        db.jade_cores.forEach(c => {
                            let match = c.n.match(/Tier (\d+)/);
                            if(match) c.vit = tierVitMap["Tier " + match[1]] || 0;
                        });
                    }

                    this.db = { stats: uniqueStats, runes: uniqueRunes, sigils: uniqueSigils, relics: db.relics || [], jade_cores: db.jade_cores || [] };
                    this.statsList = uniqueStats;

                } catch(e) { console.log("No planner_db.json found."); }
            },
            
            formatFact(fact) {
                let html = '<div style="display:flex; align-items:center; gap:6px; font-size:11px; color:#fff; margin-top:2px; font-family:sans-serif;">';
                if(fact.icon) html += '<img src="' + fact.icon + '" style="width:16px; height:16px; object-fit:contain;">';
                else html += '<div style="width:16px; height:16px;"></div>';
                
                if(fact.type === 'Damage') html += 'Damage: ' + (fact.hit_count > 1 ? fact.hit_count + 'x ' : '') + '<span style="color:#ffaa00;">Calculated</span>';
                else if(fact.type === 'Number') html += fact.text + ': ' + fact.value;
                else if(fact.type === 'Distance' || fact.type === 'Radius') html += fact.text + ': ' + fact.distance;
                else if(fact.type === 'Time') html += fact.text + ': ' + fact.duration + 's';
                else if(fact.type === 'Buff' || fact.type === 'PrefixedBuff') html += (fact.status || '') + (fact.duration ? ' (' + fact.duration + 's)' : '') + (fact.apply_count > 1 ? ' x' + fact.apply_count : '') + (fact.description ? ' - ' + fact.description : '');
                else if(fact.type === 'AttributeAdjust') html += fact.text + ': +' + fact.value;
                else if(fact.type === 'Percent') html += fact.text + ': ' + fact.percent + '%';
                else if(fact.type === 'ComboField') html += 'Combo Field: ' + fact.field_type;
                else if(fact.type === 'ComboFinisher') html += 'Combo Finisher: ' + fact.finisher_type + ' (' + fact.percent + '%)';
                else if(fact.type === 'Unblockable') html += 'Unblockable';
                else html += (fact.text || fact.type);
                html += '</div>';
                return html;
            },
            buildSkillTooltip(sk) {
                let tt = '<div style="display:flex; gap:10px; margin-bottom:5px;">';
                tt += '<img src="' + sk.icon + '" style="width:32px; height:32px; border:1px solid #332a1e; flex-shrink:0;">';
                tt += '<div style="display:flex; flex-direction:column;">';
                tt += '<span style="color:#f0dca5; font-weight:bold; font-size:14px; margin-bottom:4px;">' + sk.name + '</span>';

                if(sk.facts && sk.facts.length > 0) {
                    tt += '<div style="display:flex; flex-direction:column; gap:2px; margin-top:5px; border-top:1px solid #332a1e; padding-top:5px;">';

            },
            buildTraitTooltip(tr) {
                let tt = '<span style="color:#f0dca5; font-weight:bold; font-size:14px;">' + tr.name + '</span><br>';
                if(tr.description) tt += '<span style="color:#aaa; font-size:12px; margin-bottom:6px; display:block; white-space:pre-wrap; font-family:sans-serif;">' + tr.description.replace(/<c=@([^>]+)>(.*?)<\/c>/g, '<span style="color:#00ff00;">$2</span>').replace(/<[^>]*>?/gm, '') + '</span>';
                if(tr.facts && tr.facts.length > 0) {
                    tt += '<div style="display:flex; flex-direction:column; gap:2px; margin-top:5px; border-top:1px solid #332a1e; padding-top:5px;">';

            },
            bindTooltips(container) {
                const els = container.hasAttribute('data-tt') ? [container] : container.querySelectorAll('[data-tt]');
                els.forEach(el => {
                    el.onmouseover = (e) => this.showTip(decodeURIComponent(el.getAttribute('data-tt')), e);
                    el.onmouseout = () => this.hideTip();
                });
            },

			bindEvents() {

				document.getElementById('btn-swap-water').onclick = () => { this.wsetWater = this.wsetWater === 1 ? 2 : 1; this.env = 'water'; this.updateView(); };
				document.getElementById('btn-env-land').onclick = () => { this.env = 'land'; this.updateView(); };
				document.getElementById('btn-env-water').onclick = () => { this.env = 'water'; this.updateView(); };
				
                document.getElementById('btn-save').onclick = () => this.saveLocal();
				document.getElementById('btn-load').onclick = () => {
                    this.refreshLoadList();
                    document.getElementById('load-modal').style.display = 'block';
                };
				document.getElementById('btn-modal-cancel').onclick = () => document.getElementById('load-modal').style.display = 'none';
				document.getElementById('btn-modal-load').onclick = () => this.handleModalLoad();
                document.getElementById('btn-modal-delete').onclick = () => this.deleteSavedBuild();
				document.getElementById('btn-copy').onclick = () => this.copyCode();
                
                document.getElementById('btn-clear').onclick = () => document.getElementById('clear-modal').style.display = 'block';
                document.getElementById('btn-clear-cancel').onclick = () => document.getElementById('clear-modal').style.display = 'none';
                document.getElementById('btn-clear-confirm').onclick = () => this.clearBuild();
                
                document.getElementById('cfg-apply').onclick = () => this.applyConfig();

			},
            saveLastState() {
                localStorage.setItem('gw2_planner_last_state', JSON.stringify(this.state));
            },
            clearBuild() {
                this.state = { 
                    name: "New Build", 
                    profession: document.getElementById('class-select').value, 
                    equipment: {},
