            },
			async loadClass(className) {
				this.state.profession = className;
                document.querySelectorAll('.item-slot').forEach(slotEl => {
                    const slot = slotEl.getAttribute('data-slot');
                    this.state.equipment[slot] = { id: null, stat: null, rune: null, rune2: null, infusion1: null, infusion2: null, infusion3: null };
                });
                this.state.equipment.JadeBot = { id: null, vit: 0 };
                this.state.skills = { land: { Heal: null, Utility1: null, Utility2: null, Utility3: null, Elite: null }, water: { Heal: null, Utility1: null, Utility2: null, Utility3: null, Elite: null } };
                this.state.traits = [{spec:null, traits:[null,null,null]}, {spec:null, traits:[null,null,null]}, {spec:null, traits:[null,null,null]}];
                
                try {
                    const res = await fetch(`https://api.guildwars2.com/v2/professions/${className}`);
                    this.cache.profData = await res.json();
                } catch(e) {}

				this.renderEquipment();
                this.renderTraits();
				this.updateView();
                this.saveLastState();
			},
			renderEquipment() {
				const weight = this.weightMap[this.state.profession];
				document.querySelectorAll('.item-slot').forEach(slot => {
					const slotName = slot.getAttribute('data-slot');
					let img = slot.querySelector('img');
					if(!img) { img = document.createElement('img'); slot.appendChild(img); }
					
                    let itemState = this.state.equipment[slotName] || {};
                    
                    let mainText = this.tooltipLabels[slotName] || slotName;
                    if(slotName.startsWith('Weapon') && itemState.id) {
                        const wMatch = [].concat(this.weapons.Land1HMain, this.weapons.Land1HOff, this.weapons.Land2H, this.weapons.Water).find(w => w.id == itemState.id);
                        if(wMatch) mainText = wMatch.n;
                    } else if (slotName === 'JadeBot' && (itemState.id || itemState.vit)) {
                        const dbJC = this.db.jade_cores || [];
                        const jObj = dbJC.find(j=>j.id==itemState.id) || this.jadeCores.find(j=>j.id==itemState.id) || this.jadeCores.find(j=>j.vit==itemState.vit) || dbJC.find(j=>j.vit==itemState.vit);
                        if(jObj) mainText = jObj.n;
                    }
                    
                    let tooltip = '<span style="color:#f0dca5; font-weight:bold;">' + mainText + '</span>';
                    
                    if(itemState.stat) tooltip += '<br><span style="color:#00ff00;">' + itemState.stat + '</span>';
                    
                    if(slotName === 'Relic' && itemState.rune && this.db.relics) {
                        const rMatch = this.db.relics.find(r => r.id == itemState.rune);
                        if(rMatch) tooltip += '<br><span style="color:#e2c07d;">' + rMatch.n + '</span>';
                    } else if(itemState.rune && this.db.runes && this.db.sigils) {
                        const uMatch = this.db.runes.find(r => r.id == itemState.rune) || this.db.sigils.find(s => s.id == itemState.rune);
                        if(uMatch) tooltip += '<br><span style="color:#62A4DA;">' + uMatch.n + '</span>';
                    }

                    if(itemState.rune2 && this.db.sigils) {
                        const uMatch2 = this.db.sigils.find(s => s.id == itemState.rune2);
                        if(uMatch2) tooltip += '<br><span style="color:#62A4DA;">' + uMatch2.n + '</span>';
                    }

                    if(itemState.infusion1) {
                        const iMatch = this.infusionsList.find(i => i.id === itemState.infusion1);
                        if(iMatch) tooltip += '<br><span style="color:#95c5ff;">' + iMatch.n + '</span>';
                    }
                    if(itemState.infusion2) {
                        const iMatch = this.infusionsList.find(i => i.id === itemState.infusion2);
                        if(iMatch) tooltip += '<br><span style="color:#95c5ff;">' + iMatch.n + '</span>';
                    }
                    if(itemState.infusion3) {
                        const iMatch = this.infusionsList.find(i => i.id === itemState.infusion3);
                        if(iMatch) tooltip += '<br><span style="color:#95c5ff;">' + iMatch.n + '</span>';
                    }

					slot.onmouseover = (e) => this.showTip(tooltip, e);
                    slot.onmouseout = () => this.hideTip();

                    if(slotName === 'JadeBot') {
                        const dbJC = this.db.jade_cores || [];
                        const jObj = dbJC.find(j=>j.id==itemState.id) || this.jadeCores.find(j=>j.id==itemState.id) || this.jadeCores.find(j=>j.vit==itemState.vit) || dbJC.find(j=>j.vit==itemState.vit);
                        if(jObj) { 
                            img.src = jObj.i; 
                            slot.classList.add('rarity-Legendary'); 
                        } else { 
                            img.src = this.emptyWiki[slotName]; 
                            slot.classList.remove('rarity-Legendary'); 
                        }
                        return;
                    }

                    const isArmor = !!this.armorWiki[weight][slotName];
                    const isTrinket = !!this.trinketWiki[slotName];

					if (itemState.id) {
                        const allWeps = [].concat(this.weapons.Land1HMain, this.weapons.Land1HOff, this.weapons.Land2H, this.weapons.Water);
                        const wepMatch = allWeps.find(w => w.id == itemState.id);
                        img.src = wepMatch ? wepMatch.icon : (this.emptyWiki[slotName] || "");
                        slot.classList.add('rarity-Legendary');
                    } else if (isArmor) { 
                        img.src = this.armorWiki[weight][slotName]; 
                        slot.classList.remove('rarity-Legendary'); 
                    } else if (isTrinket) { 
                        img.src = this.trinketWiki[slotName]; 
                        slot.classList.remove('rarity-Legendary'); 
                    } else {
						img.src = this.emptyWiki[slotName] || "";
						slot.classList.remove('rarity-Legendary');
					}
                    
                    let wA1 = this.state.equipment.WeaponA1;
                    let wB1 = this.state.equipment.WeaponB1;
                    if(slotName === 'WeaponA2' && wA1 && wA1.id && this.weapons.Land2H.find(w=>w.id==wA1.id)) slot.style.opacity = 0.2;
                    else if(slotName === 'WeaponB2' && wB1 && wB1.id && this.weapons.Land2H.find(w=>w.id==wB1.id)) slot.style.opacity = 0.2;
                    else slot.style.opacity = 1;
				});
                this.calculateAttributes();
                this.renderSkills();
			},
            async renderSkills() {
                const envStr = this.env;
                ['Heal', 'Utility1', 'Utility2', 'Utility3', 'Elite'].forEach(type => {
                    const slot = document.querySelector('.skill-slot[data-skill="' + type + '"]');
                    const skId = this.state.skills[envStr][type];
                    if(!slot) return;
                    slot.innerHTML = '';
                    if(skId && this.cache.skills[skId]) {
                        const sk = this.cache.skills[skId];
                        slot.innerHTML = '<img src="' + sk.icon + '">';
                        slot.setAttribute('data-tt', encodeURIComponent(this.buildSkillTooltip(sk)));
                    } else {
                        slot.removeAttribute('data-tt');
                        slot.onmouseover = null; slot.onmouseout = null;
                    }
                });
                this.bindTooltips(document.getElementById('utility-skills'));

                const wepRow = document.getElementById('weapon-skills');
                if(!this.cache.profData) return;

                let mSlot = '', oSlot = '';
                let wSet = this.env === 'land' ? this.wsetLand : this.wsetWater;
                if(this.env === 'land') { mSlot = wSet === 1 ? 'WeaponA1' : 'WeaponB1'; oSlot = wSet === 1 ? 'WeaponA2' : 'WeaponB2'; } 
                else { mSlot = wSet === 1 ? 'WeaponAquaticA' : 'WeaponAquaticB'; }

                let mhWep = this.state.equipment[mSlot] ? this.state.equipment[mSlot].id : null;
                let ohWep = this.state.equipment[oSlot] ? this.state.equipment[oSlot].id : null;

                const allWeps = [].concat(this.weapons.Land1HMain, this.weapons.Land1HOff, this.weapons.Land2H, this.weapons.Water);
                const mObj = allWeps.find(w => w.id == mhWep);
                const oObj = allWeps.find(w => w.id == ohWep);

                let skillsToLoad = [null, null, null, null, null];

                const getWepData = (wObj) => {
                    if (!wObj || !this.cache.profData || !this.cache.profData.weapons) return null;
                    let b = wObj.type.toLowerCase().replace(/ /g, '');
                    let aliases = [b];
                    if (b === 'spear' || b === 'harpoon') aliases.push('spear', 'harpoon');
                    if (b === 'speargun' || b === 'harpoongun') aliases.push('speargun', 'harpoongun', 'harpoon-gun');
                    if (b === 'shortbow') aliases.push('shortbow');
                    if (b === 'longbow') aliases.push('longbow');
                    let matchedKey = Object.keys(this.cache.profData.weapons).find(k => aliases.includes(k.toLowerCase().replace(/ /g, '')));
                    return matchedKey ? this.cache.profData.weapons[matchedKey] : null;
                };

                const mhWepData = getWepData(mObj);
                if(mhWepData) {
                    const ws = mhWepData.skills;
                    ws.forEach(s => {
                        if(s.slot === 'Weapon_1') skillsToLoad[0] = s.id;
                        if(s.slot === 'Weapon_2') skillsToLoad[1] = s.id;
                        if(s.slot === 'Weapon_3') skillsToLoad[2] = s.id;
                        if(this.weapons.Land2H.find(w=>w.id==mObj.id) || mObj.type==='Spear' || mObj.type==='Trident' || mObj.type==='Speargun') {
                            if(s.slot === 'Weapon_4') skillsToLoad[3] = s.id;
                            if(s.slot === 'Weapon_5') skillsToLoad[4] = s.id;
                        }
                    });
                }
                const ohWepData = getWepData(oObj);
                if(ohWepData && (!mObj || !this.weapons.Land2H.find(w=>w.id==mObj.id))) {
                    const ws = ohWepData.skills;
                    ws.forEach(s => {
                        if(s.slot === 'Weapon_4') skillsToLoad[3] = s.id;
                        if(s.slot === 'Weapon_5') skillsToLoad[4] = s.id;
                    });
                }

                let missingSkills = skillsToLoad.filter(id => id && !this.cache.skills[id]);
                if(missingSkills.length > 0) {
                    try {
                        const res = await fetch(`https://api.guildwars2.com/v2/skills?ids=${missingSkills.join(',')}`);
                        const data = await res.json();
                        data.forEach(sk => { this.cache.skills[sk.id] = sk; });
                    } catch(e) {}
                }

                wepRow.innerHTML = '';
                for(let i=0; i<5; i++) {
                    const div = document.createElement('div'); div.className = 'skill-slot';
                    const sId = skillsToLoad[i];
                    if(sId && this.cache.skills[sId]) {
                        const sk = this.cache.skills[sId];
                        div.innerHTML = '<img src="' + sk.icon + '">';
                        div.setAttribute('data-tt', encodeURIComponent(this.buildSkillTooltip(sk)));
                    }
                    wepRow.appendChild(div);
                }
                this.bindTooltips(wepRow);
            },
            async renderTraits() {
                const container = document.getElementById('traits-container');
                container.innerHTML = '<div style="font-size: 14px; font-weight:bold; color: #fff; margin-bottom: 10px; border-bottom: 1px solid #4a3b2a; padding-bottom: 5px;">TRAITS</div>';
                
                const display = document.createElement('div');
                display.className = 'trait-line-container';
                container.appendChild(display);

                for (let i = 0; i < 3; i++) {
                    const tData = this.state.traits[i];
                    const line = document.createElement('div');
                    line.className = 'trait-line' + (tData.spec ? ' active' : '');
                    
                    line.innerHTML = '<div class="trait-overlay"></div>';
                    
                    if(!tData.spec) {
                        line.innerHTML += '<div class="trait-content"><div class="trait-spec-box" onclick="PLANNER.openSpecConfig(' + i + ')"><span style="color:#8a7a5f; font-size:24px; font-weight:bold;">+</span></div></div>';
                        display.appendChild(line);
                        continue; 
                    }
                    
                    if(!this.cache.specs[tData.spec]) {
                        try {
                            const res = await fetch(`https://api.guildwars2.com/v2/specializations/${tData.spec}`);
                            this.cache.specs[tData.spec] = await res.json();
                        } catch(e) {}
                    }

                    const spec = this.cache.specs[tData.spec];
                    if(spec) {
                        line.style.backgroundImage = 'url(' + spec.background + ')';
                        let html = '<div class="trait-content">';
                        
                        html += '<div class="trait-spec-box active" onclick="PLANNER.openSpecConfig(' + i + ')"><img src="' + spec.icon + '" class="trait-spec-icon" data-tt="' + encodeURIComponent('<span style="color:#f0dca5; font-weight:bold;">' + spec.name + '</span>') + '"></div>';
                        
                        let traitsToFetch = [];
                        if (spec.minor_traits) traitsToFetch.push(...spec.minor_traits);
                        if (spec.major_traits) traitsToFetch.push(...spec.major_traits);
                        traitsToFetch = traitsToFetch.filter(id => !this.cache.traits[id]);
                        
                        if (traitsToFetch.length > 0) {
                            try {
                                const trRes = await fetch(`https://api.guildwars2.com/v2/traits?ids=${traitsToFetch.join(',')}`);
                                const trData = await trRes.json();
                                trData.forEach(t => { this.cache.traits[t.id] = t; });
                            } catch(e) {}
                        }

                        [0,1,2].forEach(tier => {
                            const minorId = spec.minor_traits ? spec.minor_traits[tier] : null;
                            if(minorId && this.cache.traits[minorId]) {
                                const tr = this.cache.traits[minorId];
                                const encodedTip = encodeURIComponent(this.buildTraitTooltip(tr));
                                html += '<div class="trait-minor-box" data-tt="' + encodedTip + '"><img src="' + tr.icon + '" class="trait-minor-icon"></div>';
                            } else {
                                html += '<div class="trait-minor-box"></div>';
                            }

                            const majIds = spec.major_traits.slice(tier * 3, tier * 3 + 3);
                            html += '<div class="trait-tier-col">';
                            majIds.forEach(mId => {
                                const mTr = this.cache.traits[mId];
                                if(mTr) {
                                    const isSel = tData.traits[tier] === mId;
                                    const encodedTip = encodeURIComponent(this.buildTraitTooltip(mTr));
                                    html += '<div class="trait-major-box ' + (isSel?'active':'') + '" data-tt="' + encodedTip + '" onclick="PLANNER.selectMajorTrait(' + i + ', ' + tier + ', ' + mId + ')"><img src="' + mTr.icon + '" class="trait-major-icon"></div>';
                                }
                            });
                            html += '</div>';
                        });
                        html += '</div>';
                        line.innerHTML += html;
                    }
                    display.appendChild(line);
                    this.bindTooltips(line);
                }
            },
			updateView() {
				document.getElementById('row-weapon1').style.opacity = (this.env === 'land' && this.wsetLand === 1) ? '1' : '0.4';
				document.getElementById('row-weapon2').style.opacity = (this.env === 'land' && this.wsetLand === 2) ? '1' : '0.4';
				document.getElementById('row-aquaticA').style.opacity = (this.env === 'water' && this.wsetWater === 1) ? '1' : '0.4';
				document.getElementById('row-aquaticB').style.opacity = (this.env === 'water' && this.wsetWater === 2) ? '1' : '0.4';
                document.getElementById('btn-env-land').style.opacity = this.env === 'land' ? '1' : '0.3';
				document.getElementById('btn-env-water').style.opacity = this.env === 'water' ? '1' : '0.3';
                this.renderSkills();
                this.calculateAttributes();
			},
            calculateAttributes() {
                let stats = { Power:1000, Toughness:1000, Vitality:1000, Precision:1000, Ferocity:0, ConditionDamage:0, HealingPower:0, Expertise:0, Concentration:0, AR:0, Defense:0, CondiDurBonus:0, BoonDurBonus:0 };
                
                const jBot = this.state.equipment.JadeBot;
                if (jBot && (jBot.id || jBot.vit)) {
                    const dbJC = this.db.jade_cores || [];
                    const jObj = dbJC.find(c => c.id == jBot.id) || this.jadeCores.find(c => c.id == jBot.id) || this.jadeCores.find(c => c.vit == jBot.vit) || dbJC.find(c => c.vit == jBot.vit);
                    if (jObj && jObj.vit) stats.Vitality += jObj.vit;
                    else if (jBot.vit) stats.Vitality += jBot.vit;
                }

                const weight = this.weightMap[this.state.profession];
                const defenseMap = {
                    Heavy: { Helm: 127, Shoulders: 127, Coat: 400, Gloves: 127, Leggings: 267, Boots: 127 },
                    Medium: { Helm: 112, Shoulders: 112, Coat: 396, Gloves: 112, Leggings: 259, Boots: 112 },
                    Light: { Helm: 86, Shoulders: 86, Coat: 396, Gloves: 86, Leggings: 259, Boots: 86 }
                };

                let equippedRunes = {};

                Object.keys(this.statBudgets).forEach(slot => {
                    const item = this.state.equipment[slot];
                    if(!item) return;

                    const isLand = this.env === 'land';
                    if(slot.startsWith('Weapon')) {
                        if(isLand && this.wsetLand === 1 && (slot==='WeaponB1'||slot==='WeaponB2')) return;
                        if(isLand && this.wsetLand === 2 && (slot==='WeaponA1'||slot==='WeaponA2')) return;
                        if(!isLand && this.wsetWater === 1 && slot==='WeaponAquaticB') return;
                        if(!isLand && this.wsetWater === 2 && slot==='WeaponAquaticA') return;
                        if(!isLand && !slot.includes('Aquatic')) return;
                        if(isLand && slot.includes('Aquatic')) return;
                        
                        let wA1 = this.state.equipment.WeaponA1;
                        let wB1 = this.state.equipment.WeaponB1;
                        if(slot === 'WeaponA2' && wA1 && wA1.id && this.weapons.Land2H.find(w=>w.id==wA1.id)) return;
                        if(slot === 'WeaponB2' && wB1 && wB1.id && this.weapons.Land2H.find(w=>w.id==wB1.id)) return;

                        if(!item.id) return; 

                        const allWeps = [].concat(this.weapons.Land1HMain, this.weapons.Land1HOff, this.weapons.Land2H, this.weapons.Water);
                        const wMatch = allWeps.find(w => w.id == item.id);
                        if(wMatch && wMatch.type === 'Shield') stats.Defense += 68;
                    }

                    if(slot === 'HelmAquatic' && isLand) return;
                    if(slot === 'Helm' && !isLand) return;

                    if(defenseMap[weight][slot] && item.stat) {
                        stats.Defense += defenseMap[weight][slot];
                    }

                    let budget = this.statBudgets[slot];
                    if((slot==='WeaponA1'||slot==='WeaponB1') && item.id && this.weapons.Land2H.find(w=>w.id==item.id)) {
                        budget = {maj: 251, min: 179};
                    }

                    if(item.stat && this.statsList) {
                        const statDef = this.statsList.find(s => s.id === item.stat);
                        if(statDef) {
                            if(statDef.all) {
                                let cMaj = Math.round(budget.maj * 0.447);
                                ['Power','Toughness','Vitality','Precision','Ferocity','ConditionDamage','HealingPower','Expertise','Concentration'].forEach(a => stats[a]+=cMaj);
                            } else {
                                let bMaj = budget.maj; let bMin = budget.min;
                                if(statDef.maj.length + statDef.min.length === 4) {
                                    bMaj = Math.round(budget.maj * 0.858);
                                    bMin = Math.round(budget.min * 0.633);
                                }
                                statDef.maj.forEach(a => stats[a] += bMaj);
                                statDef.min.forEach(a => stats[a] += bMin);
                            }
                        }
                    }
                    
                    const processInfusion = (infId) => {
                        if(!infId) return;
                        const match = this.infusionsList.find(i => i.id === infId);
                        if(match && match.a) {
                            Object.entries(match.a).forEach(([k,v]) => {
                                if(stats[k] !== undefined) stats[k] += v;
                            });
                        }
                    };
                    processInfusion(item.infusion1);
                    processInfusion(item.infusion2);
                    processInfusion(item.infusion3);

                    if(!slot.startsWith('Weapon') && item.rune && !slot.includes('Ring') && !slot.includes('Accessory') && !slot.includes('Amulet') && slot !== 'Backpack' && slot !== 'Relic') {
                        equippedRunes[item.rune] = (equippedRunes[item.rune] || 0) + 1;
                    }
                });

                Object.entries(equippedRunes).forEach(([rId, count]) => {
                    const runeDef = this.db.runes && this.db.runes.find(r => r.id == rId);
                    if(runeDef && runeDef.b) {
                        const activeBonuses = runeDef.b.slice(0, Math.min(count, 6));
                        activeBonuses.forEach(bText => {
                            const match = bText.match(/\+(\d+)(%?) (.*)/);
                            if(match) {
                                const val = parseInt(match[1]);
                                const isPercent = match[2] === '%';
                                let statStr = match[3].trim();
                                
                                if(statStr === 'All Stats') {
                                    ['Power','Toughness','Vitality','Precision','Ferocity','ConditionDamage','HealingPower','Expertise','Concentration'].forEach(a => stats[a]+=val);
                                } else if(isPercent) {
                                    if(statStr === 'Condition Duration') stats.CondiDurBonus += val;
                                    else if(statStr === 'Boon Duration') stats.BoonDurBonus += val;
                                } else {
                                    if(statStr === 'Condition Damage') statStr = 'ConditionDamage';
                                    if(statStr === 'Healing Power') statStr = 'HealingPower';
                                    if(stats[statStr] !== undefined) stats[statStr] += val;
                                }
                            }
                        });
                    }
                });

                const actSkills = this.state.skills[this.env];
                Object.values(actSkills).forEach(sId => {
                    if(!sId) return;
                    const sk = this.cache.skills[sId];
                    if(sk && sk.facts) {
                        sk.facts.forEach(f => {
                            if(f.type === 'AttributeAdjust' && f.target) {
                                let t = f.target;
                                if(t==='CritDamage') t='Ferocity'; if(t==='ConditionDuration') t='Expertise'; if(t==='BoonDuration') t='Concentration';
                                if(stats[t] !== undefined) stats[t] += f.value;
                            }
                        });
                    }
                });

                const healthBase = { "Warrior":9212, "Necromancer":9212, "Revenant":5922, "Engineer":5922, "Ranger":5922, "Mesmer":5922, "Guardian":1645, "Thief":1645, "Elementalist":1645 }[this.state.profession] || 5922;
                const health = (stats.Vitality * 10) + healthBase;
                const crit = (5 + (stats.Precision - 1000) / 21).toFixed(2);
                const critDmg = (150 + stats.Ferocity / 15).toFixed(1);
                const condiDur = ((stats.Expertise / 15) + stats.CondiDurBonus).toFixed(2);
                const boonDur = ((stats.Concentration / 15) + stats.BoonDurBonus).toFixed(2);
                const armor = stats.Toughness + stats.Defense;

                document.getElementById('val-Power').innerText = stats.Power;
                document.getElementById('val-Toughness').innerText = stats.Toughness;
                document.getElementById('val-Armor').innerText = armor;
                document.getElementById('val-Vitality').innerText = stats.Vitality;
                document.getElementById('val-Health').innerText = health.toLocaleString();
                document.getElementById('val-Precision').innerText = stats.Precision;
                document.getElementById('val-CritChance').innerText = crit + '%';
                document.getElementById('val-Ferocity').innerText = stats.Ferocity;
                document.getElementById('val-CritDmg').innerText = critDmg + '%';
                document.getElementById('val-CondiDmg').innerText = stats.ConditionDamage;
                document.getElementById('val-Healing').innerText = stats.HealingPower;
                document.getElementById('val-Expertise').innerText = stats.Expertise;
                document.getElementById('val-CondiDur').innerText = condiDur + '%';
                document.getElementById('val-Concentration').innerText = stats.Concentration;
                document.getElementById('val-BoonDur').innerText = boonDur + '%';
                document.getElementById('val-AR').innerText = stats.AR;

                this.bindTooltips(document.getElementById('attr-display'));
            },

            openSlotConfig(slotName) {
                const modal = document.getElementById('config-modal');
                document.getElementById('cfg-header-name').innerText = this.tooltipLabels[slotName] || slotName;
                this.configSlot = slotName;
                this.tempConfig = Object.assign({id:null, stat:null, rune:null, rune2:null, infusion1:null, infusion2:null, infusion3:null}, this.state.equipment[slotName] || {});

                if(slotName.startsWith('Weapon')) {
                    let wA1 = this.state.equipment.WeaponA1;
                    let wB1 = this.state.equipment.WeaponB1;
                    if((slotName==='WeaponA2' && wA1 && wA1.id && this.weapons.Land2H.find(w=>w.id==wA1.id)) ||
                       (slotName==='WeaponB2' && wB1 && wB1.id && this.weapons.Land2H.find(w=>w.id==wB1.id))) {
                        document.getElementById('cfg-boxes-container').innerHTML = '<div style="color:#ff4444; padding:10px;">Slot disabled by Two-Handed Weapon in Main Hand.</div>';
                        document.getElementById('cfg-list-scroll').innerHTML = '';
                        document.getElementById('cfg-apply').style.display = 'none';
                        modal.style.display = 'flex'; return;
                    }
                }
                document.getElementById('cfg-apply').style.display = 'block';

                this.configTabs = [];
                if(slotName.startsWith('Weapon')) this.configTabs.push({ id: 'wep', label: 'Weapon', type: 'weapon' });
                else if(slotName === 'JadeBot') this.configTabs.push({ id: 'jade', label: 'Core', type: 'jade' });
                else if(slotName === 'Relic') this.configTabs.push({ id: 'relic', label: 'Relic', type: 'relic' });
                
                if(slotName !== 'JadeBot' && slotName !== 'Relic') {
                    this.configTabs.push({ id: 'stat', label: 'Stats', type: 'stat' });
                    if(!slotName.includes('Ring') && !slotName.includes('Accessory') && !slotName.includes('Amulet') && slotName !== 'Backpack') {
                        this.configTabs.push({ id: 'upg', label: 'Upgrade', type: 'upgrade' });
                    }
                    if(slotName.startsWith('Weapon') && this.tempConfig.id) {
                        const is2H = this.weapons.Land2H.find(w=>w.id==this.tempConfig.id) || this.weapons.Water.find(w=>w.id==this.tempConfig.id);
                        if(is2H) this.configTabs.push({ id: 'upg2', label: 'Upgrade 2', type: 'upgrade2' });
                    }
                    if(slotName !== 'Amulet') {
                        this.configTabs.push({ id: 'inf1', label: 'Infusion', type: 'infusion1' });
                    }
                    if(slotName === 'Backpack' || slotName.includes('Ring') || (slotName.startsWith('Weapon') && this.tempConfig.id && this.weapons.Land2H.find(w=>w.id==this.tempConfig.id))) {
                        this.configTabs.push({ id: 'inf2', label: 'Infusion 2', type: 'infusion2' });
                    }
                    if(slotName.includes('Ring')) {
                        this.configTabs.push({ id: 'inf3', label: 'Infusion 3', type: 'infusion3' });
                    }
                }

                this.activeTab = this.configTabs[0].id;
                this.renderConfigLeft();
                this.renderConfigRight();
                modal.style.display = 'flex';
            },

            renderConfigLeft() {
                const container = document.getElementById('cfg-boxes-container');
                container.innerHTML = '';
                
                this.configTabs.forEach(t => {
                    const isActive = this.activeTab === t.id ? 'active' : '';
                    let mainText = 'Empty';
                    let subText = 'Select ' + t.label;

                    if(t.type === 'weapon' && this.tempConfig.id) {
                        let wObj = [].concat(this.weapons.Land1HMain, this.weapons.Land1HOff, this.weapons.Land2H, this.weapons.Water).find(w=>w.id==this.tempConfig.id);
                        if(wObj) { mainText = wObj.n; subText = wObj.type; }
                    } else if(t.type === 'jade' && (this.tempConfig.id || this.tempConfig.vit)) {
                        const dbJC = this.db.jade_cores || [];
                        let jObj = dbJC.find(j=>j.id==this.tempConfig.id) || this.jadeCores.find(j=>j.id==this.tempConfig.id) || this.jadeCores.find(j=>j.vit==this.tempConfig.vit) || dbJC.find(j=>j.vit==this.tempConfig.vit);
                        if(jObj) { mainText = jObj.n; subText = '+' + jObj.vit + ' Vitality'; }
                    } else if(t.type === 'relic' && this.tempConfig.rune) {
                        let rObj = this.db.relics && this.db.relics.find(r=>r.id==this.tempConfig.rune);
                        if(rObj) { mainText = rObj.n; subText = "Relic"; }
                    } else if(t.type === 'stat' && this.tempConfig.stat) {
                        let sObj = this.statsList.find(s=>s.id===this.tempConfig.stat);
                        if(sObj) { mainText = sObj.id; subText = "Stats"; }
                    } else if(t.type === 'upgrade' && this.tempConfig.rune) {
                        let uObj = this.configSlot.startsWith('Weapon') ? (this.db.sigils && this.db.sigils.find(s=>s.id==this.tempConfig.rune)) : (this.db.runes && this.db.runes.find(r=>r.id==this.tempConfig.rune));
                        if(uObj) { mainText = uObj.n; subText = "Upgrade"; }
                    } else if(t.type === 'upgrade2' && this.tempConfig.rune2) {
                        let uObj = this.db.sigils && this.db.sigils.find(s=>s.id==this.tempConfig.rune2);
                        if(uObj) { mainText = uObj.n; subText = "Upgrade 2"; }
                    } else if(t.type.startsWith('infusion')) {
                        let infId = t.type === 'infusion1' ? this.tempConfig.infusion1 : (t.type === 'infusion2' ? this.tempConfig.infusion2 : this.tempConfig.infusion3);
                        let iObj = this.infusionsList.find(i=>i.id===infId);
                        if(iObj) { mainText = iObj.n; subText = "Infusion"; }
                    }

                    const box = document.createElement('div');
                    box.className = 'cfg-box ' + isActive;
                    box.innerHTML = '<div class="cfg-box-text"><span class="cfg-box-title">' + mainText + '</span><span class="cfg-box-sub">' + subText + '</span></div>';
                    box.onclick = () => { this.activeTab = t.id; this.renderConfigLeft(); this.renderConfigRight(); };
                    container.appendChild(box);
                });
            },

            renderConfigRight() {
                const activeT = this.configTabs.find(t => t.id === this.activeTab);
                if(!activeT) return;

                document.getElementById('cfg-list-title').innerText = "Select " + activeT.label;
                const scroll = document.getElementById('cfg-list-scroll');
                scroll.innerHTML = '';
                
                const applyAllLabel = document.getElementById('cfg-apply-all-container');
                const applyAllCheck = document.getElementById('cfg-apply-all');
                
                if((activeT.type === 'stat' || activeT.type === 'upgrade') && this.configSlot !== 'JadeBot' && this.configSlot !== 'Relic') {
                    applyAllLabel.style.display = 'flex';
                } else {
                    applyAllLabel.style.display = 'none';
                    if(applyAllCheck) applyAllCheck.checked = false;
                }
                
                const searchInput = document.getElementById('cfg-search');
                if(activeT.type === 'stat' || activeT.type === 'upgrade' || activeT.type === 'upgrade2' || activeT.type === 'relic') {
                    searchInput.style.display = 'block';
                } else {
                    searchInput.style.display = 'none';
                    searchInput.value = '';
                }
                const searchTerm = searchInput.value.toLowerCase();

                const createItem = (id, icon, name, stats, desc, isSel, typeStr) => {
                    if (searchTerm && id && name.toLowerCase().indexOf(searchTerm) === -1) return;
                    
                    const d = document.createElement('div');
                    d.className = 'cfg-list-item ' + (isSel ? 'selected' : '');
                    const imgHtml = icon ? '<img src="' + icon + '">' : '';
                    d.innerHTML = imgHtml +
                                   '<div class="cfg-item-details">' +
                                     '<span class="cfg-item-name">' + name + '</span>' +
                                     (stats ? '<span class="cfg-item-stats">' + stats + '</span>' : '') +
                                     (desc ? '<span class="cfg-item-desc">' + desc + '</span>' : '') +
                                   '</div>';
                    d.onclick = () => {
                        if(typeStr === 'weapon' || typeStr === 'jade') {
                            this.tempConfig.id = id;
                            if (typeStr === 'weapon') {
                                const is2H = id && (this.weapons.Land2H.find(w=>w.id==id) || this.weapons.Water.find(w=>w.id==id));
                                const hasInf2 = this.configTabs.find(t=>t.id==='inf2');
                                const hasUpg2 = this.configTabs.find(t=>t.id==='upg2');
                                
                                if(this.configSlot === 'WeaponA1') {
                                    if(is2H) this.state.equipment.WeaponA2 = { id: null, stat: null, rune: null, rune2: null, infusion1: null, infusion2: null, infusion3: null };
                                }
                                if(this.configSlot === 'WeaponB1') {
                                    if(is2H) this.state.equipment.WeaponB2 = { id: null, stat: null, rune: null, rune2: null, infusion1: null, infusion2: null, infusion3: null };
                                }
                                
                                if(is2H && !hasUpg2) this.configTabs.push({ id: 'upg2', label: 'Upgrade 2', type: 'upgrade2' });
                                else if(!is2H && hasUpg2) {
                                    this.configTabs = this.configTabs.filter(t=>t.id!=='upg2');
                                    if(this.activeTab==='upg2') this.activeTab = 'upg';
                                    this.tempConfig.rune2 = null;
                                }

                                if(is2H && !hasInf2 && !this.configSlot.includes('Aquatic')) this.configTabs.push({ id: 'inf2', label: 'Infusion 2', type: 'infusion2' });
                                else if(!is2H && hasInf2 && !this.configSlot.includes('Aquatic')) {
                                    this.configTabs = this.configTabs.filter(t=>t.id!=='inf2');
                                    if(this.activeTab==='inf2') this.activeTab = 'inf1';
                                    this.tempConfig.infusion2 = null;
                                }
                            }
                        }
                        else if(typeStr === 'relic' || typeStr === 'upgrade') this.tempConfig.rune = id;
                        else if(typeStr === 'upgrade2') this.tempConfig.rune2 = id;
                        else if(typeStr === 'stat') this.tempConfig.stat = id;
                        else if(typeStr === 'infusion1') this.tempConfig.infusion1 = id;
                        else if(typeStr === 'infusion2') this.tempConfig.infusion2 = id;
                        else if(typeStr === 'infusion3') this.tempConfig.infusion3 = id;

                        this.renderConfigLeft();
                        this.renderConfigRight();
                    };
                    scroll.appendChild(d);
                };

                const emptySel = !this.getTempId(activeT.type);
                createItem(null, "https://wiki.guildwars2.com/images/d/d0/Talk_end_option.png", "None", null, null, emptySel, activeT.type);

                if(activeT.type === 'weapon') {
                    let opts = [];
                    const pWeps = JSON.parse(JSON.stringify(this.profWeapons[this.state.profession]));

                    const eliteWeapons = {
                        "Dragonhunter": {Two:["Longbow"]}, "Firebrand": {Main:["Axe"]}, "Willbender": {Off:["Sword"]},
                        "Herald": {Off:["Shield"]}, "Renegade": {Two:["Shortbow"]}, "Vindicator": {Two:["Greatsword"]},
                        "Berserker": {Off:["Torch"]}, "Spellbreaker": {Main:["Dagger"], Off:["Dagger"]}, "Bladesworn": {Main:["Pistol"], Off:["Pistol"]},
                        "Scrapper": {Two:["Hammer"]}, "Holosmith": {Main:["Sword"]}, "Mechanist": {Main:["Mace"]},
                        "Druid": {Two:["Staff"]}, "Soulbeast": {Main:["Dagger"]}, "Untamed": {Two:["Hammer"]},
                        "Daredevil": {Two:["Staff"]}, "Deadeye": {Two:["Rifle"]}, "Specter": {Main:["Scepter"]},
                        "Tempest": {Off:["Warhorn"]}, "Weaver": {Main:["Sword"]}, "Catalyst": {Two:["Hammer"]},
                        "Chronomancer": {Off:["Shield"]}, "Mirage": {Main:["Axe"]}, "Virtuoso": {Main:["Dagger"]},
                        "Reaper": {Two:["Greatsword"]}, "Scourge": {Off:["Torch"]}, "Harbinger": {Main:["Pistol"]}
                    };

                    const bottomSpecId = this.state.traits[2].spec;
                    if(bottomSpecId && this.cache.specs[bottomSpecId]) {
                        const specName = this.cache.specs[bottomSpecId].name;
                        const ew = eliteWeapons[specName];
                        if(ew) {
                            if(ew.Main) pWeps.Main.push(...ew.Main);
                            if(ew.Off) pWeps.Off.push(...ew.Off);
                            if(ew.Two) pWeps.Two.push(...ew.Two);
                        }
                    }

                    if(this.configSlot.includes('Aquatic')) opts = this.weapons.Water.filter(w => pWeps.Water.includes(w.type));
                    else if(this.configSlot.endsWith('1')) {
                        opts = [].concat(this.weapons.Land1HMain.filter(w => pWeps.Main.includes(w.type)), this.weapons.Land2H.filter(w => pWeps.Two.includes(w.type)));
                    } else {
                        opts = this.weapons.Land1HOff.filter(w => pWeps.Off.includes(w.type));
                    }

                    const uniqueOpts = [];
                    const seenOpts = new Set();
                    opts.forEach(w => { if(!seenOpts.has(w.id)) { seenOpts.add(w.id); uniqueOpts.push(w); } });

                    uniqueOpts.forEach(w => createItem(w.id, w.icon, w.n, w.type, null, this.tempConfig.id == w.id, 'weapon'));
                } else if(activeT.type === 'jade') {
                    const dbJC = this.db.jade_cores || [];
                    dbJC.forEach(c => {
                        if(c.id) createItem(c.id, c.i, c.n, '+' + c.vit + ' Vitality', null, this.tempConfig.id == c.id, 'jade');
                    });
                } else if(activeT.type === 'relic') {
                    if(!this.db.relics) scroll.innerHTML += '<div style="color:#ff4444;">Database not loaded.</div>';
                    else this.db.relics.forEach(r => createItem(r.id, r.i, r.n, null, r.d.replace(/<[^>]*>?/gm, ''), this.tempConfig.rune == r.id, 'relic'));
                } else if(activeT.type === 'stat') {
                    let budget = this.statBudgets[this.configSlot];
                    if((this.configSlot==='WeaponA1'||this.configSlot==='WeaponB1') && this.tempConfig.id && this.weapons.Land2H.find(w=>w.id==this.tempConfig.id)) budget = {maj: 251, min: 179};
                    
                    const formatAttr = (a) => a.replace(/([A-Z])/g, ' $1').trim();
                    let sortedStats = [...this.statsList];

                    sortedStats.forEach(s => {
                        let statStr = "";
                        let sName = s.id || "Celestial";
                        if(budget) {
                            if(!s.all) {
                                let bMaj = budget.maj; let bMin = budget.min;
                                if(s.maj.length + s.min.length === 4) {
                                    bMaj = Math.round(budget.maj * 0.858);
                                    bMin = Math.round(budget.min * 0.633);
                                }
                                s.maj.forEach(a => statStr += '+' + bMaj + ' ' + formatAttr(a) + '\n');
                                s.min.forEach(a => statStr += '+' + bMin + ' ' + formatAttr(a) + '\n');
                            } else {
                                let cMaj = Math.round(budget.maj * 0.447);
                                ['Power','Precision','Toughness','Vitality','Ferocity','Condition Damage','Healing Power','Expertise','Concentration'].sort().forEach(a => statStr += '+' + cMaj + ' ' + a + '\n');
                            }
                        }
                        createItem(s.id, null, sName, statStr.trim(), null, this.tempConfig.stat === s.id, 'stat');
                    });
                } else if(activeT.type === 'upgrade' || activeT.type === 'upgrade2') {
                    const arr = this.configSlot.startsWith('Weapon') ? this.db.sigils : this.db.runes;
                    if(!arr) scroll.innerHTML += '<div style="color:#ff4444;">Database not loaded.</div>';
                    else arr.forEach(u => {
                        let desc = u.d ? u.d.replace(/<[^>]*>?/gm, '') : (u.b ? u.b.join('\n') : "");
                        let activeId = activeT.type === 'upgrade2' ? this.tempConfig.rune2 : this.tempConfig.rune;
                        createItem(u.id, u.i, u.n, null, desc, activeId == u.id, activeT.type);
                    });
                } else if(activeT.type.startsWith('infusion')) {
                    const tId = activeT.type === 'infusion1' ? this.tempConfig.infusion1 : (activeT.type === 'infusion2' ? this.tempConfig.infusion2 : this.tempConfig.infusion3);
                    this.infusionsList.forEach(inf => {
                        createItem(inf.id, inf.i, inf.n, inf.s, null, tId === inf.id, activeT.type);
                    });
                }
            },
            getTempId(type) {
                if(type === 'weapon' || type === 'jade') return this.tempConfig.id;
                if(type === 'relic' || type === 'upgrade') return this.tempConfig.rune;
                if(type === 'upgrade2') return this.tempConfig.rune2;
                if(type === 'stat') return this.tempConfig.stat;
                if(type === 'infusion1') return this.tempConfig.infusion1;
                if(type === 'infusion2') return this.tempConfig.infusion2;
                if(type === 'infusion3') return this.tempConfig.infusion3;
                return null;
            },
            applyConfig() {
                const applyAllCheck = document.getElementById('cfg-apply-all');
                const applyAll = applyAllCheck ? applyAllCheck.checked : false;
                
                if (this.configSlot === 'JadeBot') {
                    const dbJC = this.db.jade_cores || [];
                    const jObj = this.tempConfig.id ? dbJC.find(c=>c.id==this.tempConfig.id) : null;
                    const vit = jObj ? jObj.vit : 0;
                    this.state.equipment.JadeBot = { id: this.tempConfig.id, vit: vit };
                } else if (this.configSlot === 'Relic') {
                    this.state.equipment.Relic = { id: null, stat: null, rune: this.tempConfig.rune, rune2: null, infusion1: null, infusion2: null, infusion3: null };
                } else {
                    const updateSlot = (slot) => {
                        if(!this.state.equipment[slot]) this.state.equipment[slot] = {};
                        if(slot === this.configSlot) {
                           this.state.equipment[slot] = Object.assign({}, this.tempConfig);
                        } else if(applyAll) {
                           const activeT = this.configTabs.find(t => t.id === this.activeTab);
                           if(activeT.type === 'stat') this.state.equipment[slot].stat = this.tempConfig.stat;
                           if(activeT.type === 'upgrade') {
                               if(slot.startsWith('Weapon') === this.configSlot.startsWith('Weapon')) {
                                   this.state.equipment[slot].rune = this.tempConfig.rune;
                               }
                           }
                        }
                    };
                    
                    Object.keys(this.statBudgets).forEach(s => updateSlot(s));
                }

                this.renderEquipment();
                document.getElementById('config-modal').style.display = 'none';
                this.saveLastState();
            },
            
            async openSpecConfig(lineIdx) {
                if(!this.cache.profData) return;
                const modal = document.getElementById('skill-modal');
                document.getElementById('skill-title').innerText = "SELECT SPECIALIZATION";
                const content = document.getElementById('skill-content');
                content.innerHTML = '<div class="skill-grid-container" style="grid-template-columns: repeat(3, 1fr);"></div>';
                const grid = content.querySelector('.skill-grid-container');

                const specs = this.cache.profData.specializations;
                let toFetch = specs.filter(id => !this.cache.specs[id]);
                if(toFetch.length > 0) {
                    try {
                        const res = await fetch(`https://api.guildwars2.com/v2/specializations?ids=${toFetch.join(',')}`);
                        const data = await res.json();
                        data.forEach(sp => this.cache.specs[sp.id] = sp);
                    } catch(e){}
                }

                const selectedSpecs = this.state.traits.map(t => t.spec).filter(Boolean);

                for(let id of specs) {
                    const spec = this.cache.specs[id];
                    if(spec) {
                        if(this.state.traits[lineIdx].spec !== id && selectedSpecs.includes(id)) continue;
                        if(spec.elite && lineIdx !== 2) continue;

                        const div = document.createElement('div');
                        div.className = 'trait-spec-box';
                        if(this.state.traits[lineIdx].spec === id) div.classList.add('active');
                        div.innerHTML = '<img src="' + spec.icon + '" class="trait-spec-icon">';
                        div.onclick = () => {
                            this.state.traits[lineIdx].spec = id;
                            this.state.traits[lineIdx].traits = [null, null, null];
                            this.renderTraits();
                            modal.style.display = 'none';
                            this.saveLastState();
                        };
                        grid.appendChild(div);
                    }
                }
                modal.style.display = 'block';
            },

            selectMajorTrait(lineIdx, tier, traitId) {
                this.state.traits[lineIdx].traits[tier] = traitId;
                this.renderTraits();
                this.saveLastState();
            },

            async openSkillConfig(type) {
                const modal = document.getElementById('skill-modal');
                document.getElementById('skill-title').innerText = "SELECT " + type.toUpperCase();
                const content = document.getElementById('skill-content');
                content.innerHTML = '<div class="skill-none-row"><div class="skill-none-btn"><img src="https://wiki.guildwars2.com/images/d/d0/Talk_end_option.png"></div></div><div class="skill-grid-container"></div>';
                const grid = content.querySelector('.skill-grid-container');
                
                content.querySelector('.skill-none-btn').onclick = () => {
                    this.state.skills[this.env][type] = null;
                    this.renderSkills();
                    modal.style.display = 'none';
                    this.saveLastState();
                };

                const getPool = () => {
                    if(!this.cache.profData) return [];
                    const p = this.cache.profData;
                    if(type === 'Heal') return p.skills.filter(s => s.type === 'Heal');
                    if(type === 'Elite') return p.skills.filter(s => s.type === 'Elite');
                    return p.skills.filter(s => s.type === 'Utility');
                };

                const poolRaw = getPool();
                let toFetch = poolRaw.map(s => s.id).filter(id => !this.cache.skills[id]);
                
                if(toFetch.length > 0) {
                    try {
                        for(let i=0; i<toFetch.length; i+=100) {
                            const res = await fetch(`https://api.guildwars2.com/v2/skills?ids=${toFetch.slice(i, i+100).join(',')}`);
                            const data = await res.json();
                            data.forEach(sk => this.cache.skills[sk.id] = sk);
                        }
                    } catch(e){}
                }

                const currentSlots = ['Utility1', 'Utility2', 'Utility3'];
                const equippedIds = [];
                currentSlots.forEach(slot => {
                    if(slot !== type && this.state.skills[this.env][slot]) {
                        equippedIds.push(this.state.skills[this.env][slot]);
                    }
                });

                let pool = poolRaw.filter(s => {
                    if(currentSlots.includes(type) && equippedIds.includes(s.id)) return false;
                    return true;
                });

                pool.sort((a, b) => {
                    const skA = this.cache.skills[a.id];
                    const skB = this.cache.skills[b.id];
                    const catA = (skA && skA.categories && skA.categories.length > 0) ? skA.categories[0] : "Z";
                    const catB = (skB && skB.categories && skB.categories.length > 0) ? skB.categories[0] : "Z";
                    if(catA !== catB) return catA.localeCompare(catB);
                    const nameA = skA ? skA.name : "";
                    const nameB = skB ? skB.name : "";
                    return nameA.localeCompare(nameB);
                });

                pool.forEach((sEntry) => {
                    const id = sEntry.id;
                    const sk = this.cache.skills[id];
                    if(sk) {
                        const div = document.createElement('div');
                        div.className = 'skill-slot';
                        div.innerHTML = '<img src="' + sk.icon + '">';
                        div.setAttribute('data-tt', encodeURIComponent(this.buildSkillTooltip(sk)));
                        div.onclick = () => {
                            this.state.skills[this.env][type] = id;
                            this.renderSkills();
                            modal.style.display = 'none';
                            this.saveLastState();
                        };
                        grid.appendChild(div);
                    }
                });
                this.bindTooltips(grid);
                modal.style.display = 'block';
            },

            saveLocal() {
                const name = document.getElementById('build-name').value;
                this.state.name = name;
                let builds = JSON.parse(localStorage.getItem('gw2_planner_builds') || '{}');
                builds[name] = this.state;
                localStorage.setItem('gw2_planner_builds', JSON.stringify(builds));
                this.showToast("Build saved: " + name);
            },
            refreshLoadList() {
                const list = document.getElementById('saved-builds-list');
                list.innerHTML = '';
                const builds = JSON.parse(localStorage.getItem('gw2_planner_builds') || '{}');
                Object.keys(builds).sort().forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name; opt.innerText = name;
                    list.appendChild(opt);
                });
            },
            handleModalLoad() {
                const code = document.getElementById('template-paste').value.trim();
                if(code) { this.importCode(code); document.getElementById('load-modal').style.display = 'none'; return; }
                
                const name = document.getElementById('saved-builds-list').value;
                if(name) {
                    const builds = JSON.parse(localStorage.getItem('gw2_planner_builds') || '{}');
                    if(builds[name]) {
                        this.state = builds[name];
                        document.getElementById('class-select').value = this.state.profession;
                        document.getElementById('build-name').value = this.state.name;
                        
                        fetch(`https://api.guildwars2.com/v2/professions/${this.state.profession}`)
                        .then(res => res.json())
                        .then(data => {
                            this.cache.profData = data;
                            return this.loadSavedSkills();
                        })
                        .then(() => {
                            this.renderEquipment();
                            this.renderTraits();
                            this.updateView();
                            this.saveLastState();
                        }).catch(e => console.log("Load error", e));
                    }
                    document.getElementById('load-modal').style.display = 'none';
                }
            },
            deleteSavedBuild() {
                const name = document.getElementById('saved-builds-list').value;
                if(!name) return;
                let builds = JSON.parse(localStorage.getItem('gw2_planner_builds') || '{}');
                delete builds[name];
                localStorage.setItem('gw2_planner_builds', JSON.stringify(builds));
                this.refreshLoadList();
            },
            copyCode() {
                this.showToast("Chat link export not yet implemented.");
            },
            importCode(code) {
                this.showToast("Chat link import not yet implemented.");
            }
		};

		window.onload = () => window.PLANNER.init();
		/*]]>*/
		</script>
	</body>
</html>
