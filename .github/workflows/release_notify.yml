name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test Version Number'
        default: 'v1.3.0-TEST'
        required: true
      test_body:
        description: 'Test Changelog Message'
        default: 'This is a manual test of the notification system.'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Professional Discord Embed
        uses: actions/github-script@v6
        with:
          script: |
            const axios = require('axios');
            const version = context.payload.release ? context.payload.release.tag_name : context.payload.inputs.test_version;
            const body = context.payload.release ? context.payload.release.body : context.payload.inputs.test_body;
            const url = context.payload.release ? context.payload.release.html_url : 'https://github.com/Yoast79/Tyrian-Lens';
            
            const payload = {
              username: "Tyrian Lens Update",
              avatar_url: "https://i.imgur.com/HmyYArl.png",
              embeds: [{
                title: `Version Release: ${version}`,
                description: `**Changelog:**\n${body}`,
                url: url,
                color: 14860413,
                thumbnail: { url: "https://i.imgur.com/HmyYArl.png" },
                footer: { text: "Tyrian Lens - Professional GW2 Utility" }
              }]
            };
            
            await axios.post(process.env.DISCORD_WEBHOOK, payload);
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
