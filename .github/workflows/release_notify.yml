name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test Version Number'
        default: 'v1.3.0-TEST'
        required: true
      test_body:
        description: 'Test Changelog Message'
        default: 'This is a manual test of the notification system.'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Professional Discord Embed
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.test_version }}"
          BODY="${{ github.event.release.body || github.event.inputs.test_body }}"
          URL="${{ github.event.release.html_url || 'https://github.com/Yoast79/Tyrian-Lens' }}"
          
          # Clean up the body for JSON (escape newlines and quotes)
          CLEAN_BODY=$(echo "$BODY" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          
          curl -H "Content-Type: application/json" \
               -d '{
                 "username": "Tyrian Lens Update",
                 "avatar_url": "https://i.imgur.com/HmyYArl.png",
                 "embeds": [{
                   "title": "Version Release: '"$VERSION"'",
                   "description": "**Changelog:**\n'"$CLEAN_BODY"'",
                   "url": "'"$URL"'",
                   "color": 14860413,
                   "thumbnail": { "url": "https://i.imgur.com/HmyYArl.png" },
                   "footer": { "text": "Tyrian Lens - Professional GW2 Utility" }
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}
