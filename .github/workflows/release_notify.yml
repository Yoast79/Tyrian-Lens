name: Tyrian Lens High-Fidelity Notifier

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test Version Number'
        default: 'v1.3.0-TEST'
        required: true
      test_body:
        description: 'Test Changelog Message'
        default: 'This is a manual test of the notification system.'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build and Send Notification
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ github.event.release.tag_name }}' || '${{ github.event.inputs.test_version }}';
            const body = \`${{ github.event.release.body || github.event.inputs.test_body }}\`;
            const url = '${{ github.event.release.html_url }}' || 'https://github.com/Yoast79/Tyrian-Lens';
            
            const payload = {
              username: 'Tyrian Lens Update',
              avatar_url: 'https://i.imgur.com/HmyYArl.png',
              embeds: [{
                title: 'Version Release: ' + version,
                description: '**Changelog:**\n' + body,
                url: url,
                color: 14860413,
                thumbnail: { url: 'https://i.imgur.com/HmyYArl.png' },
                footer: { text: 'Tyrian Lens - Professional GW2 Utility' }
              }]
            };
            
            fs.writeFileSync('payload.json', JSON.stringify(payload));
          "
          curl -H "Content-Type: application/json" -d @payload.json ${{ secrets.DISCORD_WEBHOOK }}
