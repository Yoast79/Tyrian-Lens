name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test Version Number'
        default: 'v1.3.0-TEST'
        required: true
      test_body:
        description: 'Test Changelog Message'
        default: 'This is a manual test of the notification system.'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Fancy Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Version Release: ${{ github.event.release.tag_name || github.event.inputs.test_version }}"
          description: |
            **Changelog:**
            ${{ github.event.release.body || github.event.inputs.test_body }}
          thumbnail: "https://i.imgur.com/HmyYArl.png"
          color: 0xE2C07D
          url: "${{ github.event.release.html_url || 'https://github.com/Yoast79/Tyrian-Lens' }}"
          username: "Tyrian Lens Update"
          avatar_url: "https://i.imgur.com/HmyYArl.png"
          footer: "Tyrian Lens - Professional GW2 Utility"
