<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="https://gw2ps.local/Assets/core.css" />
		<style>
			::-webkit-scrollbar { width: 6px; }
			::-webkit-scrollbar-track { background: var(--bg-panel, rgba(10,8,5,0.5)); }
			::-webkit-scrollbar-thumb { background: var(--border-color, #4a3b2a); border-radius: 3px; }
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; margin: 0; padding: 0; box-sizing: border-box; }
			body { background: transparent; color: var(--text-primary, #e2c07d); font-family: "Crimson Text", serif; padding: 15px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; text-transform: uppercase; }

			.header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color, #4a3b2a); padding-bottom: 10px; margin-bottom: 15px; }
			.section-title { font-size: 16px; letter-spacing: 2px; color: var(--text-muted, #8a7a5f); font-weight: bold; }

			.controls { display: flex; gap: 10px; align-items: center; }
			button { background: var(--bg-panel, rgba(20,15,10,0.9)); border: 1px solid var(--border-color, #4a3b2a); color: var(--text-primary, #e2c07d); padding: 8px 15px; cursor: pointer; font-family: "Crimson Text", serif; text-transform: uppercase; font-size: 11px; font-weight: bold; transition: 0.2s; letter-spacing: 1px; }
			button:hover { background: rgba(226, 192, 125, 0.1); border-color: var(--text-primary, #e2c07d); }
			button.active { background: var(--success-color, #1A9306); color: #fff; border-color: var(--success-color, #1A9306); }
			button.stop { background: var(--error-color, #721c24); color: #fff; border-color: var(--error-color, #f5c6cb); }

			.tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color, #2a2015); padding-bottom: 5px; }
			.tab-btn { background: transparent; border: none; color: var(--text-muted, #8a7a5f); padding: 5px 10px; cursor: pointer; border-bottom: 2px solid transparent; }
			.tab-btn.active { color: var(--text-primary, #e2c07d); border-bottom-color: var(--text-primary, #e2c07d); }

			.tab-content { flex: 1; overflow-y: auto; display: none; flex-direction: column; gap: 15px; padding-right: 5px; }
			.tab-content.active { display: flex; }

			.panel-box { background: var(--bg-panel, rgba(20,15,10,0.8)); border: 1px solid var(--border-color, #332a1e); padding: 10px; }
			.box-title { font-size: 11px; color: var(--text-muted, #8a7a5f); border-bottom: 1px solid var(--border-color, #2a2015); padding-bottom: 5px; margin-bottom: 10px; }

			.item-grid { display: grid; grid-template-columns: repeat(10, 42px); gap: 4px; justify-content: center; }
			.item-slot { width: 42px; height: 42px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color, #332a1e); position: relative; }

			/* Rarity Borders */
			.item-slot.rarity-junk { border-color: #AAAAAA; }
			.item-slot.rarity-basic { border-color: #EEEEEE; }
			.item-slot.rarity-fine { border-color: #62A4DA; }
			.item-slot.rarity-masterwork { border-color: #1a9306; }
			.item-slot.rarity-rare { border-color: #fcd00b; }
			.item-slot.rarity-exotic { border-color: #ffa405; }
			.item-slot.rarity-ascended { border-color: #fb3e8d; }
			.item-slot.rarity-legendary { border-color: #4c139d; }

			.item-icon { width: 100%; height: 100%; object-fit: cover; }
			.item-count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: bold; color: #fff; text-shadow: 1px 1px 1px #000; }
			.item-count.negative { color: var(--error-color, #ff6b6b); }

			.currency-list { display: flex; flex-direction: column; gap: 5px; }
			.currency-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 6px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color, #2a2015); }
			.currency-name { display: flex; align-items: center; gap: 8px; }
			.currency-icon { width: 16px; height: 16px; object-fit: cover; }
			.val-pos { color: var(--success-color, #1A9306); font-weight: bold; }
			.val-neg { color: var(--error-color, #ff6b6b); font-weight: bold; }

			.coin-icon { height: 12px; width: 12px; vertical-align: baseline; margin: 0 1px; }
			#session-timer { font-family: monospace; font-size: 14px; color: var(--text-primary, #e2c07d); }

			/* Simple Flex Graph */
			.graph-controls { display: flex; gap: 10px; margin-bottom: 10px; }
			.graph-area { height: 200px; display: flex; align-items: flex-end; gap: 8px; border-bottom: 1px solid var(--border-color, #4a3b2a); padding-bottom: 5px; margin-top: 15px; border-left: 1px solid var(--border-color, #4a3b2a); padding-left: 5px; }
			.bar-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 5px; position: relative; }
			.bar { width: 100%; background: var(--text-primary, #e2c07d); transition: height 0.5s ease; min-height: 1px; }
			.bar:hover { background: #fff; filter: drop-shadow(0 0 5px var(--text-primary, #e2c07d)); }
			.bar-label { font-size: 9px; color: var(--text-muted, #8a7a5f); text-align: center; }

			/* Graph Enhancements */
			.graph-container-outer { width: 100%; overflow-x: auto; overflow-y: hidden; padding-bottom: 25px; position: relative; }
			.graph-svg-wrapper { position: relative; border-bottom: 1px solid var(--border-color, #4a3b2a); border-left: 1px solid var(--border-color, #4a3b2a); cursor: crosshair; }
			.graph-scrubber { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(226, 192, 125, 0.4); pointer-events: none; display: none; z-index: 5; }
			.graph-scrubber::after { content: ''; position: absolute; top: -4px; left: -4px; width: 9px; height: 9px; background: var(--text-primary, #e2c07d); border-radius: 50%; box-shadow: 0 0 10px var(--text-primary, #e2c07d); }
			
			.graph-tooltip { position: fixed; background: rgba(15, 12, 8, 0.95); border: 1px solid var(--border-color, #4a3b2a); padding: 8px 12px; pointer-events: none; z-index: 1000; display: none; min-width: 150px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
			.gt-time { font-size: 10px; color: var(--text-muted, #8a7a5f); margin-bottom: 6px; border-bottom: 1px solid rgba(74, 59, 42, 0.3); padding-bottom: 4px; text-align: center; }
			.gt-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; font-size: 11px; margin-bottom: 3px; }
			.gt-currency { display: flex; align-items: center; gap: 5px; }
			.gt-icon { width: 14px; height: 14px; }
			.gt-val { font-weight: bold; font-family: monospace; }

			.history-list { display: flex; flex-direction: column; gap: 5px; margin-top: 15px; }
			.history-row { background: var(--bg-panel, rgba(20,15,10,0.5)); border: 1px solid var(--border-color, #2a2015); padding: 10px; font-size: 11px; display: flex; justify-content: space-between; transition: 0.2s; color: var(--text-primary, #e2c07d); }

			/* Added CSS for Delete Buttons, Golden Graph Buttons, and Sliders */
			.btn-delete { background: transparent; border: none; color: var(--error-color, #721c24); cursor: pointer; font-size: 16px; font-weight: bold; padding: 0 5px; margin-left: 10px; line-height: 1; transition: 0.2s; }
			.btn-delete:hover { color: var(--error-color, #ff6b6b); }
			.graph-btn.active { background: var(--text-primary, #e2c07d); color: #1a1510; border-color: var(--text-primary, #e2c07d); }

			/* Large UI Scaling Overrides */
			body.ui-large .section-title { font-size: 20px; }
			body.ui-large #session-timer { font-size: 18px; }
			body.ui-large button { font-size: 14px; padding: 10px 20px; }
			body.ui-large .tab-btn { font-size: 14px; padding: 8px 15px; }
			body.ui-large .box-title { font-size: 14px; }
			body.ui-large .item-grid { grid-template-columns: repeat(10, 50px); gap: 6px; }
			body.ui-large .item-slot { width: 50px; height: 50px; }
			body.ui-large .item-count { font-size: 12px; }
			body.ui-large .currency-row { font-size: 15px; padding: 10px; }
			body.ui-large .currency-icon { width: 22px; height: 22px; }
			body.ui-large .coin-icon { height: 16px; width: 16px; }
			body.ui-large .history-row { font-size: 14px; padding: 14px; }
			body.ui-large .bar-label { font-size: 12px; }
		</style>
	</head>
	<body>
		<div id="ui-root" style="display:flex; height:100%; flex-direction: column; position:relative;">
			<div class="header-row">
				<div class="section-title">FARMING TRACKER</div>
				<div class="controls">
					<div id="session-timer">00:00:00</div>
					<button id="btn-save" onclick="saveSession(true)" style="display:none; background:#1e4c7a; border-color:#2a6ba1;">SAVE</button>
					<button id="btn-start" onclick="toggleSession()">START SESSION</button>
				</div>
			</div>

			<div class="tabs">
				<button class="tab-btn active" onclick="switchTab('tab-current', this)">CURRENT SESSION</button>
				<button class="tab-btn" onclick="switchTab('tab-history', this)">HISTORY & GRAPHS</button>
			</div>

			<div id="tab-current" class="tab-content active">
				<div class="panel-box">
					<div class="box-title">CURRENCIES GAINED</div>
					<div id="currency-container" class="currency-list">
						<div style="padding:10px; color:#8a7a5f; font-size:10px; text-align:center;">NO ACTIVE SESSION</div>
					</div>
				</div>
				<div class="panel-box" style="flex:1;">
					<div class="box-title" style="display:flex; justify-content:space-between; align-items:flex-end;">
						<span>ITEMS GAINED</span>
						<div style="text-align: right;">
							<div id="est-vendor-val" style="color:#AAAAAA; font-family:monospace; font-size:11px; font-weight:normal; letter-spacing:0; margin-bottom: 2px;"></div>
							<div id="est-tp-val" style="color:#e2c07d; font-family:monospace; font-size:12px; font-weight:normal; letter-spacing:0;"></div>
						</div>
					</div>
					<div id="item-container" class="item-grid"></div>
				</div>
			</div>

			<div id="tab-history" class="tab-content">
				<div class="panel-box">
					<div class="box-title">CURRENCY GAINS OVER TIME</div>
					<div class="graph-controls">
						<button class="graph-btn active" onclick="renderGraph('day')">DAY</button>
						<button class="graph-btn" onclick="renderGraph('week')">WEEK</button>
						<button class="graph-btn" onclick="renderGraph('month')">MONTH</button>
						<button class="graph-btn" onclick="renderGraph('year')">YEAR</button>
					</div>
					<div class="slider-container" id="slider-container" style="display:none; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 11px; color: #8a7a5f;">
						<span id="slider-label-min" style="color:#e2c07d; font-weight:bold; min-width: 25px; text-align:right;"></span>
						<input type="range" id="time-slider" min="1" max="24" value="24" oninput="updateSliderLabel(); renderGraph(currentGraphPeriod, true)" style="flex: 1; accent-color: #e2c07d;">
							<span id="slider-label-max" style="min-width: 25px;"></span>
						</div>
					<div id="graph-toggles" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; border-bottom: 1px solid #2a2015; padding-bottom: 10px;"></div>
					<div id="graph-container" class="graph-area" style="height: auto; border:none; padding:0; display:block;"></div>
					<div id="graph-tooltip" class="graph-tooltip"></div>
				</div>
				<div class="panel-box" style="flex:1; position: relative;">
					<div class="box-title" style="display:flex; justify-content:space-between; align-items:center;">
						<span>SESSION LOG</span>
						<button onclick="confirmWipeHistory()" style="background: transparent; border: 1px solid #721c24; color: #ff6b6b; padding: 2px 8px; font-size: 9px; margin-top:-4px;">WIPE DATA</button>
					</div>
					<div id="history-container" class="history-list"></div>
				</div>
			</div>

			<div id="session-details-modal" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(10,8,5,0.98); z-index:100; flex-direction:column; padding:15px; overflow-y:auto;">
				<div class="header-row" style="margin-bottom:15px; border-bottom:1px solid #4a3b2a; padding-bottom:10px;">
					<div class="section-title" style="margin:0; border:none; padding:0;">SESSION DETAILS</div>
					<button onclick="closeSessionDetails()">CLOSE</button>
				</div>
				<div class="panel-box" style="margin-bottom:15px;">
					<div class="box-title">CURRENCIES GAINED</div>
					<div id="sd-currencies" class="currency-list"></div>
				</div>
				<div class="panel-box" style="flex:1;">
					<div class="box-title" style="display:flex; justify-content:space-between; align-items:flex-end;">
						<span>ITEMS GAINED</span>
						<div style="text-align: right;">
							<div id="sd-est-vendor-val" style="color:#AAAAAA; font-family:monospace; font-size:11px; font-weight:normal; letter-spacing:0; margin-bottom: 2px;"></div>
							<div id="sd-est-tp-val" style="color:#e2c07d; font-family:monospace; font-size:12px; font-weight:normal; letter-spacing:0;"></div>
						</div>
					</div>
					<div id="sd-items" class="item-grid"></div>
				</div>
			</div>

			<!-- Confirmation Modal -->
			<div id="confirm-delete-modal" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(10,8,5,0.95); z-index:110; flex-direction:column; justify-content:center; align-items:center; padding:15px; border: 1px solid #4a3b2a;">
				<div style="font-size: 14px; font-weight: bold; color: #e2c07d; margin-bottom: 5px; letter-spacing:1px;" id="confirm-del-title">DELETE ENTRY?</div>
				<div style="font-size: 12px; color: #8a7a5f; margin-bottom:15px;" id="confirm-del-text">Are you sure?</div>
				<div style="display:flex; gap:10px;">
					<button onclick="executeDelete()" style="background: #1a1510; border-color: #e2c07d; color: #e2c07d;">YES</button>
					<button onclick="closeConfirmModal()" style="background: #1a1510;">NO</button>
				</div>
			</div>
		</div>

		<script>
			/*<![CDATA[*/
            let activeKey = localStorage.getItem('gw2_active_key') || null;
            let sessionActive = false;
            let sessionStartTime = 0;
            let timerInterval = null;
            let pollInterval = null;
            
            let startSnapshot = { wallet: {}, items: {} };
            let currentDiff = { wallet: {}, items: {} };
            let sessionHistory = JSON.parse(localStorage.getItem('gw2_farming_history') || '[]');

            let currencyIndex = {}; 
            let itemIndex = {}; 
            let priceIndex = {}; 

            let activeGraphCurrencies = new Set(['1']); 
            let graphColors = {};
            let currentGraphPeriod = 'week';

            let deleteTargetDate = null;
            let isWipeAll = false;

            const settings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');
            if (settings.uiScaleLarge) document.body.classList.add('ui-large');

            window.addEventListener('message', async (e) => {
                if (e.data.action === 'uiScaleChanged') {
                    if (e.data.value === 'large') document.body.classList.add('ui-large');
                    else document.body.classList.remove('ui-large');
                }
                else if (e.data.action === 'updateTheme') {
                    document.body.setAttribute('data-theme', e.data.theme);
                }
                else if (e.data.action === 'drfData') {
                    if (sessionActive) {
                        let itemIdsToCache = [];
                        
                        if (e.data.items) {
                            Object.keys(e.data.items).forEach(id => {
                                const count = e.data.items[id];
                                currentDiff.items[id] = (currentDiff.items[id] || 0) + count;
                                if (!itemIndex[id]) itemIdsToCache.push(id);
                            });
                        }
                        
                        if (e.data.currencies) {
                            Object.keys(e.data.currencies).forEach(id => {
                                const count = e.data.currencies[id];
                                currentDiff.wallet[id] = (currentDiff.wallet[id] || 0) + count;
                            });
                        }

                        if (itemIdsToCache.length > 0) {
                            await cacheItems(itemIdsToCache);
                        }
                        await ensureCurrencyCache();

                        renderCurrentSession();
                    }
                }
            });

            function formatCoin(copper, showSign = true) {
                const isNeg = copper < 0;
                copper = Math.abs(copper);
                let g = Math.floor(copper / 10000), s = Math.floor((copper % 10000) / 100), c = copper % 100;
                let res = showSign ? (isNeg ? '-' : '+') : (isNeg ? '-' : '');
                if (g > 0) res += g + '<img src="https://render.guildwars2.com/file/090A980A96D39FD36FBB004903644C6DBEFB1FFB/156904.png" class="coin-icon">';
                if (s > 0) res += s + '<img src="https://render.guildwars2.com/file/E5A2197D78ECE4AE0349C8B3710D033D22DB0DA6/156907.png" class="coin-icon">';
                res += c + '<img src="https://render.guildwars2.com/file/6CF8F96A3299CFC75D5CC90617C3C70331A1EF0E/156902.png" class="coin-icon">';
                return res;
            }

            function switchTab(tabId, btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabId).classList.add('active');
                if(tabId === 'tab-history') {
                    ensureCurrencyCache().then(() => {
                        renderHistory();
                        renderGraph(currentGraphPeriod);
                    });
                }
            }

            async function fetchJSON(url) {
                try { const r = await fetch(url); return r.ok ? await r.json() : null; } catch(e) { return null; }
            }

            async function getAPIData() {
                if (!activeKey) return null;
                const [wallet, mats, inv, bank, chars] = await Promise.all([
                    fetchJSON("https://api.guildwars2.com/v2/account/wallet?access_token=" + activeKey),
                    fetchJSON("https://api.guildwars2.com/v2/account/materials?access_token=" + activeKey),
                    fetchJSON("https://api.guildwars2.com/v2/account/inventory?access_token=" + activeKey),
                    fetchJSON("https://api.guildwars2.com/v2/account/bank?access_token=" + activeKey),
                    fetchJSON("https://api.guildwars2.com/v2/characters?ids=all&access_token=" + activeKey)
                ]);
                
                const wMap = {}; const iMap = {};
                if (wallet) wallet.forEach(w => { wMap[w.id] = w.value; });
                if (mats) mats.forEach(m => { iMap[m.id] = (iMap[m.id] || 0) + m.count; });
                if (inv) inv.forEach(item => {
                    if (item) iMap[item.id] = (iMap[item.id] || 0) + item.count;
                });
                if (bank) bank.forEach(item => {
                    if (item) iMap[item.id] = (iMap[item.id] || 0) + item.count;
                });
                if (chars && Array.isArray(chars)) {
                    chars.forEach(c => {
                        if (c.bags) {
                            c.bags.forEach(bag => {
                                if (bag && bag.inventory) {
                                    bag.inventory.forEach(item => {
                                        if (item) iMap[item.id] = (iMap[item.id] || 0) + item.count;
                                    });
                                }
                            });
                        }
                    });
                }
                return { wallet: wMap, items: iMap };
            }

            async function ensureCurrencyCache() {
                if (Object.keys(currencyIndex).length === 0) {
                    const cData = await fetchJSON("https://api.guildwars2.com/v2/currencies?ids=all");
                    if (cData) cData.forEach(c => currencyIndex[c.id] = c);
                }
            }

            async function cacheItems(ids) {
                const missing = ids.filter(id => !itemIndex[id]);
                if (missing.length > 0) {
                    for(let i=0; i<missing.length; i+=200) {
                        const batch = missing.slice(i, i+200);
                        const iData = await fetchJSON("https://api.guildwars2.com/v2/items?ids=" + batch.join(','));
                        if (iData && Array.isArray(iData)) iData.forEach(it => itemIndex[it.id] = it);
                        
                        const pData = await fetchJSON("https://api.guildwars2.com/v2/commerce/prices?ids=" + batch.join(','));
                        if (pData && Array.isArray(pData)) pData.forEach(p => priceIndex[p.id] = p);
                    }
                }
            }

            async function toggleSession() {
                const btn = document.getElementById('btn-start');
                const saveBtn = document.getElementById('btn-save');
                if (!sessionActive) {
                    window.parent.postMessage({ action: 'toast', msg: 'FETCHING SNAPSHOT...' }, '*');
                    const snap = await getAPIData();
                    if (!snap) { window.parent.postMessage({ action: 'toast', msg: 'API ERROR' }, '*'); return; }
                    
                    currencyIndex = {};
                    itemIndex = {};
                    priceIndex = {};
                    currentDiff = { wallet: {}, items: {} };

                    startSnapshot = snap;
                    sessionActive = true;
                    sessionStartTime = Date.now();
                    
                    btn.innerText = "STOP SESSION";
                    btn.className = "stop";
                    saveBtn.style.display = 'block';
                    
                    window.parent.postMessage({ action: 'updateFarmingIndicator', active: true }, '*');
                    
                    timerInterval = setInterval(updateTimer, 1000);
                    pollInterval = setInterval(async () => {
                        await pollData();
                        
                        sessionHistory.push({
                            date: Date.now(),
                            duration: Math.floor((Date.now() - sessionStartTime) / 1000),
                            goldDiff: currentDiff.wallet[1] || 0,
                            walletDiff: JSON.parse(JSON.stringify(currentDiff.wallet || {})),
                            itemsDiff: JSON.parse(JSON.stringify(currentDiff.items || {})),
                            isAutoPoint: true
                        });
                        
                        if (sessionHistory.length > 1000) sessionHistory = sessionHistory.slice(-1000);
                        localStorage.setItem('gw2_farming_history', JSON.stringify(sessionHistory));
                        if(document.getElementById('tab-history').classList.contains('active')) renderGraph(currentGraphPeriod);
                        
                    }, 60000); 
                    
                    document.getElementById('currency-container').innerHTML = '<div style="padding:10px; color:#8a7a5f; font-size:10px; text-align:center;">TRACKING STARTED...</div>';
                    document.getElementById('item-container').innerHTML = '';
                    document.getElementById('est-tp-val').innerHTML = '';
                    document.getElementById('est-vendor-val').innerHTML = '';
                    await ensureCurrencyCache();
                } else {
                    clearInterval(timerInterval);
                    clearInterval(pollInterval);
                    
                    await saveSession(false);
                    
                    sessionActive = false;
                    btn.innerText = "START SESSION";
                    btn.className = "active";
                    saveBtn.style.display = 'none';
                    
                    window.parent.postMessage({ action: 'updateFarmingIndicator', active: false }, '*');
                    window.parent.postMessage({ action: 'toast', msg: 'SESSION ENDED' }, '*');
                }
            }

            function updateTimer() {
                const diff = Math.floor((Date.now() - sessionStartTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('session-timer').innerText = `${h}:${m}:${s}`;
            }

            async function pollData() {
                if (!sessionActive && !startSnapshot.wallet) return;
                const current = await getAPIData();
                if (!current) return;

                let itemIdsToCache = [];

                Object.keys(current.wallet).forEach(id => {
                    const diff = current.wallet[id] - (startSnapshot.wallet[id] || 0);
                    if (diff !== 0) currentDiff.wallet[id] = diff;
                });

                const allItemIds = new Set([
                    ...Object.keys(current.items), 
                    ...Object.keys(startSnapshot.items || {})
                ]);

                allItemIds.forEach(id => {
                    const diff = (current.items[id] || 0) - (startSnapshot.items[id] || 0);
                    if (diff !== 0) {
                        currentDiff.items[id] = diff;
                        itemIdsToCache.push(id);
                    }
                });

                await cacheItems(itemIdsToCache);
                renderCurrentSession();
            }

            function renderCurrentSession() {
                const cCont = document.getElementById('currency-container');
                const iCont = document.getElementById('item-container');
                
                let cHtml = '';
                Object.keys(currentDiff.wallet).forEach(id => {
                    const diff = currentDiff.wallet[id];
                    const info = currencyIndex[id];
                    if (!info || diff === 0) return;
                    
                    let valHtml = '';
                    if (id == 1) valHtml = formatCoin(diff);
                    else valHtml = (diff > 0 ? '+' : '') + diff;
                    
                    const cls = diff > 0 ? 'val-pos' : 'val-neg';
                    cHtml += '<div class="currency-row">' +
                        '<div class="currency-name"><img src="' + info.icon + '" class="currency-icon"> ' + info.name + '</div>' +
                        '<div class="' + cls + '">' + valHtml + '</div>' +
                    '</div>';
                });
                cCont.innerHTML = cHtml || '<div style="padding:10px; color:#8a7a5f; font-size:10px; text-align:center;">NO CURRENCY CHANGES YET</div>';

                let iHtml = '';
                let totalTpVal = 0;
                let totalVendorVal = 0;

                Object.keys(currentDiff.items).forEach(id => {
                    const diff = currentDiff.items[id];
                    const info = itemIndex[id];
                    if (!info || diff === 0) return;
                    
                    if (diff > 0) {
                        if (priceIndex[id] && priceIndex[id].sells) {
                            totalTpVal += diff * priceIndex[id].sells.unit_price;
                        }
                        if (info.vendor_value) {
                            totalVendorVal += diff * info.vendor_value;
                        }
                    }

                    const sign = diff > 0 ? '+' : '';
                    const cls = diff > 0 ? '' : 'negative';
                    const rarityCls = info.rarity ? 'rarity-' + info.rarity.toLowerCase() : 'rarity-basic';
                    
                    const safeName = info.name.split("'").join("");
                    
                    iHtml += '<div class="item-slot ' + rarityCls + '" onmouseover="window.parent.postMessage({action:\'showTooltip\', text:\'' + safeName + '\', x:event.clientX, y:event.clientY}, \'*\')" onmouseout="window.parent.postMessage({action:\'hideTooltip\'}, \'*\')">' +
                        '<img src="' + info.icon + '" class="item-icon" />' +
                        '<div class="item-count ' + cls + '">' + sign + diff + '</div>' +
                    '</div>';
                });
                
                iCont.innerHTML = iHtml;
                document.getElementById('est-tp-val').innerHTML = totalTpVal > 0 ? 'EST. TP VALUE: ' + formatCoin(totalTpVal, false) : '';
                document.getElementById('est-vendor-val').innerHTML = totalVendorVal > 0 ? 'VENDOR VALUE: ' + formatCoin(totalVendorVal, false) : '';
            }

            async function saveSession(isMidSession = false) {
                if(!sessionActive) return;
                const duration = Math.floor((Date.now() - sessionStartTime) / 1000);
                if (duration < 10) return;
                
                await pollData(); 
                
                const session = {
                    date: Date.now(),
                    duration: duration,
                    goldDiff: currentDiff.wallet[1] || 0,
                    walletDiff: JSON.parse(JSON.stringify(currentDiff.wallet || {})),
                    itemsDiff: JSON.parse(JSON.stringify(currentDiff.items || {})),
                    isAutoPoint: false
                };
                sessionHistory.push(session);
                if (sessionHistory.length > 1000) sessionHistory = sessionHistory.slice(-1000);
                localStorage.setItem('gw2_farming_history', JSON.stringify(sessionHistory));
                
                if(document.getElementById('tab-history').classList.contains('active')) renderHistory();

                if (isMidSession) {
                    window.parent.postMessage({ action: 'toast', msg: 'SESSION SAVED' }, '*');
                    startSnapshot = await getAPIData();
                    sessionStartTime = Date.now();
                    currentDiff = { wallet: {}, items: {} };
                    renderCurrentSession();
                }
            }

            function confirmDeleteEntry(date) {
                deleteTargetDate = date;
                isWipeAll = false;
                document.getElementById('confirm-del-title').innerText = 'DELETE SESSION?';
                document.getElementById('confirm-del-text').innerText = 'This will permanently remove this session from history.';
                document.getElementById('confirm-delete-modal').style.display = 'flex';
            }

            function confirmWipeHistory() {
                isWipeAll = true;
                document.getElementById('confirm-del-title').innerText = 'WIPE ALL HISTORY?';
                document.getElementById('confirm-del-text').innerText = 'This will permanently delete ALL saved sessions and graphs.';
                document.getElementById('confirm-delete-modal').style.display = 'flex';
            }

            function closeConfirmModal() {
                document.getElementById('confirm-delete-modal').style.display = 'none';
            }

            function executeDelete() {
                if (isWipeAll) {
                    sessionHistory = [];
                } else if (deleteTargetDate) {
                    sessionHistory = sessionHistory.filter(s => s.date !== deleteTargetDate);
                }
                localStorage.setItem('gw2_farming_history', JSON.stringify(sessionHistory));
                closeConfirmModal();
                renderHistory();
            }

            function renderHistory() {
                const hCont = document.getElementById('history-container');
                let html = '';
                
                const manualSessions = sessionHistory.filter(s => !s.isAutoPoint);
                const sorted = [...manualSessions].sort((a,b) => b.date - a.date).slice(0, 10);
                
                sorted.forEach(s => {
                    const d = new Date(s.date).toLocaleString();
                    const m = Math.floor(s.duration / 60);
                    const val = formatCoin(s.goldDiff);
                    const cls = s.goldDiff >= 0 ? 'val-pos' : 'val-neg';
                    html += '<div class="history-row" style="cursor:pointer;" onclick="viewSessionDetails(' + s.date + ')" onmouseover="this.style.background=\'rgba(226, 192, 125, 0.1)\'" onmouseout="this.style.background=\'rgba(20,15,10,0.5)\'">' +
                        '<span style="color:#8a7a5f;">' + d + ' <span style="color:#e2c07d;">(' + m + ' mins)</span></span>' +
                        '<div style="display:flex; align-items:center;">' +
                        '<span class="' + cls + '">' + val + '</span>' +
                        '<span class="btn-delete" onclick="event.stopPropagation(); confirmDeleteEntry(' + s.date + ')" title="Delete Entry">×</span>' +
                        '</div></div>';
                });
                hCont.innerHTML = html || '<div style="padding:10px; color:#8a7a5f; text-align:center;">NO MANUAL HISTORY SAVED</div>';
                renderGraph(currentGraphPeriod);
            }

            function getRandomColor(id) {
                if (id == 1) return '#e2c07d';
                if (!graphColors[id]) {
                    const hue = Math.floor(Math.random() * 360);
                    graphColors[id] = `hsl(${hue}, 70%, 60%)`;
                }
                return graphColors[id];
            }

            window.toggleGraphCurrency = function(id, isChecked) {
                if (isChecked) activeGraphCurrencies.add(id);
                else activeGraphCurrencies.delete(id);
                renderGraph(currentGraphPeriod);
            };

            function updateSliderLabel() {
                const slider = document.getElementById('time-slider');
                const val = slider.value;
                let unit = '';
                if(currentGraphPeriod === 'day') unit = 'H';
                else if(currentGraphPeriod === 'week' || currentGraphPeriod === 'month') unit = 'D';
                else if(currentGraphPeriod === 'year') unit = 'M';
                document.getElementById('slider-label-min').innerText = val + unit;
            }

            function renderGraph(period, isSliderUpdate = false) {
                currentGraphPeriod = period;
                const gCont = document.getElementById('graph-container');
                const tCont = document.getElementById('graph-toggles');
                
                document.querySelectorAll('.graph-btn').forEach(btn => btn.classList.remove('active'));
                const btnMap = { 'day': 0, 'week': 1, 'month': 2, 'year': 3 };
                const btns = document.querySelectorAll('.graph-btn');
                if(btns[btnMap[period]]) btns[btnMap[period]].classList.add('active');

                const sliderContainer = document.getElementById('slider-container');
                const slider = document.getElementById('time-slider');
                const lblMax = document.getElementById('slider-label-max');

                if (!isSliderUpdate) {
                    sliderContainer.style.display = 'flex';
                    if (period === 'day') { slider.max = 24; slider.value = 24; lblMax.innerText = '24H'; }
                    else if (period === 'week') { slider.max = 7; slider.value = 7; lblMax.innerText = '7D'; }
                    else if (period === 'month') { slider.max = 30; slider.value = 30; lblMax.innerText = '30D'; }
                    else if (period === 'year') { slider.max = 12; slider.value = 12; lblMax.innerText = '12M'; }
                    updateSliderLabel();
                }
                
                if (sessionHistory.length === 0) { 
                    gCont.innerHTML = ''; 
                    tCont.innerHTML = '';
                    sliderContainer.style.display = 'none';
                    return; 
                }

                const allCurrencies = new Set();
                sessionHistory.forEach(s => {
                    const wDiff = s.walletDiff || { '1': s.goldDiff || 0 };
                    Object.keys(wDiff).forEach(id => allCurrencies.add(id));
                });

                let togglesHtml = '';
                allCurrencies.forEach(id => {
                    const info = currencyIndex[id] || { name: 'Currency ' + id, icon: '' };
                    const isChecked = activeGraphCurrencies.has(id) ? 'checked' : '';
                    const color = getRandomColor(id);
                    togglesHtml += '<label style="display:flex; align-items:center; gap:5px; font-size:11px; color:' + color + '; cursor:pointer; background: rgba(0,0,0,0.4); padding: 4px 8px; border: 1px solid #2a2015; border-radius: 4px;">' +
                        '<input type="checkbox" ' + isChecked + ' onchange="toggleGraphCurrency(\'' + id + '\', this.checked)">' +
                        '<img src="' + info.icon + '" style="width:14px; height:14px;"> ' + info.name +
                    '</label>';
                });
                tCont.innerHTML = togglesHtml;

                const now = Date.now();
                let start = 0;
                let sliderVal = parseInt(slider.value);

                if (period === 'day') start = now - (sliderVal * 3600000);
                else if (period === 'week') start = now - (sliderVal * 86400000);
                else if (period === 'month') start = now - (sliderVal * 86400000);
                else if (period === 'year') start = now - (sliderVal * 2592000000);

                let pointsData = sessionHistory.filter(s => s.date >= start && s.date <= now).sort((a,b) => a.date - b.date);

                if (pointsData.length > 400) {
                    let step = Math.ceil(pointsData.length / 400);
                    pointsData = pointsData.filter((_, i) => i % step === 0 || i === pointsData.length - 1);
                }

                if (pointsData.length === 0) {
                    gCont.innerHTML = '<div style="color:#8a7a5f; font-size:11px; width:100%; text-align:center; padding: 40px 0;">NO DATA FOR THIS PERIOD</div>';
                    return;
                }

                let maxVals = {};
                activeGraphCurrencies.forEach(id => maxVals[id] = 1);
                pointsData.forEach(p => {
                    const wDiff = p.walletDiff || { '1': p.goldDiff || 0 };
                    activeGraphCurrencies.forEach(id => {
                        const val = Math.abs(wDiff[id] || 0);
                        if (val > maxVals[id]) maxVals[id] = val;
                    });
                });

                const width = Math.max(gCont.offsetWidth - 20, pointsData.length * 15); 
                const height = 220; 
                
                let svgHtml = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="overflow:visible;">`;
                
                // Add Gradient Definitions
                svgHtml += '<defs>';
                activeGraphCurrencies.forEach(id => {
                    const color = getRandomColor(id);
                    svgHtml += `
                        <linearGradient id="grad-${id}" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:${color};stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:${color};stop-opacity:0" />
                        </linearGradient>
                    `;
                });
                svgHtml += '</defs>';

                // Add Grid Lines
                for(let i=0; i<=4; i++) {
                    let y = 15 + (i * (height - 30) / 4);
                    svgHtml += `<line x1="0" y1="${y}" x2="${width}" y2="${y}" stroke="rgba(74, 59, 42, 0.1)" stroke-width="1" />`;
                }

                activeGraphCurrencies.forEach(id => {
                    const color = getRandomColor(id);
                    let points = [];
                    let areaPoints = [`0,${height-15}`];

                    pointsData.forEach((p, idx) => {
                        const x = (idx / Math.max(1, pointsData.length - 1)) * (width - 20) + 10; 
                        const wDiff = p.walletDiff || { '1': p.goldDiff || 0 };
                        const val = wDiff[id] || 0;
                        
                        let y = height - ((val / maxVals[id]) * (height - 30)) - 15;
                        y = Math.max(10, Math.min(height - 10, y)); 

                        points.push(`${x},${y}`);
                        areaPoints.push(`${x},${y}`);
                    });
                    
                    areaPoints.push(`${width-10},${height-15}`);
                    
                    // Render Area
                    svgHtml += `<path d="M ${areaPoints.join(' L ')} Z" fill="url(#grad-${id})" />`;
                    // Render Line
                    svgHtml += `<path d="M ${points.join(' L ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />`;
                    
                    // Render Points (Larger)
                    pointsData.forEach((p, idx) => {
                        const x = (idx / Math.max(1, pointsData.length - 1)) * (width - 20) + 10;
                        const wDiff = p.walletDiff || { '1': p.goldDiff || 0 };
                        const val = wDiff[id] || 0;
                        let y = height - ((val / maxVals[id]) * (height - 30)) - 15;
                        y = Math.max(10, Math.min(height - 10, y));
                        
                        svgHtml += `<circle cx="${x}" cy="${y}" r="3" fill="${color}" stroke="#000" stroke-width="1" class="graph-point" data-id="${id}" data-idx="${idx}" />`;
                    });
                });

                svgHtml += '</svg>';

                let labelsHtml = '';
                pointsData.forEach((p, idx) => {
                    if (idx % Math.max(1, Math.ceil(pointsData.length / 8)) === 0 || idx === pointsData.length - 1) {
                        const x = (idx / Math.max(1, pointsData.length - 1)) * (width - 20) + 10;
                        let d = new Date(p.date);
                        let timeStr = (period === 'day') ? 
                            d.getHours() + ':' + d.getMinutes().toString().padStart(2, '0') : 
                            d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
                        labelsHtml += `<div style="position:absolute; left:${x}px; bottom:-20px; font-size:10px; color:#8a7a5f; transform:translateX(-50%); white-space:nowrap;">${timeStr}</div>`;
                    }
                });

                gCont.innerHTML = `
                    <div class="graph-container-outer" id="graph-outer">
                        <div class="graph-svg-wrapper" id="graph-wrapper" style="width:${width}px; height:${height}px;">
                            <div class="graph-scrubber" id="graph-scrubber"></div>
                            ${svgHtml}
                            ${labelsHtml}
                        </div>
                    </div>
                `;

                // Add Scrubber Logic
                const wrapper = document.getElementById('graph-wrapper');
                const scrubber = document.getElementById('graph-scrubber');
                const tooltip = document.getElementById('graph-tooltip');

                wrapper.addEventListener('mousemove', (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    
                    if (x >= 0 && x <= rect.width) {
                        scrubber.style.display = 'block';
                        scrubber.style.left = x + 'px';
                        
                        // Find closest point
                        const idx = Math.round((x - 10) / (rect.width - 20) * (pointsData.length - 1));
                        const safeIdx = Math.max(0, Math.min(pointsData.length - 1, idx));
                        const point = pointsData[safeIdx];
                        
                        if (point) {
                            let ttHtml = `<div class="gt-time">${new Date(point.date).toLocaleString()}</div>`;
                            activeGraphCurrencies.forEach(id => {
                                const info = currencyIndex[id] || { name: 'Currency', icon: '' };
                                const wDiff = point.walletDiff || { '1': point.goldDiff || 0 };
                                const val = wDiff[id] || 0;
                                const color = getRandomColor(id);
                                let valStr = (id == 1) ? formatCoin(val, false) : (val > 0 ? '+' : '') + val;
                                
                                ttHtml += `
                                    <div class="gt-row" style="color:${color}">
                                        <div class="gt-currency">
                                            <img src="${info.icon}" class="gt-icon">
                                            <span>${info.name}</span>
                                        </div>
                                        <div class="gt-val">${valStr}</div>
                                    </div>
                                `;
                            });
                            
                            tooltip.innerHTML = ttHtml;
                            tooltip.style.display = 'block';
                            
                            // Position tooltip
                            let tx = e.clientX + 15;
                            let ty = e.clientY + 15;
                            
                            if (tx + 200 > window.innerWidth) tx = e.clientX - 215;
                            if (ty + 150 > window.innerHeight) ty = e.clientY - 165;
                            
                            tooltip.style.left = tx + 'px';
                            tooltip.style.top = ty + 'px';
                        }
                    }
                });

                wrapper.addEventListener('mouseleave', () => {
                    scrubber.style.display = 'none';
                    tooltip.style.display = 'none';
                });
            }

            async function viewSessionDetails(dateStr) {
                const session = sessionHistory.find(s => s.date === dateStr);
                if(!session) return;

                document.getElementById('sd-currencies').innerHTML = '<div style="padding:10px; color:#8a7a5f; font-size:10px; text-align:center;">LOADING...</div>';
                document.getElementById('sd-items').innerHTML = '';
                document.getElementById('session-details-modal').style.display = 'flex';

                await ensureCurrencyCache();

                const itemDiffs = session.itemsDiff || session.matsDiff || {};
                const itemIds = Object.keys(itemDiffs);
                if(itemIds.length > 0) {
                    await cacheItems(itemIds);
                }

                let cHtml = '';
                const wDiff = session.walletDiff || { '1': session.goldDiff || 0 };
                Object.keys(wDiff).forEach(id => {
                    const diff = wDiff[id];
                    const info = currencyIndex[id];
                    if (!info || diff === 0) return;

                    let valHtml = '';
                    if (id == 1) valHtml = formatCoin(diff);
                    else valHtml = (diff > 0 ? '+' : '') + diff;

                    const cls = diff > 0 ? 'val-pos' : 'val-neg';
                    cHtml += '<div class="currency-row">' +
                        '<div class="currency-name"><img src="' + info.icon + '" class="currency-icon"> ' + info.name + '</div>' +
                        '<div class="' + cls + '">' + valHtml + '</div>' +
                    '</div>';
                });
                document.getElementById('sd-currencies').innerHTML = cHtml || '<div style="padding:10px; color:#8a7a5f; font-size:10px; text-align:center;">NO CURRENCIES RECORDED</div>';

                let iHtml = '';
                let totalTpVal = 0;
                let totalVendorVal = 0;

                Object.keys(itemDiffs).forEach(id => {
                    const diff = itemDiffs[id];
                    const info = itemIndex[id];
                    if (!info || diff === 0) return;

                    if (diff > 0) {
                        if (priceIndex[id] && priceIndex[id].sells) {
                            totalTpVal += diff * priceIndex[id].sells.unit_price;
                        }
                        if (info.vendor_value) {
                            totalVendorVal += diff * info.vendor_value;
                        }
                    }

                    const sign = diff > 0 ? '+' : '';
                    const cls = diff > 0 ? '' : 'negative';
                    const rarityCls = info.rarity ? 'rarity-' + info.rarity.toLowerCase() : 'rarity-basic';
                    
                    const safeName = info.name.split("'").join("");
                    
                    iHtml += '<div class="item-slot ' + rarityCls + '" onmouseover="window.parent.postMessage({action:\'showTooltip\', text:\'' + safeName + '\', x:event.clientX, y:event.clientY}, \'*\')" onmouseout="window.parent.postMessage({action:\'hideTooltip\'}, \'*\')">' +
                        '<img src="' + info.icon + '" class="item-icon" />' +
                        '<div class="item-count ' + cls + '">' + sign + diff + '</div>' +
                    '</div>';
                });
                
                document.getElementById('sd-items').innerHTML = iHtml || '<div style="padding:10px; color:#8a7a5f; font-size:10px; text-align:center;">NO ITEMS RECORDED</div>';
                document.getElementById('sd-est-tp-val').innerHTML = totalTpVal > 0 ? 'EST. TP VALUE: ' + formatCoin(totalTpVal, false) : '';
                document.getElementById('sd-est-vendor-val').innerHTML = totalVendorVal > 0 ? 'VENDOR VALUE: ' + formatCoin(totalVendorVal, false) : '';
            }

            function closeSessionDetails() {
                document.getElementById('session-details-modal').style.display = 'none';
            }

            window.addEventListener('message', (e) => {
                if (e.data.action === 'updateTheme') {
                    document.body.setAttribute('data-theme', e.data.theme);
                }
                if (e.data.action === 'uiScaleChanged') {
                    if (e.data.value === 'large') document.body.classList.add('ui-large');
                    else document.body.classList.remove('ui-large');
                }
            });

            document.body.setAttribute('data-theme', localStorage.getItem('gw2_theme') || 'human');
