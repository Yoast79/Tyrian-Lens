<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; box-sizing: border-box; }
			body {
			margin: 0; background: transparent; padding: 20px;
			color: #e2c07d; font-family: "Crimson Text", serif; text-transform: uppercase;
			display: flex; flex-direction: column; height: 100vh; overflow: hidden;
			}
			.title-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4a3b2a; margin-bottom: 15px; padding-bottom: 5px; }
			.section-title { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
			.title-controls { display: flex; align-items: center; gap: 8px; }
			.audit-btn { background: #4a3b2a; border: 1px solid #e2c07d; color: #e2c07d; font-size: 10px; padding: 2px 8px; cursor: pointer; text-transform: uppercase; font-family: "Crimson Text", serif; transition: 0.2s; }
			.audit-btn:hover { background: #e2c07d; color: #1a1510; }
			.sort-select { background: rgba(20,15,10,0.8); border: 1px solid #4a3b2a; color: #e2c07d; font-size: 10px; padding: 2px 5px; outline: none; cursor: pointer; text-transform: uppercase; font-family: "Crimson Text", serif; }

			.search-container { position: relative; width: 100%; margin-bottom: 15px; }
			.search-box { background: rgba(20,15,10,0.8); border: 1px solid #4a3b2a; color: #fff; padding: 8px 30px 8px 8px; font-size: 12px; outline: none; width: 100%; }
			.search-box:focus { border-color: #e2c07d; }
			.clear-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #4a3b2a; cursor: pointer; font-size: 18px; line-height: 1; display: none; }
			.clear-btn:hover { color: #e2c07d; }

			#bank-container { flex: 1; overflow-y: auto; padding-right: 10px; }
			.bank-tab { margin-bottom: 15px; border: 1px solid #2a2015; background: rgba(0,0,0,0.3); }
			.tab-header { background: #1a1510; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid #2a2015; }
			.tab-header:hover { background: #251d16; }
			.tab-title { font-size: 12px; letter-spacing: 1px; color: #e2c07d; }
			.arrow { font-size: 10px; transition: transform 0.2s; }
			.collapsed .arrow { transform: rotate(-90deg); }
			.collapsed .tab-grid { display: none; }

			.tab-grid { display: grid; grid-template-columns: repeat(10, 36px); gap: 4px; padding: 10px; justify-content: center; }
			.item-slot { width: 36px; height: 36px; background: rgba(255,255,255,0.05); border: 1px solid #332a1e; position: relative; cursor: pointer; }
			.item-slot:hover { border-color: #e2c07d; background: rgba(226, 192, 125, 0.1); }
			.item-slot.hidden { visibility: hidden; pointer-events: none; }
			.item-icon { width: 100%; height: 100%; object-fit: contain; }
			.item-count { position: absolute; top: 1px; right: 2px; font-size: 10px; font-family: Arial, sans-serif; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000, -1px -1px 2px #000; pointer-events: none; }

			.tab-header-right { display: flex; align-items: center; gap: 10px; }
			.tab-total-value { font-size: 11px; font-family: Arial, sans-serif; color: #fff; text-transform: none; display: flex; align-items: center; }
			.coin { display: inline-flex; align-items: center; margin-left: 1px; }
			.coin img { width: 10px; height: 10px; margin-left: 2px; vertical-align: middle; }
			.gold { color: #f5d042; display: inline-flex; align-items: center; }
			.silver { color: #ccc; display: inline-flex; align-items: center; margin-left: 3px; }
			.copper { color: #ffa54f; display: inline-flex; align-items: center; margin-left: 3px; }

			#bank-container::-webkit-scrollbar { width: 4px; }
			#bank-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
			#bank-container::-webkit-scrollbar-thumb { background: #4a3b2a; border-radius: 2px; }

			.loading {
			display: flex; flex-direction: column; align-items: center; justify-content: center;
			color: #8a7a5f; font-style: italic; padding: 40px; text-transform: uppercase; letter-spacing: 2px;
			}
			.loading img { width: 400px; height: 400px; margin-bottom: 30px; object-fit: contain; }

			/* Large UI Scaling Overrides (~20% increase) */
			body.ui-large .section-title { font-size: 20px; }
			body.ui-large .search-box { font-size: 15px; padding: 10px 35px 10px 10px; }
			body.ui-large .tab-title { font-size: 15px; }
			body.ui-large .tab-grid { grid-template-columns: repeat(10, 46px); gap: 6px; }
			body.ui-large .item-slot { width: 46px; height: 46px; }
			body.ui-large .item-count { font-size: 12px; }
			body.ui-large .tab-total-value { font-size: 14px; }
			body.ui-large .coin img { width: 14px; height: 14px; }
		</style>
	</head>
	<body>
		<div class="title-bar">
			<div class="section-title">Account Bank</div>
			<div class="title-controls">

				<select id="sort-select" class="sort-select" onchange="changeSort(this.value)">
					<option value="default">Sort: Default</option>
					<option value="instant_high">Instant Sell: High -> Low</option>
					<option value="instant_low">Instant Sell: Low -> High</option>
					<option value="list_high">List Price: High -> Low</option>
					<option value="list_low">List Price: Low -> High</option>
				</select>
			</div>
		</div>
		<div class="search-container">
			<input type="text" class="search-box" id="bank-search" placeholder="SEARCH VAULT..." oninput="filterBank()">
				<span class="clear-btn" id="clear-search" onclick="clearSearch()">&times;</span>
			</div>
		<div id="bank-container">
			<div class="loading">
				<img src="https://gw2ps.local/Assets/Icons/Tyrian_Lens_transparent.png">
					<div>Accessing Vault...</div>
				</div>
		</div>

		<script>
			/*<![CDATA[*/
			let itemCache = {};
			let bankDataGlobal = [];
			let priceCache = {};
			let currentSort = 'default';

			async function initBank() {
				// Apply UI scale on load
				const settings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');
				if (settings.uiScaleLarge) document.body.classList.add('ui-large');

				const activeKey = localStorage.getItem('gw2_active_key');
				if (!activeKey) return;

                // Check cache first
                const cachedBank = localStorage.getItem('gw2_cache_bank');
                if (cachedBank) {
                    bankDataGlobal = JSON.parse(cachedBank);
                    const itemIds = [...new Set(bankDataGlobal.filter(i => i !== null).map(i => i.id))];
                    await Promise.all([
						fetchItemDetails(itemIds),
						fetchItemPrices(itemIds)
					]);
                    renderBank();
                } else {
                    try {
                        const res = await fetch(`https://api.guildwars2.com/v2/account/bank?access_token=${activeKey}`);
                        bankDataGlobal = await res.json();
                        localStorage.setItem('gw2_cache_bank', JSON.stringify(bankDataGlobal));
                        const itemIds = [...new Set(bankDataGlobal.filter(i => i !== null).map(i => i.id))];
                        await Promise.all([
							fetchItemDetails(itemIds),
							fetchItemPrices(itemIds)
						]);
                        renderBank();
                    } catch (err) { console.error(err); }
                }
			}

			async function fetchItemDetails(ids) {
				const chunks = [];
				for (let i = 0; i < ids.length; i += 200) chunks.push(ids.slice(i, i + 200));
				for (const chunk of chunks) {
					const res = await fetch(`https://api.guildwars2.com/v2/items?ids=${chunk.join(',')}`);
					const data = await res.json();
					data.forEach(item => itemCache[item.id] = item);
				}
			}

			async function fetchItemPrices(ids) {
				const chunks = [];
				for (let i = 0; i < ids.length; i += 200) chunks.push(ids.slice(i, i + 200));
				for (const chunk of chunks) {
					try {
						const res = await fetch(`https://api.guildwars2.com/v2/commerce/prices?ids=${chunk.join(',')}`);
						if (!res.ok) continue;
						const data = await res.json();
						data.forEach(p => {
							priceCache[p.id] = {
								buys: p.buys ? p.buys.unit_price : 0,
								sells: p.sells ? p.sells.unit_price : 0
							};
						});
					} catch (e) { console.warn("Failed to fetch some prices", e); }
				}
			}

			function changeSort(val) {
				currentSort = val;
				renderBank();
			}

			function formatCoin(copper, small = false) {
				if (!copper || copper <= 0) return small ? "" : `0<span class="coin copper"><img src="https://gw2ps.local/Assets/CurrencyIcons/copper_coin.png"></span>`;
				const g = Math.floor(copper / 10000);
				const s = Math.floor((copper % 10000) / 100);
				const c = copper % 100;
				let html = '';
				if (g > 0) html += `<span class="gold">${g}<span class="coin"><img src="https://gw2ps.local/Assets/CurrencyIcons/gold_coin.png"></span></span> `;
				if (s > 0 || (g > 0 && !small)) html += `<span class="silver">${s}<span class="coin"><img src="https://gw2ps.local/Assets/CurrencyIcons/silver_coin.png"></span></span> `;
				if (c > 0 || (!small && g === 0 && s === 0)) html += `<span class="copper">${c}<span class="coin"><img src="https://gw2ps.local/Assets/CurrencyIcons/copper_coin.png"></span></span>`;
				return html;
			}

			function renderBank() {
				const container = document.getElementById('bank-container');
				container.innerHTML = '';
				const itemsPerTab = 30;

				let processedBank = [...bankDataGlobal];
				if (currentSort !== 'default') {
					processedBank = processedBank.filter(i => i !== null).sort((a, b) => {
						const pA = priceCache[a.id] || { buys: 0, sells: 0 };
						const pB = priceCache[b.id] || { buys: 0, sells: 0 };
						if (currentSort === 'instant_high') return (pB.buys * 0.85) - (pA.buys * 0.85);
						if (currentSort === 'instant_low') return (pA.buys * 0.85) - (pB.buys * 0.85);
						if (currentSort === 'list_high') return pB.sells - pA.sells;
						if (currentSort === 'list_low') return pA.sells - pB.sells;
						return 0;
					});
				}

				const totalTabs = Math.ceil(processedBank.length / itemsPerTab);
				for (let t = 0; t < totalTabs; t++) {
					const tabDiv = document.createElement('div');
					tabDiv.className = 'bank-tab';
					
					let tabTotalCopper = 0;
					const grid = document.createElement('div');
					grid.className = 'tab-grid';
					
					processedBank.slice(t * itemsPerTab, (t + 1) * itemsPerTab).forEach(slot => {
						const slotDiv = document.createElement('div');
						slotDiv.className = 'item-slot';
						if (slot && itemCache[slot.id]) {
							const item = itemCache[slot.id];
							const prices = priceCache[slot.id] || { buys: 0, sells: 0 };
							const count = slot.count || 1;
							const tax = 0.85;
							
							const instantSell = Math.floor(prices.buys * tax);
							const listPrice = prices.sells;
							const stackInstantSell = Math.floor(count * prices.buys * tax);
							const stackListPrice = count * prices.sells;
							
							tabTotalCopper += stackListPrice;

							slotDiv.dataset.name = item.name.toLowerCase();
							slotDiv.onclick = () => window.open(`https://wiki.guildwars2.com/index.php?search=${encodeURIComponent(item.name)}`, '_blank');
							
							let tooltipText = `<div style="font-weight:bold; margin-bottom:6px; color:#e2c07d; letter-spacing:1px; border-bottom:1px solid #4a3b2a; padding-bottom:4px; text-transform:uppercase;">${item.name}</div>`;
							tooltipText += `<div style="display:grid; grid-template-columns: 1fr auto; gap:4px 15px; font-size:11px; font-family:Arial, sans-serif; text-transform:none; line-height:1.4;">`;
							
							let hasFinancials = false;
							const canSellVendor = item.vendor_value > 0 && !(item.flags && item.flags.includes('NoSell'));
							
							if (prices.sells > 0) {
								hasFinancials = true;
								tooltipText += `<span>INSTANT SELL:</span><span>${formatCoin(instantSell)}</span>`;
								tooltipText += `<span>LIST PRICE:</span><span>${formatCoin(listPrice)}</span>`;
								if (count > 0) {
									tooltipText += `</div><div style="margin:6px 0; border-top:1px solid #4a3b2a; opacity:0.5;"></div>`;
									tooltipText += `<div style="display:grid; grid-template-columns: 1fr auto; gap:4px 15px; font-size:11px; font-family:Arial, sans-serif; text-transform:none; line-height:1.4;">`;
									tooltipText += `<span>STACK INSTANT SELL:</span><span>${formatCoin(stackInstantSell)}</span>`;
									tooltipText += `<span>STACK LIST PRICE:</span><span>${formatCoin(stackListPrice)}</span>`;
								}
							} else if (canSellVendor) {
								hasFinancials = true;
								tooltipText += `<span>VENDOR VALUE:</span><span>${formatCoin(item.vendor_value)}</span>`;
								if (count > 0) {
									tooltipText += `<span>STACK VENDOR VALUE:</span><span>${formatCoin(item.vendor_value * count)}</span>`;
								}
							}

							if (!hasFinancials) {
								tooltipText += `<span style="grid-column: span 2; opacity: 0.5;">NO VENDOR OR TP VALUE</span>`;
							}
							tooltipText += `</div>`;

							slotDiv.onmouseover = (e) => window.parent.postMessage({action:'showTooltip', text: tooltipText, x: e.clientX, y: e.clientY}, '*');
							slotDiv.onmouseout = () => window.parent.postMessage({action:'hideTooltip'}, '*');
							slotDiv.innerHTML = `<img class="item-icon" src="${item.icon}">`;
							if (slot.count > 1) slotDiv.innerHTML += `<div class="item-count">${slot.count}</div>`;
						} else { slotDiv.dataset.name = ""; }
						grid.appendChild(slotDiv);
					});

					const header = document.createElement('div');
					header.className = 'tab-header';
					header.onclick = () => tabDiv.classList.toggle('collapsed');
					header.innerHTML = `
						<span class="tab-title">Bank Tab ${t + 1}</span>
						<div class="tab-header-right">
							<span class="tab-total-value">${formatCoin(tabTotalCopper)}</span>
							<span class="arrow">▼</span>
						</div>
					`;

					tabDiv.appendChild(header);
					tabDiv.appendChild(grid);
					container.appendChild(tabDiv);
				}
			}

				function filterBank() {
				const query = document.getElementById('bank-search').value.toLowerCase();
				document.getElementById('clear-search').style.display = query === "" ? "none" : "block";
				document.querySelectorAll('.bank-tab').forEach(tab => {
				const slots = tab.querySelectorAll('.item-slot');
				let hasMatch = false;
				slots.forEach(slot => {
				const match = query === "" || (slot.dataset.name && slot.dataset.name.includes(query));
				slot.classList.toggle('hidden', !match);
				if (match && slot.dataset.name !== "") hasMatch = true;
				});
				tab.classList.toggle('collapsed', query !== "" && !hasMatch);
				});
				}

			window.addEventListener('message', (e) => {
				if (e.data.action === 'accountDataRefreshed') initBank();
			});
			initBank();
			/*]]>*/
		</script>
	</body>
</html>
