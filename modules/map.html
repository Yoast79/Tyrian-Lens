<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<link rel="stylesheet" href="https://gw2ps.local/Assets/Leaflet/leaflet.css" />
	<link rel="stylesheet" href="https://gw2ps.local/Assets/Leaflet/MarkerCluster.css" />
	<link rel="stylesheet" href="https://gw2ps.local/Assets/Leaflet/MarkerCluster.Default.css" />
	<script src="https://gw2ps.local/Assets/Leaflet/leaflet.js"></script>
	<script src="https://gw2ps.local/Assets/Leaflet/leaflet.markercluster.js"></script>
	<style>
		* {
			cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important;
		}

		.leaflet-interactive {
			pointer-events: auto !important;
			cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important;
		}

		body,
		html,
		#map {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
			background: #000;
			overflow: hidden;
		}

		.player-icon-container {
			background: none !important;
			border: none !important;
		}

		.map-label {
			font-family: serif;
			color: #e2c07d;
			font-weight: bold;
			text-transform: uppercase;
			white-space: nowrap;
			background: none !important;
			border: none !important;
			pointer-events: auto !important;
			text-align: center;
			-webkit-text-stroke: 2px black;
			paint-order: stroke fill;
			text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.7);
		}

		.region-label {
			font-size: 18px;
			letter-spacing: 5px;
		}

		.map-title-label {
			font-size: 14px;
			letter-spacing: 2px;
		}

		.map-meta-row {
			display: flex;
			align-items: center;
			gap: 6px;
			font-size: 11px;
			text-transform: none;
			color: #fff;
			white-space: nowrap;
		}

		.map-meta-item {
			display: flex;
			align-items: center;
			gap: 3px;
		}

		.map-meta-icon {
			width: 12px;
			height: 12px;
			filter: drop-shadow(1px 1px 1px rgba(0, 0, 0, 0.5));
		}

		.map-meta-divider {
			color: #8a7a5f;
			opacity: 0.8;
			font-size: 14px;
			line-height: 1;
		}

		.sector-label {
			font-size: 12px;
			letter-spacing: 1px;
			text-transform: none;
		}

		.compass-container {
			position: fixed;
			bottom: 30px;
			right: 30px;
			z-index: 9000;
			width: 130px;
			height: 130px;
			background: url("https://gw2ps.local/Assets/Icons/Map_navigation_compass.png") center/contain no-repeat;
			pointer-events: none;
		}

		#compass-glow {
			position: absolute;
			top: 48px;
			left: 48px;
			width: 34px;
			height: 34px;
			border-radius: 50%;
			background: rgba(0, 150, 255, 0.4);
			box-shadow: 0 0 15px 8px rgba(0, 130, 255, 0.8);
			opacity: 0;
			transition: opacity 0.3s ease;
			pointer-events: none;
		}

		.tracking-active #compass-glow {
			opacity: 1;
			animation: pulseGlow 1.2s infinite ease-in-out;
		}

		@keyframes pulseGlow {
			0% {
				transform: scale(0.9);
				opacity: 0.5;
			}

			50% {
				transform: scale(1.05);
				opacity: 0.9;
			}

			100% {
				transform: scale(0.9);
				opacity: 0.5;
			}
		}

		.nav-hitbox {
			position: absolute;
			width: 34px;
			height: 34px;
			background: rgba(0, 0, 0, 0);
			z-index: 9001;
			pointer-events: auto;
		}

		#coord-hud {
			position: fixed;
			bottom: 20px;
			left: 20px;
			z-index: 10000;
			background: rgba(10, 8, 5, 0.85);
			border: 1px solid #4a3b2a;
			padding: 10px 15px;
			color: #e2c07d;
			font-family: monospace;
			font-size: 12px;
			pointer-events: none;
			line-height: 1.6;
		}

		.coord-val {
			color: #ffffff;
			font-weight: bold;
		}

		/* Marker Glow Animation */
		@keyframes markerPulse {
			0% {
				filter: drop-shadow(0 0 2px rgba(226, 192, 125, 0.4));
			}

			50% {
				filter: drop-shadow(0 0 10px rgba(226, 192, 125, 1));
			}

			100% {
				filter: drop-shadow(0 0 2px rgba(226, 192, 125, 0.4));
			}
		}

		.marker-glow {
			animation: markerPulse 2s infinite ease-in-out;
		}

		/* Premium Ranger Pet Marker Styling */
		.pet-marker {
			background: rgba(10, 30, 15, 0.85) !important;
			border: 2px solid #2ecc71 !important;
			border-radius: 50% !important;
			box-shadow: 0 0 10px rgba(46, 204, 113, 0.6), inset 0 0 5px rgba(46, 204, 113, 0.3) !important;
			display: flex !important;
			align-items: center !important;
			justify-content: center !important;
			overflow: hidden !important;
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
			box-sizing: border-box !important;
		}

		.pet-marker:hover {
			border-color: #55efc4 !important;
			box-shadow: 0 0 25px 8px rgba(46, 204, 113, 0.95), inset 0 0 10px rgba(46, 204, 113, 0.7) !important;
			z-index: 10000 !important;
		}

		.pet-marker img {
			width: 150% !important;
			height: 150% !important;
			border-radius: 50% !important;
			object-fit: cover !important;
		}

		/* Optional Breathing Pulse keyframes and class */
		@keyframes petPulse {
			0% {
				box-shadow: 0 0 8px rgba(46, 204, 113, 0.6), inset 0 0 5px rgba(46, 204, 113, 0.3) !important;
				border-color: #2ecc71 !important;
			}
			50% {
				box-shadow: 0 0 25px 8px rgba(46, 204, 113, 1), inset 0 0 8px rgba(46, 204, 113, 0.8) !important;
				border-color: #55efc4 !important;
			}
			100% {
				box-shadow: 0 0 8px rgba(46, 204, 113, 0.6), inset 0 0 5px rgba(46, 204, 113, 0.3) !important;
				border-color: #2ecc71 !important;
			}
		}


		/* Transform-Safe Premium Blue Circle Highlight Beacon for Search Results */
		@keyframes highlightActivePulse {
			0% {
				box-shadow: 0 0 10px rgba(0, 168, 255, 0.6), inset 0 0 5px rgba(0, 168, 255, 0.4) !important;
				border-color: #00a8ff !important;
			}
			50% {
				box-shadow: 0 0 30px 12px rgba(0, 168, 255, 1), inset 0 0 12px rgba(0, 168, 255, 0.8) !important;
				border-color: #ffffff !important;
			}
			100% {
				box-shadow: 0 0 10px rgba(0, 168, 255, 0.6), inset 0 0 5px rgba(0, 168, 255, 0.4) !important;
				border-color: #00a8ff !important;
			}
		}

		.highlight-active {
			border-radius: 50% !important;
			border: 2px solid #00a8ff !important;
			background: rgba(0, 168, 255, 0.25) !important;
			z-index: 10001 !important;
			animation: highlightActivePulse 1.2s infinite ease-in-out !important;
			box-sizing: border-box !important;
			pointer-events: none !important;
		}

		/* Transform-Safe Premium Fuchsia/Magenta Circle Highlight Beacon for Resource Nodes */
		@keyframes highlightNodePulse {
			0% {
				box-shadow: 0 0 10px rgba(255, 0, 180, 0.6), inset 0 0 5px rgba(255, 0, 180, 0.4) !important;
				border-color: #ff00b4 !important;
			}
			50% {
				box-shadow: 0 0 30px 12px rgba(255, 0, 180, 1), inset 0 0 12px rgba(255, 0, 180, 0.8) !important;
				border-color: #ffffff !important;
			}
			100% {
				box-shadow: 0 0 10px rgba(255, 0, 180, 0.6), inset 0 0 5px rgba(255, 0, 180, 0.4) !important;
				border-color: #ff00b4 !important;
			}
		}

		.highlight-node-active {
			border-radius: 50% !important;
			border: 2px solid #ff00b4 !important;
			background: rgba(255, 0, 180, 0.25) !important;
			z-index: 10001 !important;
			animation: highlightNodePulse 1.2s infinite ease-in-out !important;
			box-sizing: border-box !important;
			pointer-events: none !important;
		}

		/* Transform-Safe Gold Highlight Beacon for Pact Supply Agents & Elisa */
		@keyframes highlightGoldPulse {
			0% {
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.6), inset 0 0 5px rgba(255, 215, 0, 0.4) !important;
				border-color: #ffd700 !important;
			}
			50% {
				box-shadow: 0 0 30px 12px rgba(255, 215, 0, 1), inset 0 0 12px rgba(255, 215, 0, 0.8) !important;
				border-color: #ffffff !important;
			}
			100% {
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.6), inset 0 0 5px rgba(255, 215, 0, 0.4) !important;
				border-color: #ffd700 !important;
			}
		}

		.psna-highlight-active {
			border-radius: 50% !important;
			border: 2px solid #ffd700 !important;
			background: rgba(255, 215, 0, 0.25) !important;
			z-index: 10001 !important;
			animation: highlightGoldPulse 1.2s infinite ease-in-out !important;
			box-sizing: border-box !important;
		}

		.highlight-pulse {
			z-index: 1000 !important;
			border-radius: 50%;
			background: rgba(255, 215, 0, 0.4);
			box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.8);
			animation: highlight-pulse-anim 1s infinite !important;
		}

		@keyframes highlight-pulse-anim {
			0% {
				transform: scale(1);
				filter: drop-shadow(0 0 5px #e2c07d);
				opacity: 0.8;
			}

			50% {
				transform: scale(1.3);
				filter: drop-shadow(0 0 15px #fff);
				opacity: 1;
			}

			100% {
				transform: scale(1);
				filter: drop-shadow(0 0 5px #e2c07d);
				opacity: 0.8;
			}
		}

		.pet-marker.highlight-active {
			z-index: 9999 !important;
		}

		.pet-marker.highlight-active::after {
			content: '';
			position: absolute;
			top: 50%;
			left: 50%;
			width: 60px;
			height: 60px;
			transform: translate(-50%, -50%);
			border-radius: 50%;
			border: 3px solid #e2c07d;
			box-shadow: 0 0 15px #e2c07d, inset 0 0 10px #e2c07d;
			animation: petPulse 2s infinite ease-in-out;
			pointer-events: none;
		}

		@keyframes petPulse {
			0% {
				transform: translate(-50%, -50%) scale(0.8);
				opacity: 0.3;
			}

			50% {
				transform: translate(-50%, -50%) scale(1.2);
				opacity: 0.8;
			}

			100% {
				transform: translate(-50%, -50%) scale(0.8);
				opacity: 0.3;
			}
		}

		.boss-active {
			border-radius: 50%;
			box-shadow: 0 0 0 0 rgba(0, 255, 0, 1);
			animation: pulse-green 2s infinite;
			background-color: rgba(0, 255, 0, 0.3);
		}

		@keyframes pulse-green {
			0% {
				box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7);
			}

			70% {
				box-shadow: 0 0 0 10px rgba(0, 255, 0, 0);
			}

			100% {
				box-shadow: 0 0 0 0 rgba(0, 255, 0, 0);
			}
		}

		/* Personal Marker UI Styles */
		#marker-picker {
			display: none;
			position: absolute;
			z-index: 20000;
			background: rgba(10, 8, 5, 0.95);
			border: 1px solid #4a3b2a;
			padding: 5px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
		}

		.marker-row {
			display: flex;
		}

		.marker-icon-btn {
			width: 24px;
			height: 24px;
			cursor: pointer;
			margin: 2px;
			border: 1px solid transparent;
			transition: 0.2s;
		}

		.marker-icon-btn:hover {
			border-color: #e2c07d;
			background: rgba(226, 192, 125, 0.2);
		}

		.prompt-overlay {
			display: none;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: rgba(10, 8, 5, 0.98);
			border: 1px solid #e2c07d;
			padding: 20px;
			z-index: 20001;
			text-align: center;
			box-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
			font-family: "Crimson Text", serif;
		}

		.prompt-btn {
			background: #1a1510;
			border: 1px solid #4a3b2a;
			color: #e2c07d;
			padding: 5px 15px;
			cursor: pointer;
			font-family: "Crimson Text", serif;
			font-weight: bold;
			margin: 0 5px;
			text-transform: uppercase;
			transition: 0.2s;
		}

		.prompt-btn:hover {
			background: #2a221a;
			border-color: #e2c07d;
		}

		.prompt-btn.danger {
			color: #ff4a4a;
		}
	</style>
</head>

<body class="tracking-active">
	<div id="map"></div>

	<div id="marker-picker"></div>
	<div id="marker-label-prompt" class="prompt-overlay">
		<div
			style="color: #e2c07d; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">
			Label Marker</div>
		<input type="text" id="marker-label-input"
			style="background: #1a1510; border: 1px solid #4a3b2a; color: #fff; padding: 5px; width: 200px; margin-bottom: 15px; font-family: 'Crimson Text', serif;" />
		<br>
		<button class="prompt-btn" onclick="saveMarkerLabel()">Save</button>
		<button class="prompt-btn" onclick="cancelMarkerLabel()">Cancel</button>
	</div>
	<div id="marker-remove-prompt" class="prompt-overlay">
		<div
			style="color: #e2c07d; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">
			Remove Marker?</div>
		<button class="prompt-btn danger" onclick="confirmRemoveMarker()">Remove</button>
		<button class="prompt-btn" onclick="cancelRemoveMarker()">Cancel</button>
	</div>

	<div id="coord-hud">
		<div>
			PLAYER: <span id="p-x" class="coord-val">0</span>, <span id="p-y" class="coord-val">0</span>
		</div>
		<div>
			CURSOR: <span id="c-x" class="coord-val">0</span>, <span id="c-y" class="coord-val">0</span>
		</div>
		<div style="font-size: 10px; color: #888; margin-top: 4px; text-transform: uppercase;">
			TRACKING: <span id="track-status" style="color:#00ff00;">ON</span>
		</div>
	</div>

	<div class="compass-container">
		<div id="compass-glow"></div>
		<div class="nav-hitbox" style="top:48px; left:48px;" onclick="setTracking(true)"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Track Player', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
		<div class="nav-hitbox" style="top:0px; left:48px;" onclick="jump('Central Tyria')"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Central Tyria', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
		<div class="nav-hitbox" style="top:48px; right:0px;" onclick="jump('Crystal Desert')"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Crystal Desert', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
		<div class="nav-hitbox" style="bottom:0px; left:48px;" onclick="jump('Cantha')"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Cantha', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
		<div class="nav-hitbox" style="top:48px; left:0px;" onclick="jump('Heart of Maguuma')"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Heart of Maguuma', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
		<div class="nav-hitbox" style="bottom:10px; left:10px;" onclick="jump('Castora')"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Castora', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
		<div class="nav-hitbox" style="top:10px; left:10px;" onclick="jump('Horn of Maguuma')"
			onmouseover="window.parent.postMessage({action:'showTooltip', text:'Horn of Maguuma', x:event.clientX, y:event.clientY, offsetTop: 45}, '*')"
			onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')"></div>
	</div>

	<script>
		/*<![CDATA[*/
		const BORDER_CONFIG = {
			floors: [1, 2, 49],
			styles: {
				color: '#8a7a5f',
				weight: 2,
				fillOpacity: 0
			},
			globalOffset: { x: 0, y: 0 }
		};

		var isTracking = true;
		var layerToggles = { 'poi': true, 'waypoint': true, 'vista': true, 'heart': true, 'heropoint': true, 'mastery': true, 'region': true, 'map_text': true, 'sector': true, 'personal_markers': true, 'map_borders': true };
		var map;
		var markers = [];
		var subLayers = {};
		var activeHighlightMarker = null;
		var activeTempIconMarker = null;
		var activeHighlightTimeout = null;
		var markerDataCache = [];
		var layerMap = { 'region': L.layerGroup(), 'map_text': L.layerGroup(), 'sector': L.layerGroup() };
		var borderLayer = L.layerGroup();

		var map = L.map("map", { crs: L.extend({}, L.CRS.Simple, { transformation: new L.Transformation(1 / 128, 0, 1 / 128, 0) }), minZoom: 1, maxZoom: 7, zoomControl: false, attributionControl: false, doubleClickZoom: false });

		map.createPane('iconPane').style.zIndex = 650;
		map.createPane('textPane').style.zIndex = 700;
		map.getPane('textPane').style.pointerEvents = 'none';
		map.createPane('playerPane').style.zIndex = 800;
		map.getPane('playerPane').style.pointerEvents = 'none';
		map.createPane('customMarkerPane').style.zIndex = 850;
		map.createPane('highlightPane').style.zIndex = 590;
		map.getPane('highlightPane').style.pointerEvents = 'none';

		var mapStorageKey = 'gw2_custom_markers_tyria';

		const createClusterIcon = (cluster) => {
			var markers = cluster.getAllChildMarkers();
			if (!markers || markers.length === 0) return L.divIcon({ html: '' });
			var count = markers.length;
			
			let baseSize = 24;
			let isPet = false;
			let firstMarker = markers[0];
			let iconUrl = "";
			
			if (firstMarker.options.icon && firstMarker.options.icon.options) {
				let opt = firstMarker.options.icon.options;
				iconUrl = opt.iconUrl || "";
				if (opt.className && opt.className.includes("pet-marker")) {
					isPet = true;
					baseSize = 52; // Perfect 52px base size for pet clusters
				}
			}
			
			if (isPet) {
				iconUrl = "https://gw2ps.local/Assets/RangerPetIcons/ranger_icon.png";
			} else if (!iconUrl) {
				// Fallback to dynamic data fields or default icon
				if (firstMarker.options.data && firstMarker.options.data.icon) {
					iconUrl = firstMarker.options.data.icon;
				} else {
					iconUrl = "https://gw2ps.local/Assets/Icons/poi_discovered.png";
				}
			}
			
			let scale = isPet ? farmScale : locScale;
			let size = Math.round(baseSize * scale);
			
			let html = "";
			if (isPet) {
				html = `<div style="position: relative; display: flex; align-items: center; justify-content: center; width: ${size}px; height: ${size}px;">
							<img src="${iconUrl}" style="width: ${size}px; height: ${size}px;" />
							<div style="position: absolute; bottom: -3px; right: -3px; background: rgba(10,30,15,0.95); color: #2ecc71; border: 1px solid #2ecc71; border-radius: 4px; font-size: 9px; padding: 0px 3px; font-weight: bold; font-family: sans-serif; box-shadow: 0 0 5px rgba(0,0,0,0.5); z-index: 10;">${count}</div>
						</div>`;
			} else {
				html = `<div style="position: relative; display: flex; align-items: center; justify-content: center; width: ${size}px; height: ${size}px;">
							<img src="${iconUrl}" style="width: ${size}px; height: ${size}px;" />
							<div style="position: absolute; bottom: -3px; right: -3px; background: rgba(10,8,5,0.9); color: #e2c07d; border: 1px solid #e2c07d; border-radius: 4px; font-size: 9px; padding: 0px 3px; font-weight: bold; font-family: monospace; box-shadow: 0 0 5px rgba(0,0,0,0.5); z-index: 10;">${count}</div>
						</div>`;
			}
			
			return L.divIcon({ 
				html: html, 
				className: isPet ? 'pet-cluster-icon' : 'custom-cluster-icon', 
				iconSize: [size, size], 
				iconAnchor: [size / 2, size / 2] 
			});
		};

		var customMarkersLayer = L.markerClusterGroup({ disableClusteringAtZoom: 7, maxClusterRadius: 40, showCoverageOnHover: false, iconCreateFunction: createClusterIcon }).addTo(map);

		var mSettings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');

		// Setup separate scale factors
		var locScale = mSettings.markerScale !== undefined ? (mSettings.markerScale / 100) : 1.0;
		var farmScale = mSettings.farmingMarkerScale !== undefined ? (mSettings.farmingMarkerScale / 100) : 1.0;

		const farmingScaleNodes = [
			'node_pact_supply_network_agent',
			'node_mists_rift',
			'node_ranger_pet',
			'node_world_boss',
			'node_fishing_hole'
		];

		const independentNodes = [
			'node_zone_portal', 'node_mists_rift', 'node_pact_supply_network_agent', 'node_ranger_pet',

			}

				L.DomEvent.stopPropagation(e);

		function buildMapMetaHtml(p) {
			if (!p.level && !p.waypoints) return null;

			const rowStyle = "display: flex; align-items: center; gap: 6px; font-size: 12px; text-transform: none; color: #fff; white-space: nowrap;";
			const itemStyle = "display: flex; align-items: center; gap: 3px;";
			const iconStyle = "width: 14px; height: 14px; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5));";
			const dividerStyle = "color: #8a7a5f; opacity: 0.8; font-size: 14px; line-height: 1;";

			let html = `<div style="${rowStyle}">`;
			if (p.level) html += `<span style="color:#e2c07d; font-weight:bold; margin-right:5px;">[LVL ${p.level}]</span>`;

			const items = [];
			if (p.waypoints) items.push(`<div style="${itemStyle}"><img src="https://gw2ps.local/Assets/Icons/waypoint_discovered.png" style="${iconStyle}"> ${p.waypoints}</div>`);
			if (p.hearts) items.push(`<div style="${itemStyle}"><img src="https://gw2ps.local/Assets/Icons/heart_discovered.png" style="${iconStyle}"> ${p.hearts}</div>`);
			if (p.heropoints) items.push(`<div style="${itemStyle}"><img src="https://gw2ps.local/Assets/Icons/heropoint_discovered.png" style="${iconStyle}"> ${p.heropoints}</div>`);
			if (p.pois) items.push(`<div style="${itemStyle}"><img src="https://gw2ps.local/Assets/Icons/poi_discovered.png" style="${iconStyle}"> ${p.pois}</div>`);
			if (p.vistas) items.push(`<div style="${itemStyle}"><img src="https://gw2ps.local/Assets/Icons/vista_discovered.png" style="${iconStyle}"> ${p.vistas}</div>`);
			if (p.masteries) {

				items.push(`<div style="${itemStyle}"><img src="https://gw2ps.local/Assets/Icons/${mIcon}" style="${iconStyle}"> ${p.masteries}</div>`);

			html += items.join(`<span style="${dividerStyle}">&bull;</span>`);
			html += `</div>`;
			return html;
		}

		async function loadFlowingBorders() {
			try {
				for (const floorId of BORDER_CONFIG.floors) {
					const response = await fetch(`https://api.guildwars2.com/v2/continents/1/floors/${floorId}`);
					if (!response.ok) continue;

					const data = await response.json();
					const mapsInFloor = data.regions;
					for (const regionId in mapsInFloor) {
						const region = mapsInFloor[regionId];
						for (const mapId in region.maps) {
							const mapData = region.maps[mapId];
							if (mapData.sectors) {
								Object.values(mapData.sectors).forEach(sector => {
									if (sector.bounds && sector.bounds.length > 0) {
										const latlngs = sector.bounds.map(b => {
											let finalX = b[0] + BORDER_CONFIG.globalOffset.x;
											let finalY = b[1] + BORDER_CONFIG.globalOffset.y;
											return [finalY, finalX];
										});
										L.polygon(latlngs, {
											color: BORDER_CONFIG.styles.color,
											weight: BORDER_CONFIG.styles.weight,
											fillOpacity: BORDER_CONFIG.styles.fillOpacity,
											interactive: false,
											pane: 'iconPane'
										}).addTo(borderLayer);
									}
								});
							}
						}
					}
				}
			} catch (e) { console.error("Failed to load flowing borders:", e); }
		}

		function getElisaActiveWeek(currentTime = new Date()) {
			const epoch = Date.UTC(2017, 8, 22, 8, 0, 0); // Friday Reset: Sept 22, 2017 08:00 UTC
			const currentMs = currentTime.getTime();
			const elapsedWeeks = (currentMs - epoch) / (7 * 24 * 60 * 60 * 1000);
			const activeWeek = Math.floor((elapsedWeeks + 37) % 52) + 1;
			return activeWeek;
		}

			50: { map: "The Desolation", area: "The Alkali Pan", desc: "On a rock outcrop in the southeastern corner of the Pan.", pos: [52946, 59963] },
			51: { map: "Desert Highlands", area: "Brightwater Inlet", desc: "Inside the blue tent right next to Nimbose Butte.", pos: [41495, 59532] },
			52: { map: "The Desolation", area: "Boundary Preserve", desc: "On the mountain ridge in-between this area and The Bonestrand, southwest of the Silent Vale.", pos: [48889, 60938] }
		};

		function renderElisaMarker() {
			elisaLayer.clearLayers();
			if (layerToggles['node_historian_elisa'] === false) return;
			
			let activeWeek = getElisaActiveWeek();
			let data = ELISA_ROTATION[activeWeek];
			if (!data) return;
			
			let iconPath = "https://wiki.guildwars2.com/images/1/19/Merchant.png";
			let scale = locScale;
			let size = Math.round(30 * scale);
			
			let html = `<div class="elisa-marker psna-highlight-active" style="width: ${size}px; height: ${size}px; border-radius: 50%; border: 2px solid #ffd700; background: rgba(10, 8, 5, 0.9); box-shadow: 0 0 12px #ffd700; display: flex; align-items: center; justify-content: center; overflow: hidden;">
							<img src="${iconPath}" style="width: 80%; height: 80%; object-fit: contain;" />
						</div>`;
						
			let m = L.marker(data.pos, {
				pane: 'customMarkerPane',
				interactive: true,
				icon: L.divIcon({
					html: html,
					className: 'elisa-custom-icon',
					iconSize: [size, size],
					iconAnchor: [size / 2, size / 2]
				})
			});
			
			let tooltipHtml = `<div style="text-align: center; font-family: 'Crimson Text', serif; font-size: 13px; color: #e2c07d; line-height: 1.4; padding: 4px;">
								<div style="font-weight: bold; font-size: 15px; margin-bottom: 4px; letter-spacing: 1px; border-bottom: 1px solid #4a3b2a; padding-bottom: 2px;">PRIORY HISTORIAN ELISA</div>
								<div style="font-size: 11px; color: #8a7a5f; margin-bottom: 6px; text-transform: uppercase;">ACTIVE WEEK: ${activeWeek} / 52</div>
								<div><strong>Map:</strong> ${data.map} (${data.area})</div>
								<div style="margin-top: 6px; font-style: italic; color: #fff; font-size: 12px; text-transform: none;">"${data.desc}"</div>
							   </div>`;
							   
			m.on('mouseover', e => {
				var pt = map.mouseEventToContainerPoint(e.originalEvent);
				window.parent.postMessage({ action: 'showTooltip', text: tooltipHtml, x: pt.x, y: pt.y, offsetTop: 45 }, "*");
			});
			m.on('mouseout', () => window.parent.postMessage({ action: 'hideTooltip' }, "*"));
			
			elisaLayer.addLayer(m);
			elisaLayer.addTo(map);
		}

		async function init() {
			customMarkersLayer.clearLayers();
			borderLayer.clearLayers();
			Object.values(layerMap).forEach(l => { l.clearLayers(); map.removeLayer(l); });
			Object.values(subLayers).forEach(l => { l.clearLayers(); map.removeLayer(l); });

			let tempSettings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
			if (tempSettings.borderColor) {
				BORDER_CONFIG.styles.color = tempSettings.borderColor;
			}

			loadCustomMarkers();
			loadFlowingBorders();

			try {
				let settings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
				Object.keys(settings).forEach(key => { layerToggles[key] = settings[key]; });

				let markerSettings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');
				Object.keys(markerSettings).forEach(key => { layerToggles[key] = markerSettings[key]; });

				const [mRes, iRes, fRes] = await Promise.all([
					fetch("https://gw2ps.local/Data/map_data.json"),
					fetch("https://gw2ps.local/Data/mastery_insights.json"),
					fetch("https://gw2ps.local/Data/farming_markers.json").catch(() => null)
				]);

				// 1. Mastery Insights
				if (iRes.ok) {
					const iData = await iRes.json();
					iData.points.forEach(p => {
						let iconPath = "https://gw2ps.local/Assets/Icons/mastery_icon.png";
						if (p.name.includes("(PoF)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_pof.png";
						else if (p.name.includes("(HoT)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_hot.png";
						else if (p.name.includes("(IBS)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_ibs.png";
						else if (p.name.includes("(VoE)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_voe.png";
						else if (p.name.includes("(EoD)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_eod.png";
						else if (p.name.includes("(JW)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_jw.png";
						else if (p.name.includes("(SotO)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_soto.png";
						else if (p.name.includes("(Tyria)")) iconPath = "https://gw2ps.local/Assets/Icons/mi_tyria.png";

						let m = L.marker([parseFloat(p.pos[1]), parseFloat(p.pos[0])], { pane: 'iconPane', interactive: true, icon: L.icon({ iconUrl: iconPath, iconSize: [24 * locScale, 24 * locScale], iconAnchor: [12 * locScale, 12 * locScale] }) });
						m.on('mouseover', e => { var pt = map.mouseEventToContainerPoint(e.originalEvent); window.parent.postMessage({ action: 'showTooltip', text: p.name || "Mastery Insight", x: pt.x, y: pt.y, offsetTop: 45 }, "*"); });
						m.on('mouseout', () => window.parent.postMessage({ action: 'hideTooltip' }, "*"));
						if (p.chat_code && p.chat_code.trim() !== "") m.on('click', () => { navigator.clipboard.writeText(p.chat_code); window.parent.postMessage({ action: 'toast', msg: 'CHATLINK COPIED' }, "*"); });

						if (!subLayers['mastery']) {
							subLayers['mastery'] = L.markerClusterGroup({ disableClusteringAtZoom: 6, maxClusterRadius: 40, showCoverageOnHover: false, iconCreateFunction: createClusterIcon });
						}
						m.addTo(subLayers['mastery']);
					});
				}

				// 2. Farming Nodes (High Volume)
				if (fRes && fRes.ok) {
					const fData = await fRes.json();
					markerDataCache = fData;
					const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
					const today = days[new Date().getUTCDay()];

					// Mapping data labels to UI IDs
					const mapping = {
						'rich_copper_vein': 'node_copper_ore',
						'rich_iron_vein': 'node_iron_ore',
						'rich_silver_vein': 'node_silver_ore',
						'rich_gold_vein': 'node_gold_ore',
						'rich_platinum_vein': 'node_platinum_ore',
						'dragon_pata': 'node_dragon_pinata',
						'dragon_piata': 'node_dragon_pinata'
					};

					fData.forEach(p => {
						if (!p.node) return;
						if (p.day && p.day !== today) return;
						if (p.continent && p.continent !== 1) return; // Skip WvW (Continent 2) markers on Tyria overworld map

						let slug = p.node.toLowerCase().replace(/ñ/g, 'n').replace(/ /g, '_').replace(/[^a-z0-9_]/g, '');
						let layerKey = p.type || p.layer;
						if (!layerKey) {
							if (mapping[slug]) {
								layerKey = mapping[slug];
							} else {
								layerKey = "node_" + slug;
							}
						}

						if (p.layer) layerKey = p.layer;
						else if (p.type === 'node_ranger_pet') layerKey = 'node_ranger_pet';
						else if (p.yields && p.yields.includes("Ranger Pet")) layerKey = "node_ranger_pet";

						if (!subLayers[layerKey]) {
							if (layerKey !== 'node_zone_portal') {
								subLayers[layerKey] = L.markerClusterGroup({
									disableClusteringAtZoom: 6, maxClusterRadius: 40, showCoverageOnHover: false,
									iconCreateFunction: createClusterIcon
								});
							} else {
								subLayers[layerKey] = L.layerGroup();
							}
						}

						let currentScale = farmingScaleNodes.includes(layerKey) ? farmScale : locScale;
						let baseSize = (layerKey === 'node_major_detected_treasure') ? 48 : (layerKey === 'node_ranger_pet') ? 35 : (layerKey === 'node_fishing_hole') ? 32 : 24;
						let glowClass = "";

						let m = L.marker([p.pos[1], p.pos[0]], {
							pane: 'iconPane', interactive: true,
							bossName: p.node,
							data: p,
							icon: (layerKey === 'node_ranger_pet') ? L.divIcon({
								className: 'pet-marker pet-' + slug,
								iconSize: [baseSize * currentScale, baseSize * currentScale],
								iconAnchor: [(baseSize / 2) * currentScale, (baseSize / 2) * currentScale],
								html: `<img src="${p.icon || 'https://gw2ps.local/Assets/Icons/poi_discovered.png'}" />`
							}) : (layerKey === 'node_pact_supply_network_agent') ? L.divIcon({
								className: 'psna-custom-icon',
								iconSize: [30 * currentScale, 30 * currentScale],
								iconAnchor: [15 * currentScale, 15 * currentScale],
								html: `<div class="psna-marker psna-highlight-active" style="width: ${30 * currentScale}px; height: ${30 * currentScale}px; border-radius: 50%; border: 2px solid #ffd700; background: rgba(10, 8, 5, 0.9); box-shadow: 0 0 10px #ffd700; display: flex; align-items: center; justify-content: center; overflow: hidden;">
											<img src="${p.icon || 'https://gw2ps.local/Assets/Icons/poi_discovered.png'}" style="width: 80%; height: 80%; object-fit: contain;" />
									   </div>`
							}) : L.icon({
								iconUrl: p.icon || "https://gw2ps.local/Assets/Icons/poi_discovered.png",
								iconSize: [baseSize * currentScale, baseSize * currentScale], iconAnchor: [(baseSize / 2) * currentScale, (baseSize / 2) * currentScale],
								className: glowClass
							})
						});

						let tooltipText = p.day ? `${p.node} (${p.day.toUpperCase()})` : p.node;
						if (p.no_underwater) tooltipText += ` <img src="${p.no_underwater}" style="width:16px;height:16px;vertical-align:middle;margin-left:5px;" />`;

						m.on('mouseover', e => { var pt = map.mouseEventToContainerPoint(e.originalEvent); window.parent.postMessage({ action: 'showTooltip', text: tooltipText, x: pt.x, y: pt.y, offsetTop: 45 }, "*"); });
						m.on('mouseout', () => window.parent.postMessage({ action: 'hideTooltip' }, "*"));
						if (p.chat_code) m.on('click', () => { navigator.clipboard.writeText(p.chat_code); window.parent.postMessage({ action: 'toast', msg: 'WAYPOINT COPIED' }, "*"); });

						m.addTo(subLayers[layerKey]);
					});
				}

				// 3. Standard Map Data (POIs, Labels, etc.)
				if (mRes.ok) {
					const data = await mRes.json();
					const typeMap = { 'landmark': 'poi', 'waypoint': 'waypoint', 'vista': 'vista', 'heart': 'heart', 'skill': 'heropoint', 'heropoint': 'heropoint', 'mastery': 'mastery' };
					const labelMapKeys = { 'region': 'region', 'map': 'map_text', 'sector': 'sector' };

					data.points.forEach(p => {
						let rawType = p.type.toLowerCase();
						let type = typeMap[rawType] || rawType;
						let labelKey = labelMapKeys[rawType];

						if (labelKey) {
							let l = L.marker([p.pos[1], p.pos[0]], {
								pane: 'textPane', interactive: true,
								icon: L.divIcon({ className: 'map-label ' + (labelKey === 'region' ? 'region-label' : labelKey === 'map_text' ? 'map-title-label' : 'sector-label'), html: p.name, iconSize: [400, 40] })
							});
							if (labelKey === 'map_text') {
								l.on('mouseover', e => {
									let meta = buildMapMetaHtml(p);
									if (meta) {
										var pt = map.mouseEventToContainerPoint(e.originalEvent);
										window.parent.postMessage({ action: 'showTooltip', text: meta, x: pt.x, y: pt.y, offsetTop: 45 }, "*");
									}
								});
								l.on('mouseout', () => window.parent.postMessage({ action: 'hideTooltip' }, "*"));
							}
							l.addTo(layerMap[labelKey]);
						} else {
							if (!subLayers[type]) {
								subLayers[type] = L.markerClusterGroup({ disableClusteringAtZoom: 6, maxClusterRadius: 40, showCoverageOnHover: false, iconCreateFunction: createClusterIcon });
							}
							let iconPath = "https://gw2ps.local/Assets/Icons/poi_discovered.png";
							if (type === 'waypoint') iconPath = "https://gw2ps.local/Assets/Icons/waypoint_discovered.png";
							else if (type === 'vista') iconPath = "https://gw2ps.local/Assets/Icons/vista_discovered.png";
							else if (type === 'heart') iconPath = "https://gw2ps.local/Assets/Icons/heart_discovered.png";
							else if (type === 'heropoint') iconPath = "https://gw2ps.local/Assets/Icons/heropoint_discovered.png";

							let m = L.marker([p.pos[1], p.pos[0]], { pane: 'iconPane', interactive: true, icon: L.icon({ iconUrl: iconPath, iconSize: [24 * locScale, 24 * locScale], iconAnchor: [12 * locScale, 12 * locScale] }) });
							m.on('mouseover', e => { var pt = map.mouseEventToContainerPoint(e.originalEvent); window.parent.postMessage({ action: 'showTooltip', text: p.name || "Map Point", x: pt.x, y: pt.y, offsetTop: 45 }, "*"); });
							m.on('mouseout', () => window.parent.postMessage({ action: 'hideTooltip' }, "*"));
							m.addTo(subLayers[type]);
						}
					});
				}

				// Finalize Visibility
				Object.keys(subLayers).forEach(key => {
					if (key.startsWith('node_')) {
						if (independentNodes.includes(key)) {
							if (layerToggles[key] !== false) map.addLayer(subLayers[key]);
						} else {
							let isMasterOn = layerToggles['farming_nodes'] !== false;
							let isNodeOn = layerToggles[key] !== false;
							if (isMasterOn && isNodeOn) map.addLayer(subLayers[key]);
						}
					} else {
						if (layerToggles[key] !== false) map.addLayer(subLayers[key]);
					}
				});
				refreshLabels();

				if (layerToggles['personal_markers'] === false) map.removeLayer(customMarkersLayer);
				if (layerToggles['map_borders'] === false) map.removeLayer(borderLayer);

				renderElisaMarker(); // Calculate and display Historian Elisa!

				refreshLabels();
			} catch (e) { console.error(e); }
		}
		init();

		window.addEventListener("message", function (event) {
			if (event.data && event.data.action === 'toggleMapLayer') {
				window.toggleMapLayer(event.data.name, event.data.isVisible);
			}
			if (event.data && event.data.action === 'jumpToLocation') {
				let x = event.data.x;
				let y = event.data.y;
				if (x !== undefined && y !== undefined) {
					window.setTracking(false);
					map.setView([parseFloat(y), parseFloat(x)], 6);
				}
			}
			if (event.data && event.data.action === 'highlightLocation') {
				let x = event.data.x;
				let y = event.data.y;
				let isPet = event.data.isPet;
				let isFarmingNode = event.data.isFarmingNode;
				let markerIcon = event.data.markerIcon;
				let layerKey = event.data.layerKey;
				let markerName = event.data.markerName;
				
				// Clear any previous active highlight and temporary clone immediately
				if (activeHighlightTimeout) {
					clearTimeout(activeHighlightTimeout);
					activeHighlightTimeout = null;
				}
				if (activeHighlightMarker) { map.removeLayer(activeHighlightMarker); activeHighlightMarker = null; }
				if (activeTempIconMarker) { map.removeLayer(activeTempIconMarker); activeTempIconMarker = null; }
				
				if (x !== undefined && y !== undefined) {
					let posArr = [parseFloat(y), parseFloat(x)];
					
					// 1. Highlight Ring
					let markerClass = 'highlight-active';
					if (isPet) {
						markerClass = 'pet-marker highlight-active';
					} else if (isFarmingNode) {
						markerClass = 'highlight-node-active';
					}
					
					activeHighlightMarker = L.marker(posArr, {
						pane: 'highlightPane',
						icon: L.divIcon({
							className: markerClass,
							iconSize: [44, 44],
							iconAnchor: [22, 22],
							html: '<div style="width:100%;height:100%;"></div>'
						}),
						interactive: false
					}).addTo(map);
					
					// 2. Temporary Marker Clone (if the layer is not permanently shown)
					let tempIconMarker = null;
					let isPermanentlyShown = false;
					if (layerKey) {
						let type = layerKey === 'landmark' ? 'poi' : layerKey;
						if (subLayers[type] && map.hasLayer(subLayers[type])) {
							isPermanentlyShown = true;
						} else if (layerMap[type] && map.hasLayer(layerMap[type])) {
							isPermanentlyShown = true;
						} else if (layerToggles[type] === true) {
							isPermanentlyShown = true;
						}
					}
					
					if (!isPermanentlyShown && markerIcon) {
						let currentScale = locScale;
						let baseSize = (layerKey === 'node_major_detected_treasure') ? 48 : (layerKey === 'node_ranger_pet') ? 35 : (layerKey === 'node_fishing_hole') ? 32 : 24;
						
						let customIcon;
						if (isPet) {
							let slug = (markerName || '').toLowerCase().replace(/ñ/g, 'n').replace(/ /g, '_').replace(/[^a-z0-9_]/g, '');
							customIcon = L.divIcon({
								className: 'pet-marker pet-' + slug,
								iconSize: [baseSize * currentScale, baseSize * currentScale],
								iconAnchor: [(baseSize / 2) * currentScale, (baseSize / 2) * currentScale],
								html: `<img src="${markerIcon}" style="width:150% !important; height:150% !important; border-radius:50% !important; object-fit:cover !important;" />`
							});
						} else {
							customIcon = L.icon({
								iconUrl: markerIcon,
								iconSize: [baseSize * currentScale, baseSize * currentScale],
								iconAnchor: [(baseSize / 2) * currentScale, (baseSize / 2) * currentScale]
							});
						}
						
						let type = layerKey === 'landmark' ? 'poi' : layerKey;
						tempIconMarker = L.marker(posArr, {
							icon: customIcon,
							interactive: true,
							layerKey: type // Store type (e.g. 'poi', 'waypoint') on options for toggle cleanup
						}).addTo(map);
						if (markerName) {
							tempIconMarker.on('mouseover', e => {
								var pt = map.mouseEventToContainerPoint(e.originalEvent);
								window.parent.postMessage({ action: 'showTooltip', text: markerName, x: pt.x, y: pt.y, offsetTop: 45 }, "*");
							});
							tempIconMarker.on('mouseout', () => {
								window.parent.postMessage({ action: 'hideTooltip' }, "*");
							});
						}
						activeTempIconMarker = tempIconMarker;
					}
					
					activeHighlightTimeout = setTimeout(() => {
						if (activeHighlightMarker) { map.removeLayer(activeHighlightMarker); activeHighlightMarker = null; }
						if (activeTempIconMarker) { map.removeLayer(activeTempIconMarker); activeTempIconMarker = null; }
						activeHighlightTimeout = null;
					}, 60000);
				}
			}
			if (event.data && event.data.action === 'updateTheme') {
				document.body.setAttribute('data-theme', event.data.theme);
			}
			if (event.data && event.data.action === 'changeMapBorderColor') {
				BORDER_CONFIG.styles.color = event.data.color;
				borderLayer.clearLayers();
				loadFlowingBorders();
			}
			if (event.data && event.data.action === 'highlightLayer') {
				let layerName = event.data.layer;
				let petName = (event.data.markerName || "").trim().toLowerCase();
				if (!petName) return;

				// Determine if the layer was originally set to OFF in user settings
				let originallyOff = false;
				if (layerName) {
					let markerSettings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');
					let mapSettings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
					originallyOff = (markerSettings[layerName] !== true && mapSettings[layerName] !== true);
				}

				// Ensure target layer is temporarily visible for highlighting
				if (layerName && originallyOff) {
					window.toggleMapLayer(layerName, true);
				}

				let foundCount = 0;

				// Create temporary cluster group for highlights
				let highlightClusterGroup = L.markerClusterGroup({
					disableClusteringAtZoom: 6,
					maxClusterRadius: 40,
					showCoverageOnHover: false,
					clusterPane: 'highlightPane',
					iconCreateFunction: (cluster) => {
						let childMarkers = cluster.getAllChildMarkers();
						let markerClass = 'highlight-node-active';
						if (childMarkers.length > 0 && childMarkers[0].options.highlightClass) {
							markerClass = childMarkers[0].options.highlightClass;
						}
						
						let scale = (markerClass.includes('pet-marker')) ? farmScale : locScale;
						let baseSize = (markerClass.includes('pet-marker')) ? 52 : 36;
						let size = Math.round(baseSize * scale);
						let anchor = size / 2;

						return L.divIcon({
							className: markerClass,
							iconSize: [size, size],
							iconAnchor: [anchor, anchor],
							html: '<div style="width:100%;height:100%;"></div>'
						});
					}
				});

				// Use the raw markerDataCache for 100% accurate coordinate placement
				markerDataCache.forEach(p => {
					if (!p.node || !p.pos) return;
					let nodeName = p.node.trim().toLowerCase();

					if (nodeName.includes(petName)) {
						foundCount++;
						// Use the exact same coordinate array logic as the successful init() function
						let posArr = [p.pos[1], p.pos[0]];
						
						let isPet = layerName === 'node_ranger_pet' || nodeName.includes("juvenile");
						let markerClass = isPet ? 'pet-marker highlight-active' : 'highlight-node-active';

						let highlightMarker = L.marker(posArr, {
							pane: 'highlightPane',
							highlightClass: markerClass, // Store on options for iconCreateFunction
							icon: L.divIcon({
								className: markerClass,
								iconSize: [44, 44],
								iconAnchor: [22, 22],
								html: '<div style="width:100%;height:100%;"></div>'
							}),
							interactive: false
						});
						highlightClusterGroup.addLayer(highlightMarker);
					}
				});

				if (foundCount > 0) {
					highlightClusterGroup.addTo(map);
					window.parent.postMessage({ action: 'toast', msg: `HIGHLIGHTED ${foundCount} "${petName.toUpperCase()}" LOCATIONS` }, '*');
					
					setTimeout(() => {
						map.removeLayer(highlightClusterGroup);
						highlightClusterGroup.clearLayers();
						
						// Only turn the layer OFF if the user has not manually enabled it during the highlighted session
						if (layerName && originallyOff) {
							let markerSettings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');
							let mapSettings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
							let currentToggleOn = (markerSettings[layerName] === true || mapSettings[layerName] === true);
							if (!currentToggleOn) {
								window.toggleMapLayer(layerName, false);
							}
						}
					}, 60000);
				} else {
					// Fallback search through DOM if cache failed or for non-farming markers
					document.querySelectorAll('.pet-marker').forEach(el => {
						if (el.className.toLowerCase().includes(petName.replace(/ /g, '_'))) {
							el.classList.add('highlight-active');
							foundCount++;
						}
					});
					if (foundCount > 0) {
						window.parent.postMessage({ action: 'toast', msg: `HIGHLIGHTED ${foundCount} VISIBLE ICONS` }, '*');
						setTimeout(() => {
							document.querySelectorAll('.highlight-active').forEach(el => el.classList.remove('highlight-active'));
							
							// Only turn the layer OFF if the user has not manually enabled it during the highlighted session
							if (layerName && originallyOff) {
								let markerSettings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');
								let mapSettings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
								let currentToggleOn = (markerSettings[layerName] === true || mapSettings[layerName] === true);
								if (!currentToggleOn) {
									window.toggleMapLayer(layerName, false);
								}
							}
						}, 60000);
					}
				}
			}
			if (event.data && event.data.action === 'updateTheme') {
				document.body.setAttribute('data-theme', event.data.theme);
			}
			if (event.data && event.data.action === 'toggleMenuState') {
				if (event.data.isOpen) document.body.classList.add('menu-open');
				else document.body.classList.remove('menu-open');
				if (isTracking) {
					let lastPos = pMarker.getLatLng();
					window.updatePlayerLocation(lastPos.lng, lastPos.lat, 0, 0);
				}
			}
			if (event.data && event.data.action === 'reloadMap') {
				init();
			}
			if (typeof event.data === 'string' && event.data.startsWith('ACTIVE_BOSSES:')) {
				let jsonStr = event.data.substring(14);
				try {
					let activeBosses = JSON.parse(jsonStr);
					if (subLayers['node_world_boss']) {
						subLayers['node_world_boss'].eachLayer(marker => {
							if (marker.options.bossName && activeBosses.includes(marker.options.bossName)) {
								if (marker._icon) marker._icon.classList.add('boss-active');
							} else {
								if (marker._icon) marker._icon.classList.remove('boss-active');
							}
						});
					}
				} catch (e) { }
			}
		});
		document.body.setAttribute('data-theme', localStorage.getItem('gw2_theme') || 'human');
		/*]]>*/
	</script>
</body>
