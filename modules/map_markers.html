<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; box-sizing: border-box; }
			body { 
				margin: 0; background: transparent; padding: 20px; color: #e2c07d; 
				font-family: "Crimson Text", serif; text-transform: uppercase; 
				display: flex; flex-direction: column; height: 100vh; overflow-y: auto; 
			}

			/* Styled Scrollbar */
			body::-webkit-scrollbar { width: 6px; }
			body::-webkit-scrollbar-track { background: rgba(10, 8, 5, 0.5); }
			body::-webkit-scrollbar-thumb { background: #4a3b2a; border-radius: 3px; }
			body::-webkit-scrollbar-thumb:hover { background: #e2c07d; }

			/* Search Bar Container */
			.search-container { position: sticky; top: -20px; background: #0a0805; padding: 10px 0; z-index: 10; margin-bottom: 15px; border-bottom: 1px solid #4a3b2a; }
			.search-wrapper { position: relative; display: flex; align-items: center; }
			#marker-search {
				width: 100%; background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d;
				padding: 8px 35px 8px 10px; font-family: "Crimson Text", serif; font-size: 14px;
				outline: none; text-transform: uppercase;
			}
			#marker-search:focus { border-color: #e2c07d; }
			.clear-search {
				position: absolute; right: 10px; cursor: pointer; color: #8a7a5f;
				font-weight: bold; font-size: 14px; display: none;
			}
			.clear-search:hover { color: #ff4444; }

			.section-title { font-size: 16px; font-weight: bold; border-bottom: 1px solid #4a3b2a; margin: 15px 0 10px; padding-bottom: 5px; letter-spacing: 1px; }

			/* Category Styling */
			.category-header { font-size: 14px; font-weight: bold; cursor: pointer; padding: 8px 0; display: flex; align-items: center; border-bottom: 1px solid rgba(74, 59, 42, 0.3); letter-spacing: 1px; }
			.category-header::before { content: '▶'; font-size: 10px; margin-right: 8px; transition: transform 0.3s; }
			.category-header.open::before { transform: rotate(90deg); }
			.category-items { padding-left: 10px; display: none; margin-top: 5px; }
			.category-items.open { display: block; }

			/* Toggle Switches */
			.filter-option { display: flex; justify-content: flex-start; align-items: center; padding: 6px 0; font-size: 12px; letter-spacing: 1px; cursor: pointer; }
			.filter-option input { display: none; }
			.toggle-btn {
				width: 30px; height: 16px; background: #1a1510; border: 1px solid #4a3b2a; 
				border-radius: 8px; position: relative; transition: 0.3s; margin-right: 10px; flex-shrink: 0;
			}
			.toggle-btn::after {
				content: ''; position: absolute; top: 1px; left: 1px; width: 12px; height: 12px; 
				background: #8a7a5f; border-radius: 50%; transition: 0.3s;
			}
			.filter-option input:checked + .toggle-btn { background: rgba(226, 192, 125, 0.15); border-color: #e2c07d; }
			.filter-option input:checked + .toggle-btn::after { transform: translateX(14px); background: #e2c07d; }
			
			.node-icon { width: 20px; height: 20px; margin-right: 10px; object-fit: contain; }
			.label-text { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
			
			.hidden-node { display: none !important; }
		</style>
	</head>

		<script>
			function toggleCategory(id) {
				const items = document.getElementById(id);
				const header = document.getElementById('head-' + id.split('-')[1]);
				
				items.classList.toggle('open');
				header.classList.toggle('open');

				// Save state
				let openCategories = JSON.parse(localStorage.getItem('gw2_marker_categories') || '[]');
				if (items.classList.contains('open')) {
					if (!openCategories.includes(id)) openCategories.push(id);
				} else {
					openCategories = openCategories.filter(cat => cat !== id);
				}
				localStorage.setItem('gw2_marker_categories', JSON.stringify(openCategories));
			}

			function handleSearch(val) {
				const query = val.toLowerCase();
				const clearBtn = document.getElementById('clear-btn');
				const options = document.querySelectorAll('.filter-option');
				const categories = document.querySelectorAll('.category-items');
				const headers = document.querySelectorAll('.category-header');

				clearBtn.style.display = query.length > 0 ? 'block' : 'none';

				if (query.length < 3) {
					// Restore normal view and previously open categories
					options.forEach(opt => opt.classList.remove('hidden-node'));
					categories.forEach(cat => cat.classList.remove('open'));
					headers.forEach(head => head.classList.remove('open'));
					restoreCategories();
					return;
				}

				// Search active: override memory and open matching categories
				options.forEach(opt => {
					const text = opt.querySelector('.label-text').innerText.toLowerCase();
					if (text.includes(query)) {
						opt.classList.remove('hidden-node');
						opt.parentElement.classList.add('open');
						const headId = 'head-' + opt.parentElement.id.split('-')[1];
						const headEl = document.getElementById(headId);
						if (headEl) headEl.classList.add('open');
					} else {
						opt.classList.add('hidden-node');
					}
				});
			}

			function clearSearch() {
				const input = document.getElementById('marker-search');
				input.value = '';
				handleSearch('');
				input.focus();
			}

			function saveAndToggle(name, isVisible) {
				let settings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');
				settings[name] = isVisible;
				localStorage.setItem('gw2_marker_settings', JSON.stringify(settings));
				window.parent.postMessage({ action: 'toggleMapLayer', name: name, isVisible: isVisible }, '*');
			}

			function restoreCategories() {
				let openCategories = JSON.parse(localStorage.getItem('gw2_marker_categories') || '[]');
				openCategories.forEach(id => {
					let el = document.getElementById(id);
					let head = document.getElementById('head-' + id.split('-')[1]);
					if (el && head) {
						el.classList.add('open');
						head.classList.add('open');
					}
				});
			}

			window.onload = () => {
				let settings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');
				
				// Loop through every checkbox
				document.querySelectorAll('.filter-option input[type="checkbox"]').forEach(el => {
					const key = el.id;
					
					// If the user has never set this marker, default to FALSE (hidden)
					if (settings[key] === undefined) {
						settings[key] = false; 
					}
					
					el.checked = settings[key];
					window.parent.postMessage({ action: 'toggleMapLayer', name: key, isVisible: settings[key] }, '*');
				});

				// Save the cleaned-up default states
				localStorage.setItem('gw2_marker_settings', JSON.stringify(settings));

				restoreCategories();
			};
		</script>
		<script>
    async function copyPSNAWaypoints() {
    window.parent.postMessage({ action: 'toast', msg: 'SYNCING WITH ROTATION TABLE...' }, "*");

    // DATA SOURCE: Verified 7-Day Fixed Location Table
    // Each index (0-6) represents the day of the week (Sunday-Saturday)
    const rotation = {
        1: ["[&BIcHAAA=]", "[&BEwDAAA=]", "[&BBEAAAA=]", "[&BA8CAAA=]", "[&BOcBAAA=]", "[&BO4CAAA=]"], // Monday
        2: ["[&BIcHAAA=]", "[&BEwDAAA=]", "[&BIMAAAA=]", "[&BF0GAAA=]", "[&BOcBAAA=]", "[&BNIEAAA=]"], // Tuesday
        3: ["[&BK8HAAA=]", "[&BEgAAAA=]", "[&BJIBAAA=]", "[&BEICAAA=]", "[&BBABAAA=]", "[&BLkCAAA=]"], // Wednesday
        4: ["[&BHoHAAA=]", "[&BDoBAAA=]", "[&BKYAAAA=]", "[&BGUCAAA=]", "[&BCECAAA=]", "[&BCIDAAA=]"], // Thursday
        5: ["[&BIcHAAA=]", "[&BGEBAAA=]", "[&BNUGAAA=]", "[&BFEGAAA=]", "[&BPEBAAA=]", "[&BBEDAAA=]"], // Friday
        6: ["[&BKsHAAA=]", "[&BF0AAAA=]", "[&BKcBAAA=]", "[&BEUCAAA=]", "[&BNoAAAA=]", "[&BKYBAAA=]"], // Saturday
        0: ["[&BK8HAAA=]", "[&BEIAAAA=]", "[&BKYBAAA=]", "[&BMEDAAA=]", "[&BIUCAAA=]", "[&BMIBAAA=]"]  // Sunday
    };

    try {
        const now = new Date();
        let utcDay = now.getUTCDay();
        let utcHours = now.getUTCHours();

        // Location Move Logic: Agents move at 08:00 UTC
        if (utcHours < 8) {
            utcDay = (utcDay === 0) ? 6 : utcDay - 1;
        }

        const todayCodes = rotation[utcDay];

        if (todayCodes) {
            // Join waypoints without spaces for easy pasting into GW2 chat
            const finalString = todayCodes.join("");
            await navigator.clipboard.writeText(finalString);
            window.parent.postMessage({ action: 'toast', msg: 'COPIED 6 WAYPOINTS' }, "*");
        } else {
            throw new Error("Invalid day mapping");
        }
    } catch (e) {
        console.error("PSNA Sync Error:", e);
        window.parent.postMessage({ action: 'toast', msg: 'ROTATION SYNC ERROR' }, "*");
    }
}

</script>
