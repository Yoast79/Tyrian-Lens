<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="https://gw2ps.local/Assets/core.css" />
		<style>
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; box-sizing: border-box; }
			body { margin: 0; background: transparent; padding: 20px; color: var(--text-primary, #e2c07d); font-family: "Crimson Text", serif; text-transform: uppercase; display: flex; flex-direction: column; height: 100vh; }
			.section-title { font-size: 16px; font-weight: bold; border-bottom: 1px solid var(--border-color, #4a3b2a); margin: 15px 0; padding-bottom: 5px; letter-spacing: 1px; color: var(--text-muted, #8a7a5f); }

			.filter-option { display: flex; justify-content: flex-start; align-items: center; padding: 10px 0; font-size: 13px; letter-spacing: 1px; cursor: pointer; color: var(--text-primary, #e2c07d); }
			.filter-option input { display: none; }
			.toggle-btn {
			width: 38px; height: 20px; background: var(--bg-button, #1a1510); border: 1px solid var(--border-color, #4a3b2a); border-radius: 10px; position: relative; transition: 0.3s; margin-right: 15px; flex-shrink: 0;
			}
			.toggle-btn::after {
			content: ''; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; background: var(--border-color, #8a7a5f); border-radius: 50%; transition: 0.3s;
			}
			.filter-option input:checked + .toggle-btn { background: rgba(226, 192, 125, 0.15); border-color: var(--text-primary, #e2c07d); }
			.filter-option input:checked + .toggle-btn::after { transform: translateX(18px); background: var(--text-primary, #e2c07d); }
			.label-text { flex-grow: 1; }

			.color-picker { display: flex; gap: 8px; padding: 0 0 15px 0; }
			.color-swatch { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border-color, #4a3b2a); cursor: pointer; transition: 0.2s; }
			.color-swatch:hover { border-color: var(--text-primary, #e2c07d); }
			.color-swatch.active { border-color: var(--text-primary, #e2c07d); box-shadow: 0 0 5px var(--text-primary, #e2c07d); transform: scale(1.2); }

			.panel-footer { margin-top: auto; padding-top: 15px; text-align: center; }
			.fancy-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-color, #4a3b2a), transparent); margin-bottom: 10px; }
			.footer-text { font-size: 11px; color: var(--text-muted, #8a7a5f); font-style: italic; text-transform: none; }
		</style>
	</head>
	<body>
		<div class="section-title">Map Icons</div>

		<label class="filter-option">
			<input type="checkbox" id="poi" checked="" onchange="saveAndToggle('poi', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Points of Interest</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="waypoint" checked="" onchange="saveAndToggle('waypoint', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Waypoints</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="vista" checked="" onchange="saveAndToggle('vista', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Vistas</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="heart" checked="" onchange="saveAndToggle('heart', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Renown Hearts</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="heropoint" checked="" onchange="saveAndToggle('heropoint', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Hero Points</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="mastery" checked="" onchange="saveAndToggle('mastery', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Mastery Insights</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="node_zone_portal" onchange="toggleLayer('node_zone_portal', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Zone Portals</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="farming_nodes" onchange="toggleLayer('farming_nodes', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Farming Markers</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="personal_markers" onchange="toggleLayer('personal_markers', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Personal Markers</span>
			</label>

		<div class="section-title">Labels</div>

		<label class="filter-option">
			<input type="checkbox" id="region" checked="" onchange="saveAndToggle('region', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Region Names</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="map_text" checked="" onchange="saveAndToggle('map_text', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Map Names</span>
			</label>

		<label class="filter-option">
			<input type="checkbox" id="sector" checked="" onchange="saveAndToggle('sector', this.checked)">
				<div class="toggle-btn"></div>
				<span class="label-text">Sector Names</span>
			</label>

		<div class="filter-option" style="padding-bottom: 5px;">
			<label style="display:flex; align-items:center; flex-grow:1; cursor:pointer; margin:0;">
				<input type="checkbox" id="map_borders" checked="" onchange="saveAndToggle('map_borders', this.checked)" style="display:none;">
					<div class="toggle-btn"></div>
					<span class="label-text">Sector Borders</span>
				</label>
			<div class="color-picker" id="border-color-picker" style="padding:0; margin:0;">
				<div class="color-swatch" data-color="#4a3b2a" style="background: #4a3b2a;" onclick="setBorderColor('#4a3b2a')"></div>
				<div class="color-swatch" data-color="#8a7a5f" style="background: #8a7a5f;" onclick="setBorderColor('#8a7a5f')"></div>
				<div class="color-swatch" data-color="#e2c07d" style="background: #e2c07d;" onclick="setBorderColor('#e2c07d')"></div>
				<div class="color-swatch" data-color="#00ffcc" style="background: #00ffcc;" onclick="setBorderColor('#00ffcc')"></div>
				<div class="color-swatch" data-color="#ff00ff" style="background: #ff00ff;" onclick="setBorderColor('#ff00ff')"></div>
			</div>
		</div>

		<div class="panel-footer">
			<div class="fancy-divider"></div>
			<div class="footer-text">Show or Hide Map Elements</div>
		</div>

		<script>
			// Define exactly which keys go into Map UI Settings vs Marker Settings
			const mapUIKeys = ['region', 'map_text', 'sector', 'map_borders', 'farming_nodes'];

			// Single unified function to handle all checkboxes
			function saveAndToggle(name, isVisible) {
			let storageKey = mapUIKeys.includes(name) ? 'gw2_map_settings' : 'gw2_marker_settings';
			let settings = JSON.parse(localStorage.getItem(storageKey) || '{}');

			settings[name] = isVisible;
			localStorage.setItem(storageKey, JSON.stringify(settings));

			window.parent.postMessage({ action: 'toggleMapLayer', name: name, isVisible: isVisible }, '*');
			}

			// Keep toggleLayer as a fallback redirect just in case your HTML still calls it
			function toggleLayer(name, isVisible) {
			saveAndToggle(name, isVisible);
			}

			function setBorderColor(color) {
			let settings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
			settings.borderColor = color;
			localStorage.setItem('gw2_map_settings', JSON.stringify(settings));
			window.parent.postMessage({ action: 'changeMapBorderColor', color: color }, '*');

			document.querySelectorAll('.color-swatch').forEach(s => {
			if (s.dataset.color === color) s.classList.add('active');
			else s.classList.remove('active');
			});
			}

			window.onload = () => {
			const mapSettings = JSON.parse(localStorage.getItem('gw2_map_settings') || '{}');
			const markerSettings = JSON.parse(localStorage.getItem('gw2_marker_settings') || '{}');

			document.querySelectorAll('input[type="checkbox"]').forEach(el => {
			const key = el.id;
			let isVisible;

			if (mapUIKeys.includes(key)) {
			// It's a Map UI Key
			isVisible = (mapSettings[key] !== undefined) ? mapSettings[key] : true; // Default ON
			} else {
			// It's a Marker Key
			if (markerSettings[key] !== undefined) {
			isVisible = markerSettings[key];
			} else {
			// Specific defaults for new marker keys
			isVisible = (key === 'node_zone_portal') ? false : true;
			}
			}

			// Apply state to UI and send to map
			el.checked = isVisible;
			window.parent.postMessage({ action: 'toggleMapLayer', name: key, isVisible: isVisible }, '*');
			});

			// Initialize Border Color Swatches
			const activeColor = mapSettings.borderColor || '#8a7a5f';
			document.querySelectorAll('.color-swatch').forEach(s => {
			if (s.dataset.color === activeColor) s.classList.add('active');
			});
            document.body.setAttribute('data-theme', localStorage.getItem('gw2_theme') || 'human');
			};

            window.addEventListener('message', (e) => {
                if (e.data.action === 'updateTheme') {
                    document.body.setAttribute('data-theme', e.data.theme);
                }
            });
		</script>
	</body>
</html>
