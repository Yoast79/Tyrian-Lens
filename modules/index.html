<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Tyrian Lens</title>
		<link rel="manifest" href="https://gw2ps.local/Data/manifest.json" />
        <link rel="stylesheet" href="https://gw2ps.local/Assets/core.css" />
		<link rel="stylesheet" href="https://gw2ps.local/Assets/core.css" />
		<link rel="stylesheet" href="https://gw2ps.local/Assets/core.css" />
		<style>
			::-webkit-scrollbar { width: 6px; }
			::-webkit-scrollbar-track { background: var(--bg-panel, #0a0805); }
			::-webkit-scrollbar-thumb { background: var(--border-color, #4a3b2a); border-radius: 3px; }
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
			body, html { height: 100%; width: 100%; background: #000; background: var(--bg-dark, #000); overflow: hidden; font-family: "Crimson Text", serif; color: var(--text-primary, #e2c07d); }

			#menu-container {
			position: fixed; top: 0; left: 0; right: 0; height: var(--menu-height, 45px); z-index: 1000;
			background: var(--bg-dark, #000); border-bottom: 1px solid var(--border-color, #4a3b2a);
			display: flex; align-items: center;
			transition: height 0.3s ease;
			}

			#system-controls {
			display: flex; height: 100%; align-items: center; padding-right: 5px; -webkit-app-region: no-drag; margin-left: auto;
			}
			.sys-btn {
			width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: var(--text-muted, #8a7a5f); font-size: 18px; transition: 0.2s; user-select: none;
			}
			.sys-btn:hover { color: var(--text-primary, #e2c07d); text-shadow: 0 0 8px var(--text-primary, #e2c07d); background: rgba(226, 192, 125, 0.05); }
			.sys-btn.close:hover { color: var(--danger-color, #ff4a4a); text-shadow: 0 0 8px var(--danger-color, #ff4a4a); background: rgba(255, 68, 68, 0.05); }

			#map-container { position: absolute; top: var(--menu-height, 45px); bottom: 0; left: 0; right: 0; z-index: 1; background: var(--bg-dark, #000); }
			iframe { width: 100%; height: 100%; border: none; }

			#side-panel { position: fixed; top: var(--menu-height, 45px); left: -700px; width: 320px; bottom: 0; background: var(--tracker-bg, rgba(10, 8, 5, 0.98)); border-right: 1px solid var(--border-color, #4a3b2a); z-index: 900; transition: left 0.3s ease, width 0.3s ease, top 0.3s ease; }
			#side-panel.open { left: 0; }
			#side-panel.wide { width: 580px; }
			#side-panel.ui-large { width: 400px; }
			#side-panel.wide.ui-large { width: 700px; }

			#side-panel-right { position: fixed; top: var(--menu-height, 45px); right: -700px; width: 320px; bottom: 0; background: var(--tracker-bg, rgba(10, 8, 5, 0.98)); border-left: 1px solid var(--border-color, #4a3b2a); z-index: 950; transition: right 0.3s ease, width 0.3s ease, top 0.3s ease; }
			#side-panel-right.open { right: 0; }
			#side-panel-right.wide { width: 580px; }
			#side-panel-right.ui-large { width: 400px; }
			#side-panel-right.wide.ui-large { width: 700px; }

			#side-panel-right.wiki-mode { right: -100vw; width: 100vw; }
			#side-panel-right.wiki-mode.open { right: 0; }
			#side-panel.open ~ #side-panel-right.wiki-mode { width: calc(100vw - 320px); }
			#side-panel.open.wide ~ #side-panel-right.wiki-mode { width: calc(100vw - 580px); }
			#side-panel.open.ui-large ~ #side-panel-right.wiki-mode { width: calc(100vw - 400px); }
			#side-panel.open.wide.ui-large ~ #side-panel-right.wiki-mode { width: calc(100vw - 700px); }

			#global-tooltip { position: fixed; display: none; background: rgba(15, 12, 10, 0.98); border: 1px solid var(--text-primary, #e2c07d); color: var(--text-primary, #e2c07d); padding: 12px; font-size: 13px; z-index: 100000; pointer-events: none; white-space: normal; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); line-height: 1.4; }
			#toast-message { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(10, 8, 5, 0.95); border: 1px solid var(--text-primary, #e2c07d); color: var(--text-primary, #e2c07d); padding: 10px 20px; font-size: 14px; z-index: 100001; pointer-events: none; white-space: nowrap; box-shadow: 0 0 15px rgba(0,0,0,0.9); text-transform: uppercase; letter-spacing: 1px; opacity: 0; transition: opacity 0.3s ease; display: none; }

			#notification-stack { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 100002; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 400px; }
			.event-toast { background: rgba(10, 8, 5, 0.98); border: 1px solid var(--text-primary, #e2c07d); color: var(--text-primary, #e2c07d); padding: 12px 25px; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(0,0,0,0.9); text-align: center; animation: fadeIn 0.3s ease; border-radius: 2px; }
			@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

			#right-overlay-container {
			position: fixed; top: 60px; right: 20px; width: 320px; z-index: 85;
			display: flex; flex-direction: column; gap: 15px;
			max-height: calc(100vh - 80px); overflow-y: auto; pointer-events: none;
			}
			#right-overlay-container > * { pointer-events: auto; }
			#right-overlay-container::-webkit-scrollbar { width: 6px; }
			#right-overlay-container::-webkit-scrollbar-track { background: var(--bg-panel, rgba(10,8,5,0.5)); }
			#right-overlay-container::-webkit-scrollbar-thumb { background: var(--border-color, #4a3b2a); border-radius: 3px; }

			#achievement-tracker { background: rgba(10, 8, 5, 0.95); border: 1px solid var(--border-color, #4a3b2a); color: var(--text-primary, #e2c07d); padding: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.8); flex-shrink: 0; }
			#timer-watchlist { background: rgba(10, 8, 5, 0.95); border: 1px solid var(--border-color, #4a3b2a); color: var(--text-primary, #e2c07d); padding: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.8); flex-shrink: 0; }
			#fishing-watchlist { background: rgba(10, 8, 5, 0.95); border: 1px solid var(--border-color, #4a3b2a); color: var(--text-primary, #e2c07d); padding: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.8); flex-shrink: 0; }

			.track-item { border-bottom: 3px solid var(--border-color, #2a2015); padding: 12px 0; }
			.track-item:last-child { border-bottom: none; }
			.track-title { font-size: 12px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary, #e2c07d); }
			.track-bar-bg { background: #111; border: 1px solid var(--border-color, #332a1e); height: 8px; width: 100%; position: relative; }
			.track-bar-fill { background: var(--text-primary, #e2c07d); height: 100%; transition: width 0.3s; }
			.track-step { font-size: 11px; color: var(--text-muted, #dcb36b); margin-top: 6px; font-style: italic; white-space: normal; word-wrap: break-word; line-height: 1.3; }

			#splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
			#splash-content { animation: splashFadeIn 0.8s ease forwards; display: flex; flex-direction: column; align-items: center; }
			@keyframes splashFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
			.splash-logo { width: 220px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(226, 192, 125, 0.2)); }
			.splash-text { color: var(--text-primary, #e2c07d); font-size: 26px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 10px rgba(226, 192, 125, 0.5); margin-bottom: 15px; }
            .splash-progress-wrap { width: 300px; height: 2px; background: rgba(226, 192, 125, 0.1); border-radius: 1px; overflow: hidden; margin-bottom: 10px; }
            #splash-progress-bar { width: 0%; height: 100%; background: var(--text-primary, #e2c07d); transition: width 0.3s ease; box-shadow: 0 0 8px var(--text-primary, #e2c07d); }
            #splash-status { font-size: 10px; color: var(--text-muted, #8a7a5f); letter-spacing: 2px; text-transform: uppercase; }
			#resize-handle { position: fixed; bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; z-index: 1000000; background: linear-gradient(135deg, transparent 50%, var(--text-primary, #e2c07d) 50%); border-left: 1px solid #1a1510; border-top: 1px solid #1a1510; }

			#map-switch-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 8, 5, 0.98); border: 1px solid var(--text-primary, #e2c07d); color: var(--text-primary, #e2c07d); padding: 20px 30px; z-index: 100005; text-align: center; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.9); font-family: "Crimson Text", serif; letter-spacing: 1px; }
			.popup-btn { background: var(--bg-button, #1a1510); border: 1px solid var(--border-color, #4a3b2a); color: var(--text-primary, #e2c07d); padding: 8px 20px; margin: 15px 10px 0; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-family: "Crimson Text", serif; font-size: 14px; font-weight: bold; }
			.popup-btn:hover { background: var(--bg-button-hover, #2a221a); border-color: var(--text-primary, #e2c07d); }

			.panel-loader {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: var(--tracker-bg, rgba(10, 8, 5, 0.98));
				z-index: 1000;
				display: none;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				opacity: 0;
				transition: opacity 0.2s ease-in-out;
				pointer-events: none;
			}
			.panel-loader.active {
				display: flex;
				opacity: 1;
				pointer-events: auto;
			}
			.panel-spinner {
				width: 40px;
				height: 40px;
				border: 2px solid rgba(226, 192, 125, 0.1);
				border-top: 2px solid var(--text-primary, #e2c07d);
				border-radius: 50%;
				animation: spin 1s linear infinite;
				box-shadow: 0 0 10px rgba(226, 192, 125, 0.1);
				margin-bottom: 15px;
			}
			.panel-loading-text {
				font-size: 11px;
				color: var(--text-muted, #8a7a5f);
				letter-spacing: 2px;
				text-transform: uppercase;
				font-family: "Crimson Text", serif;
				animation: pulse 1.5s ease-in-out infinite;
			}
			@keyframes spin {
				0% { transform: rotate(0deg); }
				100% { transform: rotate(360deg); }
			}
			@keyframes pulse {
				0%, 100% { opacity: 0.6; }
				50% { opacity: 1; }
			}
		</style>
	</head>
	<body>
		<div id="menu-container" onmousedown="if(event.target === this) window.postToHost('drag')">
			<iframe id="menu-frame" src="menu.html?v=v1.3.2" style="flex-grow: 1; border: none; height: 100%; background: transparent;"></iframe>
			<div id="system-controls">
				<div class="sys-btn" onclick="postToHost('minimize')">&#8212;</div>
				<div class="sys-btn" onclick="postToHost('fullscreen')">&#9633;</div>
				<div class="sys-btn close" onclick="postToHost('close')">&#10006;</div>
			</div>
		</div>

		<div id="splash-screen">
			<div id="splash-content">
				<img src="https://gw2ps.local/Assets/Icons/Tyrian_Lens_transparent.png" class="splash-logo" alt="Tyrian Lens" />
				<div class="splash-text">Tyrian Lens</div>
                <div class="splash-progress-wrap">
                    <div id="splash-progress-bar"></div>
                </div>
                <div id="splash-status">Connecting to Tyria...</div>
			</div>
		</div>

		<div id="global-tooltip"></div>
		<div id="toast-message"></div>
		<div id="notification-stack"></div>

		<div id="map-switch-popup">
			<div id="map-switch-text" style="margin-bottom: 5px; font-size: 16px;"></div>
			<button class="popup-btn" onclick="confirmMapSwitch()">Yes</button>
			<button class="popup-btn" onclick="cancelMapSwitch()">No</button>
		</div>

		<div id="right-overlay-container">
			<div id="achievement-tracker">
				<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #4a3b2a; padding-bottom:5px; margin-bottom:5px;">
					<span style="font-size:11px; font-weight:bold; letter-spacing:1px;">ACHIEVEMENT WATCHLIST</span>
					<span style="cursor:pointer; color:#8a7a5f; font-size:14px;" onclick="toggleTrackerOverlay(false)">&#10006;</span>
				</div>
				<div id="tracker-list"></div>
			</div>

			<div id="timer-watchlist">
				<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #4a3b2a; padding-bottom:5px; margin-bottom:5px;">
					<span style="font-size:11px; font-weight:bold; letter-spacing:1px;">EVENT TIMERS</span>
					<span style="cursor:pointer; color:#8a7a5f; font-size:14px;" onclick="closeTimerWatchlist()">&#10006;</span>
				</div>
				<div id="timer-wvl-content"></div>
			</div>

			<div id="fishing-watchlist">
				<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #4a3b2a; padding-bottom:5px; margin-bottom:5px;">
					<span style="font-size:11px; font-weight:bold; letter-spacing:1px;">FISHING WATCHLIST</span>
					<span style="cursor:pointer; color:#8a7a5f; font-size:14px;" onclick="document.getElementById('fishing-watchlist').style.display='none'; localStorage.setItem('gw2_fishing_tracker_visible', 'false'); window.postToFrames({action:'fishingWatchlistClosed'});">&#10006;</span>
				</div>
				<div id="fishing-wvl-content" style="display: flex; flex-direction: column; gap: 10px;"></div>
			</div>
		</div>

		<div id="side-panel">
			<div id="panel-loading" class="panel-loader">
				<div class="panel-spinner"></div>
				<div class="panel-loading-text">Loading Module...</div>
			</div>
			<iframe id="panel-frame" onload="window.hideLoader('panel-loading')"></iframe>
			<iframe id="farming-frame" src="farming.html?v=v1.3.2" style="display:none; width:100%; height:100%; border:none;"></iframe>
			<iframe id="timers-frame" src="timers.html?v=v1.3.2" style="display:none; width:100%; height:100%; border:none;"></iframe>
			<iframe id="fishing-frame" src="fishing.html?v=v1.3.2" style="display:none; width:100%; height:100%; border:none;"></iframe>
		</div>
		<div id="side-panel-right">
			<div id="wiki-close-btn" style="display:none; position:absolute; top:15px; left:15px; width:35px; height:35px; background:rgba(26,21,16,0.9); border:1px solid #4a3b2a; color:#e2c07d; align-items:center; justify-content:center; cursor:pointer; font-size:18px; z-index:100; transition:0.2s; border-radius:3px;" onclick="closeWiki()" onmouseover="this.style.color='#ff4444'; this.style.borderColor='#ff4444';" onmouseout="this.style.color='#e2c07d'; this.style.borderColor='#4a3b2a';">&#10006;</div>
			<div id="panel-loading-right" class="panel-loader">
				<div class="panel-spinner"></div>
				<div class="panel-loading-text">Loading...</div>
			</div>
			<iframe id="panel-frame-right" onload="window.hideLoader('panel-loading-right')"></iframe>
		</div>


		<div id="map-container">
			<iframe src="map.html?v=v1.3.2" id="map-frame"></iframe>
		</div>

		<div id="resize-handle" onmousedown="window.postToHost('resize')"></div>

		<script>
			/*<![CDATA[*/
			const APP_VERSION = "1.3.5";
			window.APP_VERSION = APP_VERSION;
			window.activeMap = 'map';
			window.showLoader = function(loaderId) {
				const el = document.getElementById(loaderId);
				if (el) el.classList.add('active');
			};
			window.hideLoader = function(loaderId) {
				const el = document.getElementById(loaderId);
				if (el) el.classList.remove('active');
			};
			window.pendingMapSwitch = null;
			window.manualSwitchActive = false;
			window.lastPlayerCoords = {x: 0, y: 0};
			window.currentPlayerZone = 'map';
			window.isFirstLocationUpdate = true;

			window.postToHost = function(action) {
				if (window.chrome && window.chrome.webview) {
					window.chrome.webview.postMessage(action);
				}
			};

			window.postToFrames = function(msg) {
				const frames = ['map-frame', 'menu-frame', 'panel-frame', 'farming-frame', 'timers-frame', 'fishing-frame', 'panel-frame-right'];
				frames.forEach(id => {
					const f = document.getElementById(id);
					if (f && f.contentWindow) {
						try { f.contentWindow.postMessage(msg, '*'); } catch(e) {}
					}
				});
			};

			window.addEventListener('DOMContentLoaded', async () => {
                const splash = document.getElementById('splash-screen');
                const updateSplash = (pct, status) => {
                    const bar = document.getElementById('splash-progress-bar');
                    const stat = document.getElementById('splash-status');
                    if (bar) bar.style.width = pct + '%';
                    if (stat) stat.innerText = status;
                };

                try {
                    updateSplash(10, 'IDENTIFYING ACCOUNT...');
                    // Safety timeout of 10 seconds for initial sync
                    const syncTask = syncAccountData((pct, msg) => updateSplash(pct, msg));
                    const timeoutTask = new Promise(res => setTimeout(() => res('timeout'), 10000));
                    
                    const result = await Promise.race([syncTask, timeoutTask]);
                    if (result === 'timeout') console.warn("Sync timed out, proceeding to app...");
                } catch (e) {
                    console.error("Startup sync failed:", e);
                } finally {
                    updateSplash(100, 'READY');
                    setTimeout(() => {
                        if (splash) {
                            splash.style.opacity = '0';
                            setTimeout(() => splash.style.display = 'none', 800);
                        }
                    }, 500);
                }
				
				const settings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');
				if (settings.uiScaleLarge) {
                    document.body.classList.add('ui-large');
					document.getElementById('side-panel').classList.add('ui-large');
					document.getElementById('side-panel-right').classList.add('ui-large');
					document.getElementById('menu-container').classList.add('ui-large');
					const menuFrame = document.getElementById('menu-frame');
					if(menuFrame) menuFrame.addEventListener('load', () => menuFrame.contentWindow.postMessage({action:'uiScaleChanged', value:'large'}, '*'));
				}

                const savedDRFToken = localStorage.getItem('gw2_drf_token');
                if (savedDRFToken) {
                    setTimeout(() => {
                        window.postToHost(JSON.stringify({action: 'updateDRFToken', token: savedDRFToken}));
                    }, 1500); 
                }

				// --- START UPDATE CHECKER ---
				const REPO = "Yoast79/Tyrian-Lens";

				async function checkReleaseUpdate() {
					try {
						const response = await fetch(`https://api.github.com/repos/${REPO}/releases`);
						if (!response.ok) return;
						
						const data = await response.json();
						if (!data || data.length === 0) return;
						
						const latestRelease = data[0];
						const latestTag = latestRelease.tag_name;

						if (latestTag !== APP_VERSION) {
							localStorage.setItem('gw2_update_url', latestRelease.html_url);
							window.postToFrames({ action: 'updateAvailable' });
							
							const menu = document.getElementById('menu-frame');
							if (menu && menu.contentWindow) menu.contentWindow.postMessage({ action: 'updateAvailable' }, '*');

							setTimeout(() => {
								window.showToast(`UPDATE AVAILABLE: v${latestTag}`);
								const toast = document.getElementById("toast-message");
								if (toast) {
									toast.style.cursor = "pointer";
									toast.style.border = "1px solid #1A9306";
									toast.onclick = () => window.open(latestRelease.html_url, '_blank');
								}
							}, 3500);
						} else {
							localStorage.removeItem('gw2_update_url');
						}
					} catch (e) {
						console.log("Update check skipped: GitHub API unreachable or rate-limited.");
					}
				}

				checkReleaseUpdate();
				// --- END UPDATE CHECKER ---
			});

			if (window.chrome && window.chrome.webview) {
				window.chrome.webview.addEventListener('message', function(event) {
                    const data = event.data;

					if (typeof data === 'string' && data.startsWith('openWiki:')) {
						const url = data.substring(9);
						const rightPanel = document.getElementById('side-panel-right');
						const rightFrame = document.getElementById('panel-frame-right');
						
						window.showLoader('panel-loading-right');
						rightFrame.src = url;
						rightPanel.classList.add('wiki-mode', 'open');
						document.getElementById('wiki-close-btn').style.display = 'flex';
					} 
					else if (data && typeof data === 'object') {
						let items = null;
						let curr = null;
						
						if (data.payload && data.payload.drop && (data.payload.drop.items || data.payload.drop.curr)) {
                            items = data.payload.drop.items;
                            curr = data.payload.drop.curr;
                        } else if (data.payload && (data.payload.items || data.payload.curr)) {
							items = data.payload.items;
							curr = data.payload.curr;
						} else if (data.payload && data.payload.data && (data.payload.data.items || data.payload.data.curr)) {
							items = data.payload.data.items;
							curr = data.payload.data.curr;
						} else if (data.data && (data.data.items || data.data.curr)) {
							items = data.data.items;
							curr = data.data.curr;
						}

						if (items || curr) {
							window.postToFrames({ 
								action: 'drfData', 
								items: items || {},
								currencies: curr || {}
							});
						}
					}
				});
			}

			window.closeWiki = function() {
				const rightPanel = document.getElementById('side-panel-right');
				rightPanel.classList.remove('open', 'wiki-mode');
				document.getElementById('wiki-close-btn').style.display = 'none';
			};

            window.closeTimerWatchlist = function() {
                document.getElementById('timer-watchlist').style.display='none'; 
                localStorage.setItem('gw2_timer_persistent_visible', 'false');
                const timersFrame = document.getElementById('timers-frame');
                if (timersFrame && timersFrame.contentWindow) {
                    try { timersFrame.contentWindow.document.getElementById('timer-persistent-toggle').checked = false; } catch(e) {}
                }

			async function pollTrackerProgress() {
				const keys = Object.keys(trackedAchievements);
				if (keys.length === 0) { toggleTrackerOverlay(false); return; }
				if (!isTrackerVisible) return;
				const key = localStorage.getItem('gw2_active_key');
				if (!key) return;
				try {
					const res = await fetch("https://api.guildwars2.com/v2/account/achievements?access_token=" + key);
					if (!res.ok) return;
					const accountProg = await res.json();
					const container = document.getElementById('tracker-list');
					let html = '';
					Object.values(trackedAchievements).slice(0, 5).forEach(ach => {
						const prog = accountProg.find(p => p.id === parseInt(ach.id)) || { current: 0, done: false, bits: [] };
						const max = ach.max || 1;
						const percent = prog.done ? 100 : Math.min(100, (prog.current / max) * 100);
						let nextStepText = "";
						if (!prog.done && ach.bits && ach.bits.length > 0) {
							const progBits = prog.bits || [];
							for (let i=0; i<ach.bits.length; i++) { if (!progBits.includes(i)) { nextStepText = "NEXT STEP:<br>" + (ach.bits[i].text || 'Item ' + (i+1)); break; } }
						}
						html += "<div class='track-item'><div class='track-title'>" + ach.n + " <span style='float:right; font-weight:normal; color:#8a7a5f; font-size:10px;'>" + prog.current + "/" + max + "</span></div><div class='track-bar-bg'><div class='track-bar-fill' style='width:" + percent + "%;'></div></div>" + (nextStepText ? "<div class='track-step'>" + nextStepText + "</div>" : "") + "</div>";
					});
					container.innerHTML = html;
				} catch(e) {}
			}

                        { name: 'Bank', url: 'account/bank', cache: 'gw2_cache_bank', pct: 40 },
                        { name: 'Materials', url: 'account/materials', cache: 'gw2_cache_materials', pct: 60 },
                        { name: 'Achievements', url: 'account/achievements', cache: 'gw2_cache_achievements', pct: 75 },
                        { name: 'Legendary Armory', url: 'account/legendaryarmory', cache: 'gw2_cache_legendary', pct: 85 }
                    ];

                    for (const step of steps) {
                        if (typeof progressCallback === 'function') progressCallback(step.pct, `SYNCING ${step.name.toUpperCase()}...`);
                        const res = await fetch(`https://api.guildwars2.com/v2/${step.url}?access_token=${activeKey}`);
                        if (res.ok) {
                            const data = await res.json();
                            localStorage.setItem(step.cache, JSON.stringify(data));
                        }
                    }

                    // Special case for characters and shared inventory
                    if (typeof progressCallback === 'function') progressCallback(90, 'SYNCING INVENTORY...');
                    const charRes = await fetch(`https://api.guildwars2.com/v2/characters?page=0&page_size=200&access_token=${activeKey}`);
                    if (charRes.ok) {
                        const characters = await charRes.json();
                        localStorage.setItem('gw2_cache_inventory', JSON.stringify(characters));
                        
                        const sharedRes = await fetch(`https://api.guildwars2.com/v2/account/inventory?access_token=${activeKey}`);
                        if (sharedRes.ok) {
                            const shared = await sharedRes.json();
                            localStorage.setItem('gw2_cache_shared_inventory', JSON.stringify(shared));
                        }
                    }

                    localStorage.setItem('gw2_last_sync', Date.now());
                    window.postToFrames({ action: 'accountDataRefreshed' });
                    console.log("Account Data Synced Successfully");
                } catch (e) { console.error("Sync failed", e); }
            }

			if (isTrackerVisible) window.toggleTrackerOverlay(true);
			setInterval(pollTrackerProgress, 30000);
			setInterval(checkDeliveries, 60000);
            setInterval(() => syncAccountData(), 300000); // Sync every 5 minutes
			setTimeout(checkDeliveries, 1500);
            setTimeout(() => syncAccountData(), 2000); // Initial sync after load
			document.addEventListener('contextmenu', e => e.preventDefault());
			/*]]>*/
		</script>
	</body>
</html>
