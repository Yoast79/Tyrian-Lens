<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="data:,">
			<style>
				* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; box-sizing: border-box; }
				body { margin: 0; background: transparent; padding: 20px; width: 580px; color: var(--text-primary, #e2c07d); font-family: "Crimson Text", serif; text-transform: uppercase; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
				.section-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; color: var(--text-muted, #8a7a5f); }

				.search-container { position: relative; width: 100%; margin-bottom: 10px; flex-shrink: 0; display: flex; align-items: center; }
				.search-box { background: var(--bg-panel, rgba(20,15,10,0.8)); border: 1px solid var(--border-color, #4a3b2a); color: #fff; padding: 8px 30px 8px 10px; font-size: 12px; outline: none; width: 100%; font-family: "Crimson Text", serif; text-transform: uppercase; }
				.search-box:focus { border-color: var(--text-primary, #e2c07d); }
				.clear-btn { position: absolute; right: 10px; color: var(--text-muted, #888); cursor: pointer; font-size: 14px; display: none; font-family: sans-serif; font-weight: bold; }
				.clear-btn:hover { color: var(--text-primary, #e2c07d); }

				.tab-container { display: flex; gap: 2px; margin-bottom: 15px; }
				.tab-btn { flex: 1; padding: 6px; background: rgba(74, 59, 42, 0.3); border: 1px solid var(--border-color, #4a3b2a); color: var(--text-muted, #888); text-align: center; cursor: pointer; font-size: 11px; transition: 0.2s; }
				.tab-btn:hover { background: rgba(226, 192, 125, 0.1); color: #fff; }
				.tab-btn.active { background: var(--bg-button-hover, #4a3b2a); color: var(--text-primary, #e2c07d); border-color: var(--text-primary, #e2c07d); }
				#wardrobe-container::-webkit-scrollbar { width: 4px; }
				#wardrobe-container::-webkit-scrollbar-thumb { background: var(--border-color, #4a3b2a); border-radius: 2px; }
				#wardrobe-container { flex: 1; overflow-y: auto; padding-right: 12px; position: relative; }
				.main-cat { margin-bottom: 8px; border: 1px solid var(--border-color, #4a3b2a); background: var(--bg-panel, rgba(26, 21, 16, 0.9)); }
				.sub-cat { margin: 4px 6px 4px 10px; border: 1px solid var(--border-color, #332a1e); background: rgba(0,0,0,0.2); }
				.weight-cat { margin: 2px 4px 4px 12px; border: 1px solid var(--border-color, #2a2015); background: rgba(0,0,0,0.3); }
				.header { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
				.header:hover { background: rgba(226, 192, 125, 0.05); }
				.title { font-size: 12px; letter-spacing: 1px; color: var(--text-primary, #e2c07d); font-weight: bold; }
				.sub-title { font-size: 11px; color: var(--text-primary, #e2c07d); font-weight: normal; }
				.weight-title { font-size: 10px; color: var(--text-primary, #e2c07d); font-weight: normal; }
				.arrow { font-size: 8px; transition: transform 0.2s; color: var(--border-color, #4a3b2a); }
				.collapsed .arrow { transform: rotate(-90deg); }
				.collapsed .content { display: none; }
				.grid { display: grid; grid-template-columns: repeat(10, 42px); gap: 4px; padding: 10px; justify-content: center; width: 100%; }
				.item-slot { width: 42px; height: 42px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color, #332a1e); position: relative; cursor: pointer; }
				.item-icon { width: 100%; height: 100%; object-fit: contain; }
				.count-badge { position: absolute; top: 1px; right: 2px; font-size: 10px; color: #fff; text-shadow: 1px 1px 1px #000; font-family: sans-serif; font-weight: bold; pointer-events: none; }
				.loading-text { text-align: center; font-size: 10px; color: var(--text-primary, #e2c07d); padding: 15px; }

				/* Large UI Scaling Overrides */
				body.ui-large { width: 700px; }
				body.ui-large .search-box { font-size: 14px; padding: 10px 30px 10px 12px; }
				body.ui-large .grid { grid-template-columns: repeat(10, 50px); gap: 6px; }
				body.ui-large .item-slot { width: 50px; height: 50px; }
				body.ui-large .count-badge { font-size: 12px; }
				body.ui-large .section-title { font-size: 16px; }
				body.ui-large .tab-btn { font-size: 13px; padding: 8px; }
				body.ui-large .title { font-size: 14px; }
				body.ui-large .sub-title { font-size: 13px; }
				body.ui-large .weight-title { font-size: 12px; }
				body.ui-large .loading-text { font-size: 12px; }
				body.ui-large .dye-square { width: 100% !important; height: 100% !important; }
				body.ui-large .custom-scroll-container div { font-size: 14px !important; padding: 5px 10px !important; }
			</style>
		</head>
	<body>
		<div class="section-title">Wardrobe</div>
		<div class="search-container">
			<input type="text" class="search-box" id="wardrobe-search" placeholder="SEARCH WARDROBE..." autocomplete="off" oninput="triggerSearch()">
				<span class="clear-btn" id="clear-search-btn" onclick="clearSearch()">✕</span>
			</div>
		<div class="tab-container">
			<div class="tab-btn active" id="btn-unlocked">Unlocked</div>
			<div class="tab-btn" id="btn-locked">Locked</div>
		</div>
		<div id="wardrobe-container"></div>

		<script>
			var armorHierarchy = {};
			var indexes = { gear: null, appearance: null, home: null, dyes: null };
			var accountData = {};

			const settings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');
			if (settings.uiScaleLarge) document.body.classList.add('ui-large');

			window.addEventListener('message', (e) => {
				if (e.data.action === 'uiScaleChanged') {
					if (e.data.value === 'large') document.body.classList.add('ui-large');
					else document.body.classList.remove('ui-large');
				}

				if (e.data.action === 'updateTheme') {
					document.body.setAttribute('data-theme', e.data.theme);
				}

				// Explicitly clear memory structures before the sub-modules trigger their reload logic
				if (e.data.action === 'switchAccount') {
					indexes = { gear: null, appearance: null, home: null, dyes: null };
					accountData = {};
					document.getElementById('wardrobe-container').innerHTML = '';
				}
			});

			document.body.setAttribute('data-theme', localStorage.getItem('gw2_theme') || 'human');

			let searchDebounce = null;
			window.isSearching = false;

			function clearSearch() {
			const input = document.getElementById('wardrobe-search');
			input.value = '';
			input.focus();
			window.triggerSearch();
			}

			window.triggerSearch = function() {
			clearTimeout(searchDebounce);
			const input = document.getElementById('wardrobe-search');
			if(!input) return;
			const q = input.value.toLowerCase().trim();
			const clearBtn = document.getElementById('clear-search-btn');

			if(clearBtn) clearBtn.style.display = q.length > 0 ? 'block' : 'none';

			// If search is cleared or less than 3 chars, reset UI to saved state
			if (q.length < 3) {
					if (window.isSearching) {
						window.isSearching = false;
						if (window.rebuildMenu) window.rebuildMenu();
					}
					return;
				}

				window.isSearching = true;

				// If 3+ chars, force everything open first so items render
				if (window.expandAllForSearch) {
					window.expandAllForSearch();
				}

				// Wait a moment for the content to render, then filter
				searchDebounce = setTimeout(() => {
					filterWardrobe(q);
				}, 400); 
			};

			function filterWardrobe(q) {
				const slots = document.querySelectorAll('.item-slot');
				
				slots.forEach(slot => {
					let name = slot.getAttribute('data-name') || '';
					if (name.includes(q)) {
						slot.style.display = '';
					} else {
						slot.style.display = 'none';
					}
				});

				// Hide empty categories so the UI stays clean
				document.querySelectorAll('.weight-cat, .sub-cat, .main-cat').forEach(cat => {
					let visible = Array.from(cat.querySelectorAll('.item-slot')).some(s => s.style.display !== 'none');
					cat.style.display = visible ? '' : 'none';
				});
			}
		</script>

		<script src="armor.js"></script>
		<script src="weapons.js"></script>
		<script src="armory.js"></script>
		<script src="appearance.js"></script>
		<script src="collectibles.js"></script>
		<script src="home.js"></script>
		<script src="dyes.js"></script>
		<script src="core.js"></script>
	</body>
</html>
