<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="https://gw2ps.local/Assets/core.css" />
		<style>
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; margin: 0; padding: 0; box-sizing: border-box; }
			body { background: transparent; color: var(--text-primary); font-family: "Crimson Text", serif; padding: 25px; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; text-transform: uppercase; }
			.section-title { font-size: 16px; letter-spacing: 2px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin: 20px 0 10px 0; color: var(--text-muted); }
			.section-title:first-child { margin-top: 0; }
			.btn { width: 100%; background: var(--bg-button); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px; text-transform: uppercase; font-size: 11px; transition: 0.2s; cursor: pointer; margin-bottom: 8px; font-family: inherit; }
			.btn:hover { background: var(--bg-button-hover); color: var(--text-button-hover); border-color: var(--border-highlight); }
			.setting-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: relative; }
			.label { font-size: 13px; color: var(--text-primary); letter-spacing: 1px; }
			select { background: var(--bg-dark); color: var(--text-primary); border: 1px solid var(--border-color); padding: 5px; font-family: inherit; text-transform: uppercase; }

			/* Toggle Switch Styling */
			.toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
			.toggle-switch input { opacity: 0; width: 0; height: 0; }
			.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-button); border: 1px solid var(--border-color); transition: .4s; border-radius: 20px; }
			.slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .4s; border-radius: 50%; }
			input:checked + .slider { background-color: var(--border-color); border-color: var(--border-highlight); }
			input:checked + .slider:before { transform: translateX(20px); background-color: var(--border-highlight); }

			/* Range Slider Styling */
			input[type="range"] { -webkit-appearance: none; background: transparent; outline: none; }
			input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: var(--bg-button); border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer; }
			input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--text-muted); margin-top: -5px; cursor: pointer; transition: 0.2s; }
			input[type="range"]::-webkit-slider-thumb:hover { background: var(--border-highlight); }

			/* Custom Real-time Tooltip Bubble */
			.range-container { position: relative; width: 150px; display: flex; align-items: center; }
			.bubble { position: absolute; background: var(--bg-panel); color: var(--text-primary); border: 1px solid var(--border-color); padding: 2px 6px; border-radius: 3px; font-size: 10px; top: -25px; transform: translateX(-50%); pointer-events: none; white-space: nowrap; opacity: 0; transition: opacity 0.2s; z-index: 10; }
			input[type="range"]:active + .bubble { opacity: 1; }

			.btn.dimmed { opacity: 0.3; pointer-events: none; border-color: var(--border-color); color: var(--text-muted); }
			.btn.lit-up { opacity: 1; pointer-events: auto; border-color: var(--success-color); color: var(--success-color); text-shadow: 0 0 5px rgba(74, 226, 91, 0.5); box-shadow: 0 0 10px rgba(74, 226, 91, 0.2); }

			/* Custom Modal Styles */
			#confirm-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
			.modal-content { background: var(--bg-panel); border: 1px solid var(--border-highlight); padding: 25px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.9); max-width: 300px; }
			.modal-text { font-size: 16px; margin-bottom: 20px; color: var(--text-primary); letter-spacing: 1px; line-height: 1.4; }
			.modal-btns { display: flex; gap: 10px; }
			.modal-btns button { flex: 1; padding: 10px; cursor: pointer; font-family: inherit; text-transform: uppercase; font-weight: bold; border: 1px solid var(--border-color); background: var(--bg-button); color: var(--text-primary); transition: 0.2s; }
			.modal-btns button:hover { border-color: var(--border-highlight); background: var(--bg-button-hover); color: var(--text-button-hover); }
			.modal-btns .btn-danger:hover { border-color: var(--danger-color); color: var(--danger-color); }

			/* Update Button Styling */
			@keyframes pulseGold {
			0% { box-shadow: 0 0 5px rgba(226, 192, 125, 0.1); border-color: #4a3b2a; color: #e2c07d; }
			50% { box-shadow: 0 0 15px rgba(226, 192, 125, 0.7); border-color: #e2c07d; color: #fff; }
			100% { box-shadow: 0 0 5px rgba(226, 192, 125, 0.1); border-color: #4a3b2a; color: #e2c07d; }
			}
			#update-btn { display: none; animation: pulseGold 2s infinite; }
		</style>
	</head>
	<body>
		<div class="section-title">Window & Display</div>

		<div class="setting-control">
			<span class="label">Theme</span>
			<select id="pref-theme" style="width: 150px;" onchange="updateTheme(this.value)">
				<option value="human">Human (Default)</option>
				<option value="sylvari">Sylvari</option>
				<option value="asura">Asura</option>
				<option value="charr">Charr</option>
				<option value="norn">Norn</option>
			</select>
		</div>

		<div class="setting-control">
			<span class="label">Always on Top</span>
			<label class="toggle-switch">
				<input type="checkbox" id="pref-ontop" onchange="updateSetting('onTop', this.checked)" />
				<span class="slider"></span>
			</label>
		</div>

		<div class="setting-control">
			<span class="label">Large UI Scale</span>
			<label class="toggle-switch">
				<input type="checkbox" id="pref-scale" onchange="updateSetting('uiScaleLarge', this.checked)" />
				<span class="slider"></span>
			</label>
		</div>

		<div class="setting-control">
			<span class="label">Integrated Wiki View</span>
			<label class="toggle-switch">
				<input type="checkbox" id="pref-wiki" onchange="updateSetting('wikiIntegrated', this.checked)" />
				<span class="slider"></span>
			</label>
		</div>

		<div class="setting-control">
			<span class="label">System Tray Notifications</span>
			<label class="toggle-switch">
				<input type="checkbox" id="pref-systray" onchange="localStorage.setItem('gw2_systray_notifications', this.checked)" />
				<span class="slider"></span>
			</label>
		</div>

		<div class="section-title">Time Zone</div>
		<div class="setting-control">
			<select id="pref-tz" style="width: 100%;" onchange="updateTimezone(this.value)">
				<option value="local">Local Time</option>
				<option value="UTC">UTC</option>
				<option value="America/Los_Angeles">Pacific Time (US)</option>
				<option value="America/New_York">Eastern Time (US)</option>
				<option value="Europe/London">London (UK)</option>
				<option value="Europe/Berlin">Central Europe</option>
				<option value="Australia/Sydney">Sydney (AU)</option>
			</select>
		</div>

		<div class="section-title">Preferred Character</div>
		<div class="setting-control">
			<select id="pref-char" style="width: 100%;" onchange="updateSetting('defaultChar', this.value)">
				<option value="">No Preference</option>
			</select>
		</div>

		<div class="section-title">Audio & Markers</div>
		<div class="setting-control">
			<span class="label">Master Volume</span>
			<div class="range-container">
				<input type="range" id="pref-vol" min="0" max="100" style="width: 100%;" oninput="updateLabel('vol', this.value)" onchange="updateSetting('masterVolume', this.value)" />
				<output id="bubble-vol" class="bubble"></output>
			</div>
		</div>
		<div class="setting-control">
			<span class="label">Location Markers Scale</span>
			<div class="range-container">
				<input type="range" id="pref-mscale" min="50" max="200" style="width: 100%;" oninput="updateLabel('mscale', this.value); checkScaleChange()" onchange="updateSetting('markerScale', this.value)" />
				<output id="bubble-mscale" class="bubble"></output>
			</div>
		</div>
		<div class="setting-control">
			<span class="label">Farming Markers Scale</span>
			<div class="range-container">
				<input type="range" id="pref-fscale" min="50" max="200" style="width: 100%;" oninput="updateLabel('fscale', this.value); checkScaleChange()" onchange="updateSetting('farmingMarkerScale', this.value)" />
				<output id="bubble-fscale" class="bubble"></output>
			</div>
		</div>
		<button id="reload-map-btn" class="btn dimmed" onclick="triggerMapReload()">Reload Map</button>

		<div class="section-title">Data Management</div>
		<button id="update-btn" class="btn" onclick="openUpdateUrl()">Update Available</button>
        <button class="btn" onclick="exportLog()">Export Log</button>
		<button class="btn" style="color: #ff4a4a; border-color: #ff4a4a;" onclick="showConfirmModal()">Clear Application Data</button>

		<div id="confirm-modal">
			<div class="modal-content">
				<div class="modal-text">DANGER: THIS WILL RESET ALL SETTINGS, API KEYS, AND SAVED TRACKERS. CONTINUE?</div>
				<div class="modal-btns">
					<button class="btn-danger" onclick="confirmClearData()">Yes, Reset</button>
					<button onclick="hideConfirmModal()">Cancel</button>
				</div>
			</div>
		</div>

		<script>
			/*<![CDATA[*/
			const activeKey = localStorage.getItem('gw2_active_key');
			let settings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');

			function sendAction(a, p) { window.parent.postMessage({action: a, ...(typeof p === 'object' ? p : {value: p})}, '*'); }
            
			function updateSetting(key, val) {
				settings[key] = val;
				localStorage.setItem('gw2_settings', JSON.stringify(settings));
				
				if (key === 'onTop') sendAction('setAlwaysOnTop', val);
				if (key === 'uiScaleLarge') sendAction('uiScaleChanged', val ? 'large' : 'default');
				if (key === 'wikiIntegrated') sendAction('wikiPreferenceChanged', val);
				if (key === 'defaultChar') sendAction('preferredCharChanged', val);
			}

			function updateLabel(type, val) {
				const range = document.getElementById('pref-' + type);
				const bubble = document.getElementById('bubble-' + type);
				bubble.innerHTML = `${val}%`;

				// Calculate bubble position based on slider percentage
				const min = range.min ? range.min : 0;
				const max = range.max ? range.max : 100;
				const newVal = Number(((val - min) * 100) / (max - min));
				bubble.style.left = `calc(${newVal}% + (${8 - newVal * 0.15}px))`;
			}

			function updateTimezone(val) {
				localStorage.setItem('gw2_pref_timezone', val);
			}

			function showConfirmModal() {
				document.getElementById('confirm-modal').style.display = 'flex';
			}

			function hideConfirmModal() {
				document.getElementById('confirm-modal').style.display = 'none';
			}

			function confirmClearData() {
				localStorage.clear();
				window.parent.location.reload();
			}

			function checkScaleChange() {
				let currentMScale = document.getElementById('pref-mscale').value;
				let currentFScale = document.getElementById('pref-fscale').value;
				let btn = document.getElementById('reload-map-btn');
				
				if (currentMScale !== initialMarkerScale || currentFScale !== initialFarmingScale) {
					btn.classList.remove('dimmed');
					btn.classList.add('lit-up');
				} else {
					btn.classList.add('dimmed');
					btn.classList.remove('lit-up');
				}
			}

			function triggerMapReload() {
				initialMarkerScale = document.getElementById('pref-mscale').value;
				initialFarmingScale = document.getElementById('pref-fscale').value;
				checkScaleChange();
				sendAction('reloadMap');
			}

            async function loadSettingsData() {
                if(!activeKey) return;
                try {
                    const charData = await fetch(`https://api.guildwars2.com/v2/characters?access_token=${activeKey}`).then(r => r.json());
                    
                    if(Array.isArray(charData)) {
                        const sel = document.getElementById('pref-char');
                        charData.sort().forEach(c => {
                            const opt = document.createElement('option');
                            opt.value = c; opt.innerText = c;
                            sel.appendChild(opt);
                        });
                        sel.value = settings.defaultChar || "";
                    }
                } catch(e) {
                    console.error("Failed to load characters for settings");
                }
            }

			function checkUpdateBtn() {
				if (localStorage.getItem('gw2_update_url')) {
					document.getElementById('update-btn').style.display = 'block';
				}
			}

			function openUpdateUrl() {
				const url = localStorage.getItem('gw2_update_url');
				if (url) window.open(url, '_blank');
			}

			window.addEventListener('message', function(event) {
				if (event.data && event.data.action === 'updateAvailable') {
					checkUpdateBtn();
				}
                if (event.data && event.data.action === 'updateTheme') {
                    document.body.setAttribute('data-theme', event.data.theme);
                }
			});

			// Initialize Toggles and Settings
			document.getElementById('pref-ontop').checked = settings.onTop || false;
			document.getElementById('pref-scale').checked = settings.uiScaleLarge || false;
			document.getElementById('pref-wiki').checked = settings.wikiIntegrated ?? true;
            document.getElementById('pref-systray').checked = localStorage.getItem('gw2_systray_notifications') === 'true';
			document.getElementById('pref-tz').value = localStorage.getItem('gw2_pref_timezone') || 'local';
            document.getElementById('pref-theme').value = localStorage.getItem('gw2_theme') || 'human';
            document.body.setAttribute('data-theme', localStorage.getItem('gw2_theme') || 'human');
			
			const volVal = settings.masterVolume !== undefined ? settings.masterVolume : 100;
			document.getElementById('pref-vol').value = volVal;
			updateLabel('vol', volVal);

			const mScaleVal = settings.markerScale !== undefined ? settings.markerScale : 100;
			document.getElementById('pref-mscale').value = mScaleVal;
			updateLabel('mscale', mScaleVal);

			const fScaleVal = settings.farmingMarkerScale !== undefined ? settings.farmingMarkerScale : 100;
			document.getElementById('pref-fscale').value = fScaleVal;
			updateLabel('fscale', fScaleVal);
            
            function exportLog() {
                window.parent.postMessage({action: 'openLogFolder'}, '*');
            }

            function updateTheme(val) {
                localStorage.setItem('gw2_theme', val);
                window.parent.postMessage({action: 'updateTheme', theme: val}, '*');
            }

			let initialMarkerScale = document.getElementById('pref-mscale').value;
			let initialFarmingScale = document.getElementById('pref-fscale').value;
            loadSettingsData();
			checkUpdateBtn();
            /*]]>*/
		</script>
	</body>
</html>
