<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			::-webkit-scrollbar { width: 6px; }
			::-webkit-scrollbar-track { background: rgba(10,8,5,0.5); }
			::-webkit-scrollbar-thumb { background: #4a3b2a; border-radius: 3px; }

			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; margin: 0; padding: 0; box-sizing: border-box; }

			body {
			background: transparent; color: #e2c07d; font-family: "Crimson Text", serif; padding: 15px;
			overflow: hidden; height: 100vh; display: flex; flex-direction: column; text-transform: uppercase;
			}

			.section-title { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #4a3b2a; padding-bottom: 5px; margin-bottom: 10px; color: #8a7a5f; flex-shrink: 0; }

			#recipes-container { flex: 1 1 auto; overflow-y: auto; padding-right: 5px; min-height: 0; }

			.recipe-section { margin-bottom: 15px; border: 1px solid #2a2015; background: rgba(0,0,0,0.3); }

			.dropdown-btn {
			width: 100%; background: #1a1510; border: none; color: #e2c07d;
			padding: 10px 15px; text-transform: uppercase; font-size: 13px; cursor: pointer;
			display: flex; align-items: center; justify-content: flex-start; gap: 10px; transition: 0.2s;
			position: relative; border-bottom: 1px solid #2a2015;
			}
			.dropdown-btn:hover { background: #251d16; }

			.dropdown-btn::after {
			content: '▼'; position: absolute; right: 15px; font-size: 10px; transition: 0.3s; color: #4a3b2a;
			}
			.dropdown-btn.active::after { transform: rotate(180deg); color: #e2c07d; }

			.sub-btn {
			background: rgba(20,15,10,0.4); padding: 8px 20px; font-size: 11px; color: #8a7a5f; border-bottom: 1px solid #2a2015;
			}

			.dropdown-content { display: none; }

			.recipe-grid { display: grid; grid-template-columns: repeat(10, 42px); gap: 4px; padding: 10px; justify-content: center; min-height: 0; }

			.item-slot { width: 42px; height: 42px; background: rgba(255,255,255,0.05); border: 1px solid #332a1e; cursor: pointer; transition: 0.2s; position: relative; }
			.item-slot:hover { border-color: #e2c07d; background: rgba(226, 192, 125, 0.1); }
			.recipe-icon { width: 100%; height: 100%; object-fit: cover; }
			.recipe-icon.locked { filter: grayscale(1) contrast(0.5); opacity: 0.4; }

			.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: #e2c07d; letter-spacing: 3px; font-size: 16px; font-weight: bold; height: 100%; }
			.loading img { width: 400px; height: 400px; margin-bottom: 30px; object-fit: contain; }

			/* Explicit fix for currency boxes */
			.rarity-Currency { border-color: transparent !important; background: transparent !important; }
			.text-Currency { color: #e2c07d !important; }

			.rarity-Legendary { border: 1px solid #4C139D; }
			.rarity-Ascended { border: 1px solid #FB3E8D; }
			.rarity-Exotic { border: 1px solid #FFA405; }
			.rarity-Rare { border: 1px solid #FCD00B; }
			.rarity-Masterwork { border: 1px solid #1A9306; }
			.rarity-Fine { border: 1px solid #62A4DA; }
			.rarity-Basic { border: 1px solid #fdfdfd; }

			.text-Legendary { color: #4C139D; }
			.text-Ascended { color: #FB3E8D; }
			.text-Exotic { color: #FFA405; }
			.text-Rare { color: #FCD00B; }
			.text-Masterwork { color: #1A9306; }
			.text-Fine { color: #62A4DA; }
			.text-Basic { color: #fdfdfd; }

			/* Calculator Specific Styles */
			.tabs-header { display: flex; gap: 10px; border-bottom: 1px solid #4a3b2a; padding-bottom: 10px; margin-bottom: 15px; flex-shrink: 0; }
			.tab-btn { background: #1a1510; border: 1px solid #4a3b2a; color: #8a7a5f; padding: 8px 15px; font-family: "Crimson Text", serif; font-size: 14px; text-transform: uppercase; font-weight: bold; cursor: pointer; transition: 0.2s; }
			.tab-btn.active { background: #2a221a; color: #e2c07d; border-color: #e2c07d; }
			.tab-btn:hover:not(.active) { color: #e2c07d; background: #251d16; }

			#calculator-container { display: none; flex: 1 1 auto; overflow-y: auto; padding-right: 5px; flex-direction: column; }

			.search-container { position: relative; width: 100%; margin-bottom: 15px; flex-shrink: 0; display: flex; gap: 10px; }
			.search-box { background: rgba(20,15,10,0.8); border: 1px solid #4a3b2a; color: #fff; padding: 10px 30px 10px 10px; font-size: 13px; outline: none; width: 100%; font-family: "Crimson Text", serif; text-transform: uppercase; }
			.search-box:focus { border-color: #e2c07d; }

			.clear-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #4a3b2a; cursor: pointer; font-size: 18px; line-height: 1; display: none; z-index: 10; }
			.clear-btn:hover { color: #e2c07d; }

			.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #1a1510; border: 1px solid #e2c07d; border-top: none; max-height: 250px; overflow-y: auto; z-index: 100; display: none; }
			.autocomplete-item { padding: 8px 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2a2015; font-size: 13px; color: #e2c07d; }
			.autocomplete-item:hover { background: #251d16; color: #fff; }
			.autocomplete-item img { width: 28px; height: 28px; border: 1px solid #332a1e; }

			.toggle-container { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #8a7a5f; cursor: pointer; user-select: none; letter-spacing: 1px; }
			.toggle-switch { position: relative; width: 34px; height: 18px; background: #1a1510; border: 1px solid #4a3b2a; border-radius: 9px; transition: 0.2s; }
			.toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #4a3b2a; border-radius: 50%; transition: 0.2s; }
			.active .toggle-switch { border-color: #e2c07d; }
			.active .toggle-switch::after { left: 18px; background: #e2c07d; }

			#calc-results { flex: 1; border: 1px solid #2a2015; background: rgba(0,0,0,0.3); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }

			.shopping-list-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dashed #332a1e; font-size: 12px; }
			.shopping-list-item:last-child { border-bottom: none; }

			.coin-icon { height: 12px; width: 12px; vertical-align: text-bottom; margin: 0 2px; }

			.calc-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
			.calc-breakdown-item { display: flex; flex-direction: column; }
			.calc-bd-title { color: #8a7a5f; font-size: 11px; margin-bottom: 3px; font-weight: bold; }
			.calc-bd-val { font-size: 14px; font-weight: bold; display: flex; align-items: center; }
			.calc-bd-sub { font-size: 10px; color: #8a7a5f; margin-top: 2px; display: flex; align-items: center; }

			.target-block { background: rgba(0,0,0,0.6); border: 1px solid #332a1e; flex-shrink: 0; margin-bottom: 10px; }
			.target-header { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #1a1510; border-bottom: 1px solid #2a2015; }
			.target-content { padding: 15px; display: none; flex-direction: column; align-items: stretch; gap: 10px; border-top: 1px solid #2a2015; }
			.target-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
			.target-remove-btn { background: #3a1515; border: 1px solid #ff4a4a; color: #ff4a4a; padding: 5px 15px; cursor: pointer; font-family: "Crimson Text", serif; font-size: 11px; font-weight: bold; transition: 0.2s; }
			.target-remove-btn:hover { background: #ff4a4a; color: #fff; }
			input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
			input[type=number] { -moz-appearance: textfield; }

			.step-container { padding: 10px 0; border-bottom: 1px dashed #332a1e; font-size: 12px; transition: 0.2s; }
			.completed-step { filter: grayscale(1); opacity: 0.4; }
			.completed-step .step-header-content span { text-decoration: line-through; }
			.completed-step .step-ingredients { display: none !important; }
		</style>
	</head>
	<body>
		<div id="recipe-ui" style="display:none; height:100%; flex-direction: column;">
			<div class="tabs-header">
				<button class="tab-btn active" onclick="switchTab('account')">Account Unlocks</button>
				<button class="tab-btn" onclick="switchTab('calculator')">Crafting Calculator</button>
			</div>

			<div id="recipes-container"></div>

			<div id="calculator-container">
				<div class="search-container">
					<div style="position:relative; flex:1;">
						<input type="text" class="search-box" id="calc-search" placeholder="SEARCH ITEM TO ADD TO CRAFTING QUEUE..." autocomplete="off">
							<span class="clear-btn" id="calc-clear-search" onclick="clearCalcSearch()">&#10006;</span>
							<div id="calc-autocomplete" class="autocomplete-list"></div>
						</div>
				</div>

				<div style="display:flex; flex-wrap:wrap; gap:20px; margin-bottom: 15px; flex-shrink:0; align-items: center;">
					<div class="toggle-container" id="mat-toggle" onclick="toggleMats()">
						<div class="toggle-switch"></div>
						<span>USE OWN MATERIALS</span>
					</div>
					<div class="toggle-container" id="auto-update-toggle" onclick="toggleAutoUpdate()" style="display:none;">
						<div class="toggle-switch"></div>
						<span>UPDATE OWNED MATERIALS EVERY MINUTE</span>
					</div>
				</div>

				<div id="calc-results">
					<div style="padding: 60px 20px; text-align: center; color: #8a7a5f; font-style: italic; letter-spacing: 1px;">
						SELECT AN ITEM TO GENERATE SHOPPING LIST
					</div>
				</div>
			</div>
		</div>

		<div id="loader" class="loading">
			<img src="https://gw2ps.local/Assets/Icons/Tyrian_Lens_transparent.png" />
			<div id="loader-text">SYNCING RECIPE DATA...</div>
			<div id="loader-subtext" style="font-size: 10px; margin-top: 10px; opacity: 0.6; letter-spacing: 1px;">THIS MAY TAKE A MINUTE</div>
		</div>

		<script>
			/*<![CDATA[*/
			const discIcons = {
				"Armorsmith": "https://gw2ps.local/Assets/Icons/craft_armorsmith.png",
				"Artificer": "https://gw2ps.local/Assets/Icons/craft_artificer.png",
				"Chef": "https://gw2ps.local/Assets/Icons/craft_chef.png",
				"Huntsman": "https://gw2ps.local/Assets/Icons/craft_huntsman.png",
				"Jeweler": "https://gw2ps.local/Assets/Icons/craft_jeweler.png",
				"Leatherworker": "https://gw2ps.local/Assets/Icons/craft_leatherworker.png",
				"Scribe": "https://gw2ps.local/Assets/Icons/craft_scribe.png",
				"Tailor": "https://gw2ps.local/Assets/Icons/craft_tailor.png",
				"Weaponsmith": "https://gw2ps.local/Assets/Icons/craft_weaponsmith.png",
				"Handiworker": "https://gw2ps.local/Assets/Icons/craft_handiworker.png",
				"Mystic Forge": "https://gw2ps.local/Assets/Icons/craft_mystic_forge.png"
			};

			const categoryMapping = {
				"RefinementEctoplasm": "Ectoplasm Refinement",
				"RefinementObsidian": "Obsidian Refinement",
				"LegendaryComponent": "Legendary Component",
				"IngredientCooking": "Cooking Ingredient",
				"LongBow": "Longbow",
				"ShortBow": "Shortbow",
				"HarpoonGun": "Harpoon Gun"
			};

			const specialCurrencies = [2, -2, 23, -23, 32, -32, 45, -45, 61, -61, 68, -68, 69, -69, 77, -77];

			let activeKey = localStorage.getItem('gw2_active_key') || null;
			let recipeDatabase = [];
			let unlockedIds = new Set();
			
			let useOwnMats = localStorage.getItem('gw2_calc_own_mats') === 'true';
			let autoUpdateMats = localStorage.getItem('gw2_calc_auto_update') === 'true';
			let autoUpdateInterval = null;

			let searchIndex = [];
			let itemIndexMap = {}; 
			
			let tpPrices = {};
			let forgeRecipes = {};
			let isEngineReady = false;
			let accountInventory = {}; 
			let detailedRecipeCache = {};
			let recipePromiseCache = {}; 
			
			let localOfficialRecipes = [];
			let vendorPrices = {};
			let bulkMapping = {};
			let activeCraftTargets = JSON.parse(localStorage.getItem('gw2_calc_targets')) || [];

			function toTitleCase(str) {
				if (!str) return '';
				return str.replace(/\w\S*/g, function(txt) {
					return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
				});
			}

			function formatQty(qty, prefix = '') {
				let formattedQty = qty.toLocaleString('de-DE');
				let numStr = prefix ? `${prefix} ${formattedQty}x` : `${formattedQty}x`;
				if (qty >= 250) {
					let stacks = Math.floor(qty / 250);
					let rem = qty % 250;
					let sub = rem > 0 ? `${stacks.toLocaleString('de-DE')} st. + ${rem.toLocaleString('de-DE')}` : `${stacks.toLocaleString('de-DE')} st.`;
					return `<div style="display:flex; flex-direction:column; line-height:1.2; align-items:flex-end;">
								<span style="color:#fff; font-size:12px; font-weight:bold; pointer-events:none;">${numStr}</span>
								<span style="color:#8a7a5f; font-size:10px; font-weight:normal; pointer-events:none;">${sub}</span>
							</div>`;
				}
				return `<div style="display:flex; flex-direction:column; line-height:1; align-items:flex-end; justify-content:center; height:100%;">
							<span style="color:#fff; font-size:12px; font-weight:bold; pointer-events:none;">${numStr}</span>
						</div>`;
			}

			async function fetchJSON(url) {
				try { 
					const r = await fetch(url); 
					if (!r.ok && r.status !== 206) return null;
					return await r.json(); 
				} catch(e) { return null; }
			}

			function formatCoin(copper, align = false) {
				if (copper === undefined || copper === null || isNaN(copper)) copper = 0;
				let isNeg = copper < 0;
				copper = Math.abs(Math.round(copper));
				let g = Math.floor(copper / 10000), s = Math.floor((copper % 10000) / 100), c = copper % 100;
				
				if (align) {
					let res = isNeg ? '- ' : '';
					res += `<span style="display:inline-block; width:45px; text-align:right;">${g}</span><img src="https://render.guildwars2.com/file/090A980A96D39FD36FBB004903644C6DBEFB1FFB/156904.png" class="coin-icon" />`;
					res += `<span style="display:inline-block; width:20px; text-align:right;">${s.toString().padStart(2, '0')}</span><img src="https://render.guildwars2.com/file/E5A2197D78ECE4AE0349C8B3710D033D22DB0DA6/156907.png" class="coin-icon" />`;
					res += `<span style="display:inline-block; width:20px; text-align:right;">${c.toString().padStart(2, '0')}</span><img src="https://render.guildwars2.com/file/6CF8F96A3299CFC75D5CC90617C3C70331A1EF0E/156902.png" class="coin-icon" />`;
					return res;
				} else {
					if (copper === 0) return '0<img src="https://render.guildwars2.com/file/6CF8F96A3299CFC75D5CC90617C3C70331A1EF0E/156902.png" class="coin-icon" />';
					let res = isNeg ? '-' : '';
					if (g > 0) res += g + '<img src="https://render.guildwars2.com/file/090A980A96D39FD36FBB004903644C6DBEFB1FFB/156904.png" class="coin-icon" />';
					if (s > 0 || g > 0) res += s + '<img src="https://render.guildwars2.com/file/E5A2197D78ECE4AE0349C8B3710D033D22DB0DA6/156907.png" class="coin-icon" />';
					res += c + '<img src="https://render.guildwars2.com/file/6CF8F96A3299CFC75D5CC90617C3C70331A1EF0E/156902.png" class="coin-icon" />';
					return res;
				}
			}

			function getDisplayData(id, fallbackName = '', fallbackIcon = '', fallbackRarity = 'Basic') {
				let numId = Number(id);
				let absId = Math.abs(numId);
				let isCurrency = isNaN(numId) || numId < 0 || numId === 1 || specialCurrencies.includes(absId);
				
				let name = fallbackName || `Item #${numId}`;
				let icon = fallbackIcon || 'https://render.guildwars2.com/file/D68BCC6E272BB77A42D7543BDD2A68490B60029C/434789.png';
				let rarity = isCurrency ? 'Currency' : fallbackRarity;
				
				let idx = itemIndexMap[numId] || itemIndexMap[absId];
				if (idx) {
					name = toTitleCase(idx.n || idx.name);
					icon = idx.i || idx.icon || icon;
					if (!isCurrency) rarity = idx.r || idx.rarity || rarity;
				}
				
				if (numId === 1 || numId === -1) {
					name = "Coin";
				}
				
				return { name, icon, rarity, isCurrency, rawName: (idx ? (idx.n || idx.name) : fallbackName) || name };
			}

			async function loadPhase2Data() {
				const loaderText = document.getElementById('loader-text');
				
				loaderText.innerText = "LOADING MASTER INDEX...";
				try {
					const masterData = await fetchJSON('gw2_master_index.json') || await fetchJSON('https://gw2ps.local/gw2_master_index.json');
					if (masterData) {
						searchIndex = masterData;
						searchIndex.forEach(item => {
							itemIndexMap[Number(item.id)] = item;
						});
					}
				} catch(e) { console.error("Master index load failed"); }

				loaderText.innerText = "LOADING OFFICIAL RECIPES...";
				try {
					const offData = await fetchJSON('official_recipes_clean.json') || await fetchJSON('https://gw2ps.local/official_recipes_clean.json');
					if (offData && Array.isArray(offData)) {
						localOfficialRecipes = offData;
					}
				} catch(e) {}

				loaderText.innerText = "LOADING VENDOR DATABANKS...";
				try {
					const vpData = await fetchJSON('vendor_prices_clean.json') || await fetchJSON('https://gw2ps.local/vendor_prices_clean.json');
					if (vpData) {
						vendorPrices = vpData;
						for (let key in vendorPrices) {
							let item = vendorPrices[key];
							if (item.name && item.name.toLowerCase().includes("in bulk")) {
								let baseName1 = item.name.replace(/ in Bulk$/i, "");
								let baseName2 = baseName1.endsWith('s') ? baseName1.slice(0, -1) : baseName1;
								let baseMatch = searchIndex.find(i => i.n && (i.n.toLowerCase() === baseName1.toLowerCase() || i.n.toLowerCase() === baseName2.toLowerCase()));
								if (baseMatch) bulkMapping[baseMatch.id] = { bulkId: Number(key), data: item };
							}
						}
					}
				} catch(e) { console.error("Vendor prices load failed"); }

				loaderText.innerText = "LOADING MYSTIC FORGE DATABANKS...";
				try {
					const cachedForge = sessionStorage.getItem('gw2profits_forge');
					if (cachedForge) {
						forgeRecipes = JSON.parse(cachedForge);
					} else {
						const forgeData = await fetchJSON('mystic_forge_clean.json') || await fetchJSON('https://gw2ps.local/mystic_forge_clean.json');
						if (forgeData && forgeData.recipes) {
							forgeRecipes = {};
							for (let key in forgeData.recipes) {
								let r = forgeData.recipes[key];
								let finalOutId = r.output_item_id;
								let outId = String(finalOutId);
								if (outId && outId !== 'undefined' && outId !== 'null') {
									if (!forgeRecipes[outId]) forgeRecipes[outId] = [];
									forgeRecipes[outId].push(r);
								}
							}
							sessionStorage.setItem('gw2profits_forge', JSON.stringify(forgeRecipes));
						}
					}
				} catch (e) { console.error("Failed to load Forge recipes", e); }
				
				isEngineReady = true;
			}

			async function syncInventory() {
				if (!activeKey) return;
				accountInventory = {};
				const mats = await fetchJSON(`https://api.guildwars2.com/v2/account/materials?access_token=${activeKey}`);
				if (mats && !mats.error) mats.forEach(m => { accountInventory[m.id] = (accountInventory[m.id] || 0) + m.count; });
				const bank = await fetchJSON(`https://api.guildwars2.com/v2/account/bank?access_token=${activeKey}`);
				if (bank && !bank.error) bank.forEach(b => { if (b) accountInventory[b.id] = (accountInventory[b.id] || 0) + b.count; });
				const shared = await fetchJSON(`https://api.guildwars2.com/v2/account/inventory?access_token=${activeKey}`);
				if (shared && !shared.error) shared.forEach(s => { if (s) accountInventory[s.id] = (accountInventory[s.id] || 0) + s.count; });
				const wallet = await fetchJSON(`https://api.guildwars2.com/v2/account/wallet?access_token=${activeKey}`);
				if (wallet && !wallet.error) wallet.forEach(w => { accountInventory[-w.id] = (accountInventory[-w.id] || 0) + w.value; if (w.id === 1) accountInventory[1] = (accountInventory[1] || 0) + w.value; });
			}

			function manageAutoUpdate() {
				if (useOwnMats && autoUpdateMats) {
					if (!autoUpdateInterval) {
						autoUpdateInterval = setInterval(async () => {
							if (activeKey) { await syncInventory(); if (activeCraftTargets.length > 0) triggerGlobalCalculation(); }
						}, 60000);
					}
				} else {
					if (autoUpdateInterval) { clearInterval(autoUpdateInterval); autoUpdateInterval = null; }
				}
			}

			async function init() {
				if (!activeKey) return;
				document.getElementById('loader').style.display = 'flex';
				document.getElementById('mat-toggle').classList.toggle('active', useOwnMats);
				document.getElementById('auto-update-toggle').style.display = useOwnMats ? 'flex' : 'none';

				const cached = localStorage.getItem(`recipe_struct_${activeKey}`);
				if (cached) {
					const parsed = JSON.parse(cached);
					recipeDatabase = parsed.data;
					unlockedIds = new Set(parsed.unlocks);
				} else {
					const unlocks = await fetchJSON(`https://api.guildwars2.com/v2/account/recipes?access_token=${activeKey}`);
					unlockedIds = new Set(unlocks || []);

				let missingIds = new Set();
				for (let target of activeCraftTargets) { missingIds.add(Number(target.item.id)); await collectRecipeIds(Number(target.item.id), missingIds); }
				let idArr = Array.from(missingIds);
				let toFetch = idArr.filter(id => !tpPrices[id] && id > 0);
				for (let i = 0; i < toFetch.length; i += 200) {

			async function getRecipeInfo(outId) {
				let strId = String(outId); let numId = Number(outId);
				if (detailedRecipeCache[strId]) return detailedRecipeCache[strId];
				if (recipePromiseCache[strId]) return await recipePromiseCache[strId];
				let promise = (async () => {
					
					// OVERRIDE: Prevent Runestone TP/Forge loop. Force 1g vendor price.
					if (numId === 20798 || numId === 100067) {
						return [{ type: 'vendor', ingredients: [{ item_id: -1, count: 10000 }], output_item_count: 1, disciplines: ['Merchant'], min_rating: 0 }];
					}

					let recipes = [];
					let offMatches = localOfficialRecipes.filter(r => Number(r.output_item_id) === numId);
					if (offMatches.length > 0) offMatches.forEach(r => recipes.push({ type: 'crafting', ingredients: r.ingredients, output_item_count: r.output_item_count || 1, disciplines: r.disciplines || [], min_rating: r.min_rating || 0 }));
					else {
						const search = await fetchJSON(`https://api.guildwars2.com/v2/recipes/search?output=${strId}`);
						if (search && search.length > 0 && !search.error) {
							const details = await fetchJSON(`https://api.guildwars2.com/v2/recipes/${search[0]}`);
							if (details && !details.error) recipes.push({ type: 'crafting', ingredients: details.ingredients, output_item_count: details.output_item_count || 1, disciplines: details.disciplines || [], min_rating: details.min_rating || 0 });
						}
					}
					if (vendorPrices[strId] && !vendorPrices[strId].name.toLowerCase().includes("in bulk")) recipes.push({ type: 'vendor', ingredients: vendorPrices[strId].ingredients, output_item_count: vendorPrices[strId].yields || 1, disciplines: ['Merchant'], min_rating: 0 });
					if (forgeRecipes[strId]) forgeRecipes[strId].forEach(f => recipes.push({ type: 'forge', ingredients: f.ingredients.map(i => ({ item_id: i.item_id || i.id, count: i.count })), output_item_count: f.count || 1, disciplines: ['Mystic Forge'], min_rating: 0 }));
					
					// OVERRIDE: Mystic Clovers
					if (numId === 19675) {
						recipes = recipes.filter(r => !r.disciplines.includes('Merchant'));
						recipes.forEach(r => {
							if (r.type === 'forge') r.output_item_count = (r.output_item_count || 1) / 3.33;
						});
					}
					
					recipes.sort((a,b) => {
						let sa = (a.type==='crafting' || a.type==='vendor') ? 0 : 1, sb = (b.type==='crafting' || b.type==='vendor') ? 0 : 1;
						if (sa !== sb) return sa - sb;
						const score = (r) => { let s = 0; r.ingredients.forEach(i => { let id = Number(i.item_id); if (isNaN(id) || id <= 0 || id === 1 || specialCurrencies.includes(Math.abs(id))) s+=1; else { let tp = tpPrices[id]?.sells?.unit_price || 0; if (tp > 0) s+=tp; else s+=10000000; } }); return s/(r.output_item_count||1); };
						return score(a) - score(b);
					});
					return recipes;
				})();
				recipePromiseCache[strId] = promise; let final = await promise; detailedRecipeCache[strId] = final; return final;
			}

			async function recurseItem(itemId, needed, local, sl, cs, vp, isTopLevel = false, forcePrecursorCraft = false, path = new Set(), depth = 0) {
				if (useOwnMats && local[itemId] > 0) { let taking = Math.min(local[itemId], needed); local[itemId] -= taking; needed -= taking; if (needed <= 0) return; }
				if (bulkMapping[itemId]) {
					let b = bulkMapping[itemId]; let q = Math.ceil(needed / 25);
					if (!vp[b.bulkId]) { let d = getDisplayData(b.bulkId, b.data.name); vp[b.bulkId] = { id: b.bulkId, qty: 0, name: d.name, icon: d.icon, rarity: d.rarity, recipeInfo: { ingredients: b.data.ingredients, output_item_count: b.data.yields || 1 }}; }
					vp[b.bulkId].qty += q; return;
				}
				
				let tpPrice = tpPrices[itemId] ? (tpPrices[itemId].sells?.unit_price || 0) : 0;
				let recipes = await getRecipeInfo(itemId);
				recipes = recipes.filter(r => !r.ingredients.some(ing => path.has(Number(ing.item_id))));
				let isBaseMaterial = recipes.length === 0;

				let d = getDisplayData(itemId);
				let isPrecursor = d.rarity === 'Legendary' || (d.rarity === 'Exotic' && tpPrice > 500000) || d.name.includes("Tier ");

				let shouldBuy = false;

				// RULE 1: Base material -> Buy it
				if (isBaseMaterial) {
					shouldBuy = true;
				} 
				// RULE 2: Selected Item -> NEVER buy it
				else if (isTopLevel) {
					shouldBuy = false; 
				} 
				// RULE 4: Precursor/Legendary sub-ingredient -> Obey toggle
				else if (isPrecursor) {
					if (forcePrecursorCraft) {
						shouldBuy = false; 
					} else {
						// Only buy if it's actually tradable
						shouldBuy = (tpPrice > 0); 
					}
				} 
				// RULE 3: Sub-ingredient with a TP price -> Calculate cheapest route
				else if (tpPrice > 0) {
					let craftCost = 0;
					let r = recipes[0]; 
					r.ingredients.forEach(ing => {
						let ingId = Number(ing.item_id);
						if (ingId === 1 || ingId === -1) {
							craftCost += ing.count;
						} else if (ingId < 0 || specialCurrencies.includes(Math.abs(ingId))) {
							craftCost += 0; 
						} else {
							let ingPrice = tpPrices[ingId]?.sells?.unit_price || 0;
							if (ingPrice === 0) craftCost += 10000000; 
							craftCost += ingPrice * ing.count;
						}
					});
					craftCost = craftCost / (r.output_item_count || 1);
					
					shouldBuy = (tpPrice <= craftCost);
				} 
				// Default: If no TP price and not a base material, craft it
				else {
					shouldBuy = false;
				}

				if (shouldBuy) {
					if (!sl[itemId]) { sl[itemId] = { id: itemId, qty: 0, name: d.name, icon: d.icon, rarity: d.rarity, unitPrice: tpPrice }; }
					sl[itemId].qty += needed;
				} else {
					let r = recipes[0];
					if (r.disciplines.includes('Merchant')) {
						if (!vp[itemId]) { vp[itemId] = { id: itemId, qty: 0, name: d.name, icon: d.icon, rarity: d.rarity, recipeInfo: r }; }
						vp[itemId].qty += needed; path.add(itemId);
						for (let i = 0; i < r.ingredients.length; i++) {
							let ing = r.ingredients[i];
							let ingId = Number(ing.item_id);
							if (ingId === 1 || ingId === -1) continue;
							if (ingId <= 0 || specialCurrencies.includes(Math.abs(ingId))) continue;
							await recurseItem(ingId, ing.count * Math.ceil(needed/r.output_item_count), local, sl, cs, vp, false, forcePrecursorCraft, path, depth + 1);
						}
						path.delete(itemId);
					} else {
						if (!cs[itemId]) { cs[itemId] = { id: itemId, crafts: 0, yields: 0, depth: depth, name: d.name, icon: d.icon, rarity: d.rarity, recipeInfo: r }; }
						let count = Math.ceil(needed / r.output_item_count); cs[itemId].crafts += count; cs[itemId].yields += count * r.output_item_count; path.add(itemId);
						for (let i = 0; i < r.ingredients.length; i++) {
							let ing = r.ingredients[i];
							await recurseItem(Number(ing.item_id), ing.count * count, local, sl, cs, vp, false, forcePrecursorCraft, path, depth + 1);
						}
						path.delete(itemId);
					}
				}
			}

						let vd = getDisplayData(vItem.id, vItem.name, vItem.icon, vItem.rarity);

						let costHtml = (vItem.recipeInfo.ingredients || []).map(ing => {
							let ingId = Number(ing.item_id);
							let craftsNeeded = Math.ceil(vItem.qty / (vItem.recipeInfo.output_item_count || 1));
							let totalIngNeeded = ing.count * craftsNeeded;
							
							if (ingId === 1 || ingId === -1) {
								rawGoldTotal += totalIngNeeded;
								return formatCoin(totalIngNeeded, false);
							}

							let idata = getDisplayData(ingId);
							let displayTotal = Math.ceil(totalIngNeeded); 
							return `${displayTotal.toLocaleString('de-DE')} <img src="${idata.icon}" style="width:14px; vertical-align:middle; border:1px solid #332a1e;" title="${idata.name}">`;
						}).join(' <span style="color:#4a3b2a;">+</span> ');

						vendorPurchasesHtml += `
						<div class="shopping-list-item">
							<div style="display:flex; align-items:center; gap:10px; cursor:pointer; width:max-content; padding-right:10px;" onclick="window.open('https://wiki.guildwars2.com/wiki/Special:Search/${encodeURIComponent(vd.rawName)}', '_blank')" onmouseover="window.parent.postMessage({action:'showTooltip', text: '${vd.name.replace(/'/g, "\\'")}', x: event.clientX, y: event.clientY}, '*')" onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')">
								<div style="width: 85px; flex-shrink:0; pointer-events:none;">${formatQty(vItem.qty)}</div>
								<img src="${vd.icon}" style="width:24px; flex-shrink:0; pointer-events:none;" class="rarity-${vd.rarity}" onerror="this.onerror=null; this.src='https://render.guildwars2.com/file/D68BCC6E272BB77A42D7543BDD2A68490B60029C/434789.png'">
								<span class="text-${vd.rarity}" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none;">${vd.name}</span>
							</div>
							<span style="white-space:nowrap; color:#8a7a5f; text-align:right; flex-shrink:0; margin-left:auto;">${costHtml}</span>
						</div>`;
					});

					let stepsHtml = '';
					let stepValues = Object.values(craftingSteps).sort((a, b) => {
						if (a.id === 19675) return -1;
						if (b.id === 19675) return 1;
						return b.depth - a.depth;
					});

					if (stepValues.length === 0) {
						stepsHtml = `<div style="text-align:center; color:#8a7a5f; padding:20px; font-style:italic;">NO CRAFTING STEPS REQUIRED</div>`;
					} else {
						stepValues.forEach(step => {
							let sd = getDisplayData(step.id, step.name, step.icon, step.rarity);
							let hasCurrency = (step.recipeInfo.ingredients || []).some(i => Number(i.item_id) <= 0);
							let isMerchant = (step.recipeInfo.disciplines || []).includes('Merchant');
							let isSingleItemMF = (step.recipeInfo.disciplines || []).includes('Mystic Forge') && (step.recipeInfo.ingredients || []).length === 1;
							let verb = (hasCurrency || isMerchant || isSingleItemMF) ? 'Buy' : 'Craft';
							let connector = verb === 'Buy' ? 'with' : 'out of';
							
							let stepChecked = localStorage.getItem(`gw2_calc_target_${idx}_step_${step.id}_checked`) === 'true';

							stepsHtml += `
							<div class="step-container ${stepChecked ? 'completed-step' : ''}">
								<div style="display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 6px;">
									<div style="display: flex; align-items: center; flex-grow:1; overflow:hidden;">
										<input type="checkbox" ${stepChecked ? 'checked' : ''} onchange="this.closest('.step-container').classList.toggle('completed-step', this.checked); localStorage.setItem('gw2_calc_target_${idx}_step_${step.id}_checked', this.checked);" style="margin-right:10px; cursor:pointer; flex-shrink:0;">
										<div class="step-header-content" style="display: flex; align-items: center; gap: 10px; cursor: pointer; width:max-content; padding-right:10px;" onclick="window.open('https://wiki.guildwars2.com/wiki/Special:Search/${encodeURIComponent(sd.rawName)}', '_blank')" onmouseover="window.parent.postMessage({action:'showTooltip', text: '${sd.name.replace(/'/g, "\\'")}', x: event.clientX, y: event.clientY}, '*')" onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')">
											<div style="width: 85px; flex-shrink:0; pointer-events:none;">${formatQty(Math.round(step.yields), verb)}</div>
											<img src="${sd.icon}" style="width:24px; flex-shrink:0; pointer-events:none;" class="rarity-${sd.rarity}" onerror="this.onerror=null; this.src='https://render.guildwars2.com/file/D68BCC6E272BB77A42D7543BDD2A68490B60029C/434789.png'">
											<span class="text-${sd.rarity}" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none;">
												<span>${sd.name}</span> <span style="color:#8a7a5f; margin-left:4px; margin-right:4px; text-decoration:none !important;">${connector}</span>
											</span>
										</div>
									</div>
									<div style="display: flex; align-items: center; gap: 4px; flex-shrink: 0;">
										${(step.recipeInfo.disciplines || []).map(d => `<img src="${discIcons[d] || discIcons['Mystic Forge']}" style="width:16px;" onmouseover="window.parent.postMessage({action:'showTooltip', text: '${d} ${step.recipeInfo.min_rating > 0 ? step.recipeInfo.min_rating : ''}'.trim(), x: event.clientX, y: event.clientY}, '*')" onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')">`).join('')}
									</div>
								</div>
								<div class="step-ingredients">
									${(step.recipeInfo.ingredients || []).map(ing => {
										let ingId = Number(ing.item_id);
										let totalIngNeeded = ing.count * step.crafts;

										if (ingId === 1 || ingId === -1) {
											rawGoldTotal += totalIngNeeded;
											return `<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px; padding-left: 50px;">
												<div style="width: 85px; flex-shrink:0;"></div>
												<span style="color:#e2c07d; font-weight:bold;">${formatCoin(totalIngNeeded, false)}</span>
											</div>`;
										}

										let idata = getDisplayData(ingId);
										let displayTotal = Math.ceil(totalIngNeeded); 
										
										return `<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px; padding-left: 50px;">
											<div style="width: 85px; flex-shrink:0; pointer-events:none;">${formatQty(displayTotal)}</div>
											<div style="display:flex; align-items:center; gap:10px; cursor:pointer; width:max-content; padding-right:10px;" onclick="window.open('https://wiki.guildwars2.com/wiki/Special:Search/${encodeURIComponent(idata.rawName)}', '_blank')" onmouseover="window.parent.postMessage({action:'showTooltip', text: '${idata.name.replace(/'/g, "\\'")}', x: event.clientX, y: event.clientY}, '*')" onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')">
												<img src="${idata.icon}" style="width:20px; flex-shrink:0; pointer-events:none;" class="rarity-${idata.rarity}" onerror="this.onerror=null; this.src='https://render.guildwars2.com/file/D68BCC6E272BB77A42D7543BDD2A68490B60029C/434789.png'">
												<span class="text-${idata.rarity}" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none;">${idata.name}</span>
											</div>
										</div>`;
									}).join('')}
								</div>
							</div>`;
						});
					}
					
					let tpB = tpPrices[Number(target.item.id)]?.buys?.unit_price || 0;
					let tpS = tpPrices[Number(target.item.id)]?.sells?.unit_price || 0;
					
					let targetTpBuyTotal = tpB * target.requestedAmount;
					let targetTpSellTotal = tpS * target.requestedAmount;
					
					let totalExpense = totalCost + rawGoldTotal;
					let isAccountBound = targetTpSellTotal === 0;
					
					let savings = targetTpSellTotal - totalExpense;
					let profitBuy = (targetTpBuyTotal * 0.85) - totalExpense;
					let profitSell = (targetTpSellTotal * 0.85) - totalExpense;

					let breakdownOpen = localStorage.getItem(`gw2_calc_bd_${idx}`) !== 'false';
					let shoppingOpen = localStorage.getItem(`gw2_calc_sl_${idx}`) !== 'false';
					let stepsOpen = localStorage.getItem(`gw2_calc_st_${idx}`) !== 'false';
					
					html += `
					<div class="target-block">
						<div class="target-header" onclick="toggleTarget(${idx})">
							<div style="display:flex; align-items:center; gap:10px; color:#fff; font-weight:bold;">
								<img src="${displayIcon}" style="width:24px;" class="rarity-${target.item.r}" onerror="this.onerror=null; this.src='https://render.guildwars2.com/file/D68BCC6E272BB77A42D7543BDD2A68490B60029C/434789.png'">
								${target.requestedAmount.toLocaleString('de-DE')}x ${tName}
							</div>
							<div style="display:flex; align-items:center; gap:15px;">
								<span id="target-icon-${idx}" style="color:#8a7a5f; font-size:10px;">${isOpen ? '&#9650;' : '&#9660;'}</span>
							</div>
						</div>
						<div id="target-content-${idx}" class="target-content" style="display: ${isOpen ? 'flex' : 'none'};" onclick="event.stopPropagation();">
							
							<div class="target-actions">
								<div>
									<span style="color:#8a7a5f; font-size:11px; font-weight:bold;">AMOUNT:</span>
									<input type="number" value="${target.requestedAmount}" min="1" onchange="updateTargetAmount(${idx}, this.value)" style="background: rgba(20,15,10,0.8); border: 1px solid #4a3b2a; color: #fff; padding: 5px 10px; width: 60px; outline:none; font-family: 'Crimson Text', serif; text-align:center;">
								</div>
								
								<label style="color:#8a7a5f; font-size:11px; cursor:pointer; display:flex; align-items:center; gap:5px; font-weight:bold; letter-spacing:1px; user-select:none;">
									<input type="checkbox" ${target.craftPrecursor ? 'checked' : ''} onchange="updateTargetPrecursor(${idx}, this.checked)" style="cursor:pointer;">
									CRAFT PRECURSORS
								</label>

								<button class="target-remove-btn" onclick="removeTarget(${idx})">REMOVE</button>
							</div>
							
							<div style="background: rgba(0,0,0,0.6); border: 1px solid #332a1e; flex-shrink: 0;">
								<div onclick="toggleSection('bd', ${idx})" style="padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #1a1510; border-bottom: 1px solid #2a2015; color: #8a7a5f; font-size: 13px; font-weight: bold; letter-spacing: 1px;">
									FINANCIAL BREAKDOWN <span id="calc-bd-icon-${idx}">${breakdownOpen ? '&#9650;' : '&#9660;'}</span>
								</div>
								<div id="calc-bd-content-${idx}" class="calc-breakdown" style="display: ${breakdownOpen ? 'grid' : 'none'};">
									<div class="calc-breakdown-item">
										<span class="calc-bd-title">Cost (Trading Post)</span>
										<span class="calc-bd-val" style="color:#e2c07d;">${formatCoin(totalCost, true)}</span>
										<span class="calc-bd-sub">${formatCoin(totalCost / target.requestedAmount, true)} <span style="margin-left:5px;">(per item)</span></span>
									</div>
									<div class="calc-breakdown-item">
										<span class="calc-bd-title">Raw Gold Needed</span>
										<span class="calc-bd-val" style="color:#e2c07d;">${formatCoin(rawGoldTotal, true)}</span>
										<span class="calc-bd-sub">${formatCoin(rawGoldTotal / target.requestedAmount, true)} <span style="margin-left:5px;">(per item)</span></span>
									</div>
									<div class="calc-breakdown-item">
										<span class="calc-bd-title">Savings compared to buying</span>
										<span class="calc-bd-val" style="color:${isAccountBound ? '#8a7a5f' : (savings >= 0 ? '#1A9306' : '#ff4a4a')};">${isAccountBound ? 'N/A (ACCOUNT BOUND)' : formatCoin(savings, true)}</span>
										${isAccountBound ? '' : `<span class="calc-bd-sub">${formatCoin(savings / target.requestedAmount, true)} <span style="margin-left:5px;">(per item)</span></span>`}
									</div>
									<div class="calc-breakdown-item">
										<span class="calc-bd-title">Profit (buy price)</span>
										<span class="calc-bd-val" style="color:${isAccountBound ? '#8a7a5f' : (profitBuy >= 0 ? '#1A9306' : '#ff4a4a')};">${isAccountBound ? 'N/A' : formatCoin(profitBuy, true)}</span>
										${isAccountBound ? '' : `<span class="calc-bd-sub">${formatCoin(profitBuy / target.requestedAmount, true)} <span style="margin-left:5px;">(per item)</span></span>`}
									</div>
									<div class="calc-breakdown-item" style="grid-column: 1 / -1;">
										<span class="calc-bd-title">Profit (sell price)</span>
										<span class="calc-bd-val" style="color:${isAccountBound ? '#8a7a5f' : (profitSell >= 0 ? '#1A9306' : '#ff4a4a')};">${isAccountBound ? 'N/A' : formatCoin(profitSell, true)}</span>
										${isAccountBound ? '' : `<span class="calc-bd-sub">${formatCoin(profitSell / target.requestedAmount, true)} <span style="margin-left:5px;">(per item)</span></span>`}
									</div>
								</div>
							</div>

							<div style="background: rgba(0,0,0,0.6); border: 1px solid #332a1e; flex-shrink: 0;">
								<div onclick="toggleSection('sl', ${idx})" style="padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #1a1510; border-bottom: 1px solid #2a2015; color: #8a7a5f; font-size: 13px; font-weight: bold; letter-spacing: 1px;">
									SHOPPING LIST <span id="calc-sl-icon-${idx}">${shoppingOpen ? '&#9650;' : '&#9660;'}</span>
								</div>
								<div id="calc-sl-content-${idx}" style="display: ${shoppingOpen ? 'block' : 'none'}; max-height: 280px; overflow-y: auto; padding-right: 5px;">
									${buyableHtml || (vendorPurchasesHtml ? '' : (untradableHtml ? '' : '<div style="padding:10px; color:#8a7a5f; text-align:center; font-style:italic;">NO TRADABLE ITEMS REQUIRED</div>'))}
									${vendorPurchasesHtml ? `<div style="padding: 10px 15px; background: #1a1510; border-top: 1px dashed #4a3b2a; border-bottom: 1px dashed #4a3b2a; color: #8a7a5f; font-size: 11px; font-weight: bold; letter-spacing: 1px; margin-top: 10px; margin-bottom: 10px;">VENDOR PURCHASES</div>${vendorPurchasesHtml}` : ''}
									${untradableHtml ? `<div style="padding: 10px 15px; background: #1a1510; border-top: 1px dashed #4a3b2a; border-bottom: 1px dashed #4a3b2a; color: #8a7a5f; font-size: 11px; font-weight: bold; letter-spacing: 1px; margin-top: 10px; margin-bottom: 10px;">ACCOUNT BOUND</div>${untradableHtml}` : ''}
								</div>
							</div>

							<div style="background: rgba(0,0,0,0.6); border: 1px solid #332a1e; flex-shrink: 0;">
								<div onclick="toggleSection('st', ${idx})" style="padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #1a1510; border-bottom: 1px solid #2a2015; color: #8a7a5f; font-size: 13px; font-weight: bold; letter-spacing: 1px;">
									CRAFTING STEPS <span id="calc-st-icon-${idx}">${stepsOpen ? '&#9650;' : '&#9660;'}</span>
								</div>
								<div id="calc-st-content-${idx}" style="display: ${stepsOpen ? 'block' : 'none'}; max-height: 350px; overflow-y: auto; padding-right: 5px;">
									${stepsHtml}
								</div>
							</div>

						</div>
					</div>`;
				});

				resultsDiv.innerHTML = html + `</div>`;
			}

			window.addEventListener('message', (e) => { if (e.data.action === 'switchAccount') { activeKey = e.data.apiKey; init(); } });
			init();
			/*]]>*/
		</script>
	</body>
</html>
