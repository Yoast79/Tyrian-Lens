<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			/* We keep your tracker's original cursor and basic style */
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; margin: 0; padding: 0; box-sizing: border-box; }
			body, html { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: "Crimson Text", serif; }

			/* IMPORTANT: We set top to 0 so the tracker map fills the shell's window */
			#map-container { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #000; }
			iframe { width: 100%; height: 100%; border: none; }
		</style>
	</head>
	<body>
		<div id="map-container">
			<iframe src="map.html"></iframe>
		</div>

		<script>
			/* This is your original tracker communication logic.
			We keep it exactly as it was when it worked. */
			window.addEventListener("message", function(event) {
			var data = event.data;
			if (typeof data === 'object') {
			if (data.action === 'updateTitle') {
			if (window.chrome && window.chrome.webview) {
			window.chrome.webview.postMessage("title:" + (data.name || "None"));
			}
			}
			// Relay messages up to the Shell (index.html) so Tooltips/Toasts still work
			window.parent.postMessage(data, '*');
			}
			});
		</script>
	</body>
</html>
