<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			::-webkit-scrollbar { width: 6px; }
			::-webkit-scrollbar-track { background: rgba(10,8,5,0.5); }
			::-webkit-scrollbar-thumb { background: #4a3b2a; border-radius: 3px; }
			* { cursor: url("https://gw2ps.local/Assets/Icons/mouse_cursor.png"), auto !important; margin: 0; padding: 0; box-sizing: border-box; }
			body { background: transparent; color: #e2c07d; font-family: "Crimson Text", serif; padding: 15px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; text-transform: uppercase; }

			.header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4a3b2a; padding-bottom: 8px; margin-bottom: 8px; }
			.section-title { font-size: 16px; letter-spacing: 2px; color: #8a7a5f; font-weight: bold; }
			.server-time { font-size: 20px; color: #e2c07d; font-weight: bold; font-family: monospace; letter-spacing: 2px; }

			.sub-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4a3b2a; padding-bottom: 8px; margin-bottom: 15px; }
			.tyria-time { font-size: 12px; color: #dcb36b; font-weight: bold; letter-spacing: 1px; }
			.local-time { font-size: 10px; color: #8a7a5f; }

			.main-layout { display: flex; flex: 1; min-height: 0; gap: 15px; }
			.nav-panel { width: 200px; flex-shrink: 0; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid #2a2015; padding: 5px; }
			.cat-btn { width: 100%; background: #1a1510; border: none; color: #8a7a5f; padding: 10px; text-align: left; font-size: 10px; font-weight: bold; cursor: pointer; border-bottom: 1px solid #2a2015; transition: 0.2s; border-left: 2px solid transparent; }
			.cat-btn:hover { background: #251d16; color: #e2c07d; }
			.cat-btn.active { background: rgba(226,192,125,0.1); color: #e2c07d; border-left-color: #e2c07d; }
			.content-panel { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; padding-right: 5px; }

			.fancy-toggle { position: relative; display: inline-block; width: 34px; height: 18px; vertical-align: middle; margin-left: 8px; }
			.fancy-toggle input { opacity: 0; width: 0; height: 0; }
			.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1a1510; border: 1px solid #4a3b2a; transition: .3s; border-radius: 20px; }
			.slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: #4a3b2a; transition: .3s; border-radius: 50%; }
			input:checked + .slider { background-color: #e2c07d; border-color: #e2c07d; }
			input:checked + .slider:before { transform: translateX(16px); background-color: #000; }

			.sub-grp-btn { width: 100%; background: rgba(30,22,15,0.9); border: 1px solid #4a3b2a; color: #e2c07d; padding: 8px 12px; text-align: left; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; margin-top: 5px; }
			.sub-grp-btn:after { content: '▼'; font-size: 8px; color: #8a7a5f; transition: 0.3s; }
			.sub-grp-btn.active:after { transform: rotate(180deg); }
			.sub-content { display: none; flex-direction: column; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid #2a2015; border-top: none; }

			.event-card { background: rgba(20,15,10,0.8); border: 1px solid #332a1e; display: flex; padding: 8px; gap: 12px; position: relative; cursor: pointer; transition: 0.2s; }
			.event-card:hover { border-color: #8a7a5f; background: rgba(30,22,15,0.9); }
			.event-card.active-state { border-color: #1A9306; background: rgba(26, 147, 6, 0.1); }
			.event-card.imminent-state { border-color: #e2c07d; background: rgba(226, 192, 125, 0.1); }
			.event-icon-wrap { width: 32px; height: 32px; flex-shrink: 0; background: #000; border: 1px solid #4a3b2a; padding: 2px; }
			.event-icon { width: 100%; height: 100%; object-fit: contain; }
			.event-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
			.event-title { font-size: 10px; font-weight: bold; color: #e2c07d; margin-bottom: 2px; padding-right: 65px; }
			.event-status { font-size: 8px; color: #8a7a5f; font-weight: bold; }
			.active-text { color: #1A9306; }
			.imminent-text { color: #e2c07d; }
			.prog-container { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
			.prog-bg { flex: 1; height: 4px; background: #111; border: 1px solid #4a3b2a; position: relative; }
			.prog-fill { height: 100%; background: #4a3b2a; width: 0%; transition: width 0.3s ease; }
			.time-text { font-size: 10px; font-weight: bold; width: 45px; text-align: right; color: #e2c07d; font-family: monospace; }

			.star-btn { cursor: pointer; width: 16px; height: 16px; opacity: 0.3; transition: 0.2s; position: absolute; top: 8px; right: 8px; background: url("https://wiki.guildwars2.com/images/4/40/X-Ray_Vision_toggle_on.png") center/contain no-repeat; z-index: 10; }
			.star-btn:hover, .star-btn.active { opacity: 1; filter: drop-shadow(0 0 5px #e2c07d); }
			.wp-btn { position: absolute; top: 8px; right: 30px; font-size: 8px; background: #1a1510; border: 1px solid #4a3b2a; color: #8a7a5f; padding: 2px 4px; cursor: pointer; transition: 0.2s; z-index: 10; font-weight: bold; }
			.wp-btn:hover { color: #e2c07d; border-color: #e2c07d; background: #251d16; }

			input[type=number]::-webkit-inner-spin-button,
			input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
			input[type=number] { -moz-appearance: textfield; }

			.confirm-modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,8,5,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border: 1px solid #4a3b2a; padding: 20px; text-align: center; }
			.confirm-btn-row { display: flex; gap: 10px; margin-top: 15px; }
			.confirm-btn { background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d; padding: 8px 15px; font-family: 'Crimson Text', serif; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
			.confirm-btn:hover { background: #251d16; border-color: #e2c07d; }

			/* Large UI Scaling Overrides */
			body.ui-large .section-title { font-size: 18px; }
			body.ui-large .server-time { font-size: 24px; }
			body.ui-large .tyria-time { font-size: 14px; }
			body.ui-large .local-time { font-size: 12px; }
			body.ui-large .nav-panel { width: 240px; }
			body.ui-large .cat-btn { font-size: 13px; padding: 12px; }
			body.ui-large .sub-grp-btn { font-size: 14px; padding: 10px 15px; }
			body.ui-large .event-title { font-size: 13px; }
			body.ui-large .event-status { font-size: 11px; }
			body.ui-large .time-text { font-size: 13px; width: 60px; }
			body.ui-large .event-icon-wrap { width: 40px; height: 40px; }
			body.ui-large .wp-btn { font-size: 10px; padding: 4px 6px; }
			body.ui-large .star-btn { width: 20px; height: 20px; }
			body.ui-large .slider { width: 44px; height: 22px; }
			body.ui-large .slider:before { height: 16px; width: 16px; left: 3px; bottom: 3px; }
			body.ui-large input:checked + .slider:before { transform: translateX(22px); }

			/* Super Adventure Box Easter Egg */
			.sab-glitch { image-rendering: pixelated; box-shadow: inset 0 0 0 2px #39ff14 !important; background: repeating-linear-gradient(0deg, rgba(57,255,20,0.05), rgba(57,255,20,0.05) 1px, transparent 1px, transparent 3px), rgba(20,15,10,0.8) !important; animation: sabGlitchAnim 4s infinite; }
			.sab-glitch:hover { box-shadow: inset 0 0 0 2px #ff00ff !important; background: repeating-linear-gradient(0deg, rgba(255,0,255,0.05), rgba(255,0,255,0.05) 1px, transparent 1px, transparent 3px), rgba(30,22,15,0.9) !important; }
			.sab-glitch .event-title { color: #39ff14 !important; text-shadow: 1px 1px 0px #ff00ff; }
			.sab-glitch .event-icon { image-rendering: pixelated; }
			@keyframes sabGlitchAnim {
			0% { transform: translate(0) }
			10% { transform: translate(-2px, 1px) }
			11% { transform: translate(0) }
			50% { transform: translate(2px, -1px); filter: hue-rotate(90deg); }
			51% { transform: translate(0); filter: hue-rotate(0deg); }
			90% { transform: translate(-1px, 2px) }
			91% { transform: translate(0) }
			100% { transform: translate(0) }
			}

			#confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
		</style>
	</head>
	<body>
		<canvas id="confetti-canvas"></canvas>
		<div id="ui-root" style="display:flex; height:100%; flex-direction: column; position: relative;" onclick="resumeAudioContext()">
			<div class="header-row">

					<select id="timer-sound-select" style="background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d; font-size: 10px; font-weight: bold; font-family: 'Crimson Text', serif; padding: 2px 5px; cursor: pointer; text-transform: uppercase;" onchange="previewTimerSound(this.value)">

						<option value="https://gw2ps.local/Assets/Sounds/timers_noticication_papling.mp3">PAPLING</option>

						<option value="tts_male">TTS MALE</option>
						<option value="tts_female">TTS FEMALE</option>
					</select>
					<span style="font-size:10px; font-weight:bold; color:#8a7a5f; margin-left: 15px; margin-right: 5px;">FREQUENCY:</span>
					<select id="popup-frequency-select" style="background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d; font-size: 10px; font-weight: bold; font-family: 'Crimson Text', serif; padding: 2px 5px; cursor: pointer; text-transform: uppercase;" onchange="localStorage.setItem('gw2_timer_frequency', this.value)">

						<option value="10,5,0">10M - 5M - START</option>
						<option value="5,0">5M - START</option>
						<option value="0">START</option>

				</div>
				<div style="display:flex; flex-direction:column; align-items:flex-end;">

				</div>
			</div>

			<div class="main-layout">
				<div id="nav-panel" class="nav-panel">
					<div style="position: relative;">
						<input type="text" id="event-search" placeholder="SEARCH..." style="width: 100%; background: #1a1510; border: none; border-bottom: 1px solid #4a3b2a; color: #e2c07d; padding: 10px; padding-right: 25px; font-family: 'Crimson Text', serif; font-size: 10px; font-weight: bold; text-transform: uppercase; outline: none;" onkeyup="handleSearch(this.value)">
							<span style="position: absolute; right: 8px; top: 10px; color: #8a7a5f; font-size: 12px; font-weight: bold; cursor: pointer;" onclick="document.getElementById('event-search').value=''; handleSearch('');">X</span>
						</div>
				</div>
				<div id="content-panel" class="content-panel"></div>
			</div>

			<div id="delete-confirm-modal" class="confirm-modal">

				<div class="confirm-btn-row">
					<button class="confirm-btn" onclick="confirmDelete()">YES</button>
					<button class="confirm-btn" onclick="cancelDelete()">NO</button>
				</div>
			</div>
		</div>

			window.playTimerNotification = function(val, textMsg, forceSound = null) {
				if (!val || val === 'none') return;
				
				const settings = JSON.parse(localStorage.getItem('gw2_settings') || '{}');
				const vol = settings.masterVolume !== undefined ? (settings.masterVolume / 100) : 1.0;

				let soundToPlay = forceSound || val;

				if (soundToPlay === 'tts_male' || soundToPlay === 'tts_female') {
					if ('speechSynthesis' in window) {
						let msg = new SpeechSynthesisUtterance(textMsg);
						let voices = window.speechSynthesis.getVoices();
						let voice = null;
						
						// Priority matching for voices
						if (soundToPlay === 'tts_male') {
							voice = voices.find(v => v.name.toLowerCase().includes('male') || v.name.includes('David') || v.name.includes('Mark') || v.name.includes('Arthur'));
						} else {
							voice = voices.find(v => v.name.toLowerCase().includes('female') || v.name.includes('Zira') || v.name.includes('Hazel') || v.name.includes('Samantha'));
						}
						
						if (voice) msg.voice = voice;
						msg.pitch = 1;
						msg.rate = 1;
						msg.volume = vol;
						window.speechSynthesis.speak(msg);
					}
				} else {
					// Use forward slashes for URLs to prevent escape character issues
					const cleanUrl = soundToPlay.replace(/\\/g, '/');
					let audio = new Audio(cleanUrl);
					audio.volume = vol;
					audio.play().catch(e => console.error('Audio play failed for:', cleanUrl, e));
				}
			};

                if (type.startsWith('in')) {

			function triggerConfetti() {
				particles = [];
				for(let i=0; i<100; i++) {
					particles.push({
						x: canvas.width/2,
						y: canvas.height/2,
						vx: (Math.random()-0.5)*10,
						vy: (Math.random()-0.5)*10,
						size: Math.random()*5+2,
						color: `hsl(${Math.random()*360}, 100%, 50%)`,
						life: 100
					});
				}
				function anim() {
					ctx.clearRect(0,0,canvas.width,canvas.height);
					particles.forEach((p,i) => {
						p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
						ctx.fillStyle = p.color;
						ctx.fillRect(p.x, p.y, p.size, p.size);
						if(p.life <= 0) particles.splice(i,1);
					});
					if(particles.length > 0) requestAnimationFrame(anim);
				}
				anim();
			}

			function formatCountdown(secs) {
				if (secs < 0) secs = 0;
				const h = Math.floor(secs / 3600);
				const m = Math.floor((secs % 3600) / 60);
				const s = Math.floor(secs % 60);
				if (h > 0) return h + "h " + m.toString().padStart(2, '0') + "m";
				return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
			}

			function getEventState(ev, currentTotalMin) {
                if (ev.isCustom) {
                    const nowMs = Date.now();
                    let target = ev.targetTime;
                    const durMs = (ev.d || 1) * 60000;
                    
                    if (nowMs > target + durMs) {
                        if (ev.repeat) {
                            while(target + durMs < nowMs) {
                                let d = new Date(target);
                                if (ev.repeatUnit === 'minutes') d.setMinutes(d.getMinutes() + ev.repeatVal);
                                else if (ev.repeatUnit === 'hours') d.setHours(d.getHours() + ev.repeatVal);
                                else if (ev.repeatUnit === 'days') d.setDate(d.getDate() + ev.repeatVal);
                                else if (ev.repeatUnit === 'weeks') d.setDate(d.getDate() + (ev.repeatVal * 7));
                                else if (ev.repeatUnit === 'months') d.setMonth(d.getMonth() + ev.repeatVal);
                                target = d.getTime();
                            }
                            ev.targetTime = target;
                            localStorage.setItem('gw2_custom_timers', JSON.stringify(customTimers));
                        }
                    }
                    
                    let isActive = (nowMs >= target && nowMs < target + durMs);
                    let remainMs = isActive ? (target + durMs - nowMs) : (target - nowMs);
                    
                    if (!ev.repeat && nowMs > target + durMs) {
                        return { active: false, remain: 0, total: 1, next: 0, expired: true };
                    }
                    
                    let totalSecs = 3600; 
                    if (ev.repeatUnit === 'minutes') totalSecs = ev.repeatVal * 60;
                    else if (ev.repeatUnit === 'hours') totalSecs = ev.repeatVal * 3600;
                    else if (ev.repeatUnit === 'days') totalSecs = ev.repeatVal * 86400;
                    else if (ev.repeatUnit === 'weeks') totalSecs = ev.repeatVal * 604800;
                    else if (ev.repeatUnit === 'months') totalSecs = ev.repeatVal * 2592000;
                    
                    let totalReturn = isActive ? ((ev.d || 1) * 60) : totalSecs;
                    return { active: isActive, remain: remainMs / 1000, total: totalReturn, next: target / 1000 };
                }

				let startMins = ev.exact ? ev.exact : [];
				if (!ev.exact) {
					const offset = ev.o;
					for (let i = offset; i < 1440; i += ev.r) startMins.push(i);
				}
				let isActive = false, activeEnd = 0, nextStart = 3000;
				for (let start of startMins) {
					const end = start + ev.d;
					if (currentTotalMin >= start && currentTotalMin < end) { isActive = true; activeEnd = end; break; }
					if (start > currentTotalMin && start < nextStart) nextStart = start;
				}
				if (!isActive && nextStart > 1440) nextStart = startMins[0] + 1440;
				if (isActive) return { active: true, remain: (activeEnd - currentTotalMin) * 60, total: ev.d * 60, next: nextStart };
				return { active: false, remain: (nextStart - currentTotalMin) * 60, total: (ev.r || 120) * 60, next: nextStart };
			}

				});
				return [watchSub];
			}

                                <input type="time" id="ct-time-at" style="background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d; padding: 5px; font-family: 'Crimson Text', serif; font-size: 10px; font-weight: bold; display: none;">
                            </div>
                            <div style="display: flex; align-items: center; gap: 5px; margin-top: 5px;">
                                <span style="font-size: 10px; color: #8a7a5f; font-weight: bold;">REPEAT</span>
                                <label class="fancy-toggle">
                                    <input type="checkbox" id="ct-repeat" onchange="toggleCtRepeat()">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div id="ct-repeat-opts" style="display: none; gap: 5px; align-items: center;">
                                <span style="font-size: 10px; color: #8a7a5f; font-weight: bold;">EVERY</span>
                                <input type="number" id="ct-rep-val" value="1" style="background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d; padding: 5px; font-family: 'Crimson Text', serif; font-size: 10px; font-weight: bold; width: 50px;">
                                <select id="ct-rep-unit" style="background: #1a1510; border: 1px solid #4a3b2a; color: #e2c07d; padding: 5px; font-family: 'Crimson Text', serif; font-size: 10px; font-weight: bold; text-transform: uppercase;">
                                    <option value="minutes">MINUTES</option>
                                    <option value="hours">HOURS</option>
                                    <option value="days">DAYS</option>
                                    <option value="weeks">WEEKS</option>
                                    <option value="months">MONTHS</option>
                                </select>
                            </div>
                            <button onclick="saveCustomTimer()" style="background: #251d16; border: 1px solid #4a3b2a; color: #e2c07d; padding: 8px; cursor: pointer; font-family: 'Crimson Text', serif; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 5px;">ADD TIMER</button>
                        </div>`;
                    }

					activeSubs.forEach((sub, sIdx) => {
						const isOpen = harmonicaState[sub.n] === true;
						html += `<button class="sub-grp-btn ${isOpen ? 'active' : ''}" onclick="toggleSub(this, '${sub.n.replace(/'/g, "\\'")}')">${sub.n}</button>`;
						html += `<div class="sub-content" style="display:${isOpen ? 'flex' : 'none'}">`;
						
						let sorted = sub.evs.map(ev => ({ ev, st: getEventState(ev, totalMin) })).filter(item => !item.st.expired);
						sorted.sort((a,b) => (a.st.active && !b.st.active) ? -1 : (!a.st.active && b.st.active) ? 1 : a.st.remain - b.st.remain);

						sorted.forEach((item, eIdx) => {
							const id = `ev-${sIdx}-${item.ev.n.replace(/\s+/g, '-')}`;
                            let deleteBtn = item.ev.isCustom ? `<button class="wp-btn" style="right: 30px;" onclick="event.stopPropagation(); promptDelete('${item.ev.id}')">DEL</button>` : '';
                            
							let showWp = item.ev.wp && item.ev.n !== "Daily Reset" && item.ev.n !== "Day/Night Cycle";
							let copyBtn = (item.ev.isCustom || !showWp) ? '' : `<button class="wp-btn" onclick="event.stopPropagation(); window.parent.postMessage({action:'copy', code:'${item.ev.wp || ''}'}, '*')">COPY WP</button>`;
                            
							let clickAction = item.ev.isCustom ? '' : `onclick="handleEventClick('${item.ev.n.replace(/'/g, "\\'")}')"`;
                            let tooltipDesc = (item.ev.desc || item.ev.n).replace(/'/g, "\\'");
							let isSAB = item.ev.n === "Super Adventure Festival";

							html += `<div class="event-card ${isSAB ? 'sab-glitch' : ''}" id="${id}" ${clickAction} onmouseover="window.parent.postMessage({action:'showTooltip', text:'${tooltipDesc}', x:event.clientX, y:event.clientY}, '*')" onmouseout="window.parent.postMessage({action:'hideTooltip'}, '*')">
								${deleteBtn}
                                ${copyBtn}
								<div class="star-btn ${!!trackedTimers[item.ev.n]?'active':''}" onclick="toggleTrackTimer('${item.ev.n.replace(/'/g, "\\'")}', this, event)"></div>
								<div class="event-icon-wrap"><img src="${item.ev.i}" class="event-icon" /></div>
								<div class="event-info"><div class="event-title">${item.ev.n}</div><div class="event-status" id="${id}-stat">-</div>
								<div class="prog-container"><div class="prog-bg"><div class="prog-fill" id="${id}-fill" style="width:0%"></div></div><div class="time-text" id="${id}-time">00:00</div></div></div></div>`;
						});
						html += `</div>`;
					});
					content.innerHTML = html;
				}

				activeSubs.forEach((sub, sIdx) => {
					sub.evs.forEach((ev) => {
						const id = `ev-${sIdx}-${ev.n.replace(/\s+/g, '-')}`;
						const state = getEventState(ev, totalMin);
                        if (state.expired) return;
						const card = document.getElementById(id);
						if(!card) return;
						let isSAB = ev.n === "Super Adventure Festival";
						card.className = "event-card" + (state.active ? " active-state" : (state.remain <= 900 ? " imminent-state" : "")) + (isSAB ? " sab-glitch" : "");
						document.getElementById(id+'-stat').innerText = state.active ? "ACTIVE" : "STARTS IN " + formatCountdown(state.remain);
						document.getElementById(id+'-stat').className = "event-status" + (state.active ? " active-text" : (state.remain <= 900 ? " imminent-text" : ""));
						document.getElementById(id+'-time').innerText = formatCountdown(state.remain);
						if (syncCounter % 10 === 0) document.getElementById(id+'-fill').style.width = (100 - ((state.remain / state.total) * 100)) + "%";
					});
				});
            }

			window.handleEventClick = function(name) {
				if(name === "Choya Pinata") {
					if(!choyaCooldown) {
						triggerConfetti();
						// Use forward slashes for the sound path override
						playTimerNotification(localStorage.getItem('gw2_timer_sound'), "", "/Assets/Sounds/choya_pop.mp3");
						choyaCooldown = true;
						setTimeout(() => { choyaCooldown = false; }, 3000);
					} else {
						window.open('https://wiki.guildwars2.com/wiki/Special:Search/' + encodeURIComponent(name), '_blank');
					}
				} else {
					window.open('https://wiki.guildwars2.com/wiki/Special:Search/' + encodeURIComponent(name), '_blank');
				}
			};

            window.toggleSub = function(btn, subName) {
                btn.classList.toggle('active');
                const isOpen = btn.classList.contains('active');
                btn.nextElementSibling.style.display = isOpen ? 'flex' : 'none';
                
                harmonicaState[subName] = isOpen;
                localStorage.setItem('gw2_harmonica_timers', JSON.stringify(harmonicaState));
            };

            window.toggleTrackTimer = function(name, el, event) {
                event.stopPropagation();
                if (el.classList.contains('active')) { delete trackedTimers[name]; el.classList.remove('active'); }
                else { trackedTimers[name] = true; el.classList.add('active'); }
                localStorage.setItem('gw2_tracked_timers', JSON.stringify(trackedTimers));
                if (schedule[currentMainCat].cat === "WATCHLIST") renderView(true);
            };

            function updateTyriaTime(m) {
                const c = m % 120; let s = "NIGHT";
                if (c >= 25 && c < 30) s = "DAWN"; else if (c >= 30 && c < 100) s = "DAY"; else if (c >= 100 && c < 105) s = "DUSK";
                document.getElementById('tyria-time').innerText = "TYRIA: " + s;
            }

            function engineTick() {
                const now = new Date();
                const prefTz = localStorage.getItem('gw2_pref_timezone') || 'local';
                const opt = { hour: '2-digit', minute:'2-digit', second:'2-digit' };
                if (prefTz !== 'local') opt.timeZone = prefTz;
                document.getElementById('local-time').innerText = "LOCAL TIME: " + now.toLocaleTimeString([], opt);
                document.getElementById('server-time').innerText = now.toISOString().substr(11, 8);
                const totalMin = now.getUTCHours() * 60 + now.getUTCMinutes() + (now.getUTCSeconds() / 60);
                
                if (localStorage.getItem('gw2_timer_tracker_visible') === 'true') {
					const freq = (localStorage.getItem('gw2_timer_frequency') || '15,10,5,0').split(',').map(Number);
                    Object.keys(trackedTimers).forEach(name => {
                        schedule.forEach(cat => {
                            if (cat.cat === "WATCHLIST") return;
                            cat.sub.forEach(s => {
                                s.evs.forEach(ev => {
                                    if (ev.n === name) {
                                        const state = getEventState(ev, totalMin);
                                        const rem = Math.round(state.remain);
										const remMin = Math.floor(rem / 60);

                                        if (!state.active) {
											freq.forEach(f => {
												if(f > 0 && remMin === f && !alertHistory[name + '-' + f]) {
													window.parent.postMessage({action:'eventPop', msg: name + " IN " + f + " MIN"}, '*');
													playTimerNotification(localStorage.getItem('gw2_timer_sound'), name + " in " + f + " minutes");
													alertHistory[name + '-' + f] = true;
													setTimeout(()=> delete alertHistory[name + '-' + f], 65000);
												}
											});
                                        } else {
                                            const elapsed = Math.round(state.total - state.remain);
                                            if (elapsed === 0 && !alertHistory[name + '-0'] && freq.includes(0)) {
                                                window.parent.postMessage({action:'eventPop', msg: name + " IS ACTIVE"}, '*');
												// Forward slashes for Tequatl sound
												let soundOverride = (name === "Tequatl the Sunless") ? "/Assets/Sounds/something_in_the_water.mp3" : null;
                                                playTimerNotification(localStorage.getItem('gw2_timer_sound'), name + " is active", soundOverride);
                                                alertHistory[name + '-0'] = true;
                                                setTimeout(()=> delete alertHistory[name + '-0'], 5000);
                                            }
                                        }
                                    }
                                });
                            });
                        });
                    });
                }

                updateTyriaTime(totalMin); renderView(false); syncCounter++; if (syncCounter >= 300) { syncCounter = 0; renderView(true); }
            }
            init();
			/*]]>*/
		</script>
	</body>
</html>
